<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Resultados — Almacén Mayorista</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#0d1b0e;}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;
    const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const GCATS = ["Renta/Bodega","Sueldos Admin","Luz/Agua/Internet","Mantenimiento","Papelería","Depreciación","Seguros","Honorarios Externos","Publicidad","Empaques/Embalaje","Fletes de Entrega","Otros"];
    const CURRENCIES = ["USD","CUP","EUR"];
    const GIST_FILENAME = "almacen-mayorista-data.json";
    let _uid = 200;
    const uid = () => String(++_uid);
    const num = (v) => isNaN(parseFloat(v)) ? 0 : parseFloat(v);

    function App() {
      const [tab, setTab] = useState("resultados");
      const [cfg, setCfg] = useState({ nombre:"Mi Almacén Mayorista", mes:"Junio", anio:2025, comDef:5, invIni:0, CUP_of:24, CUP_inf:250, EUR_usd:1.08 });
      const [prods, setProds] = useState([]);
      const [compras, setCompras] = useState([]);
      const [ventas, setVentas] = useState([]);
      const [gastos, setGastos] = useState([]);
      const [otros, setOtros] = useState([]);
      const [imp, setImp] = useState({ isr:"", curIsr:"USD", ptu:"", curPtu:"USD", ex:"", curEx:"USD" });
      const [fp, setFp] = useState({ nom:"", uni:"pza" });
      const [fc, setFc] = useState({ fecha:"", prov:"", pid:"", qty:"", punit:"", cur:"USD" });
      const [fv, setFv] = useState({ fecha:"", cli:"", vend:"", com:5, items:[] });
      const [fvi, setFvi] = useState({ pid:"", qty:"", punit:"", cur:"USD" });
      const [fg, setFg] = useState({ cat:GCATS[0], conc:"", monto:"", cur:"USD" });
      const [fo, setFo] = useState({ tipo:"ingreso", conc:"", monto:"", cur:"USD" });

      // ── GitHub Sync ──
      const [ghToken, setGhToken] = useState(() => localStorage.getItem('gh_token') || '');
      const [gistId, setGistId] = useState(() => localStorage.getItem('gist_id') || '');
      const [tokenInput, setTokenInput] = useState('');
      const [allMonths, setAllMonths] = useState({});
      const [syncStatus, setSyncStatus] = useState(ghToken ? 'idle' : 'notoken');
      const [syncMsg, setSyncMsg] = useState('');

      useEffect(() => {
        if (ghToken && gistId) loadAllMonths(ghToken, gistId);
      }, []);

      const loadAllMonths = async (token, id) => {
        try {
          const res = await fetch(`https://api.github.com/gists/${id}`, {
            headers: { 'Authorization': `token ${token}` }
          });
          if (!res.ok) throw new Error('no se pudo cargar');
          const gist = await res.json();
          const content = gist.files[GIST_FILENAME]?.content;
          if (content) {
            const data = JSON.parse(content);
            setAllMonths(data.months || {});
          }
          setSyncStatus('ok');
          setSyncMsg('Conectado ✓');
        } catch(e) {
          setSyncStatus('error');
          setSyncMsg('Error al cargar datos');
        }
      };

      const connectGitHub = async () => {
        const token = tokenInput.trim();
        if (!token) return;
        setSyncStatus('connecting');
        setSyncMsg('Conectando...');
        try {
          const res = await fetch('https://api.github.com/gists?per_page=100', {
            headers: { 'Authorization': `token ${token}` }
          });
          if (!res.ok) throw new Error('Token inválido — verifica que copiaste bien el token');
          const gists = await res.json();
          const found = gists.find(g => g.files && g.files[GIST_FILENAME]);
          let id, months = {};
          if (found) {
            id = found.id;
            const fullRes = await fetch(`https://api.github.com/gists/${id}`, {
              headers: { 'Authorization': `token ${token}` }
            });
            const full = await fullRes.json();
            const parsed = JSON.parse(full.files[GIST_FILENAME].content);
            months = parsed.months || {};
            setSyncMsg('¡Datos anteriores encontrados! ' + Object.keys(months).length + ' mes(es) cargados.');
          } else {
            const createRes = await fetch('https://api.github.com/gists', {
              method: 'POST',
              headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({
                description: 'Datos Almacén Mayorista — App Estado de Resultados',
                public: false,
                files: { [GIST_FILENAME]: { content: JSON.stringify({ months: {} }) } }
              })
            });
            const created = await createRes.json();
            id = created.id;
            setSyncMsg('Almacenamiento creado. ¡Listo para guardar meses!');
          }
          localStorage.setItem('gh_token', token);
          localStorage.setItem('gist_id', id);
          setGhToken(token);
          setGistId(id);
          setAllMonths(months);
          setSyncStatus('ok');
          setTokenInput('');
        } catch(e) {
          setSyncStatus('error');
          setSyncMsg(e.message);
        }
      };

      const saveMonth = async () => {
        if (!ghToken || !gistId) { alert('Primero conecta con GitHub en la pestaña Config'); return; }
        setSyncStatus('saving');
        setSyncMsg('Guardando...');
        const key = cfg.mes + '-' + cfg.anio;
        const monthData = {
          savedAt: new Date().toISOString(),
          label: key,
          cfg, prods, compras, ventas, gastos, otros, imp
        };
        const newMonths = { ...allMonths, [key]: monthData };
        try {
          const res = await fetch(`https://api.github.com/gists/${gistId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              files: { [GIST_FILENAME]: { content: JSON.stringify({ months: newMonths }) } }
            })
          });
          if (!res.ok) throw new Error('Error al guardar');
          setAllMonths(newMonths);
          setSyncStatus('ok');
          setSyncMsg('Guardado ✓  ' + key);
        } catch(e) {
          setSyncStatus('error');
          setSyncMsg('Error al guardar: ' + e.message);
        }
      };

      const loadMonth = (key) => {
        const m = allMonths[key];
        if (!m) return;
        if (!confirm('¿Cargar ' + key + '? Se reemplazarán los datos actuales en pantalla.')) return;
        setCfg(m.cfg);
        setProds(m.prods || []);
        setCompras(m.compras || []);
        setVentas(m.ventas || []);
        setGastos(m.gastos || []);
        setOtros(m.otros || []);
        setImp(m.imp || { isr:"", curIsr:"USD", ptu:"", curPtu:"USD", ex:"", curEx:"USD" });
        setTab('resultados');
        setSyncMsg(key + ' cargado ✓');
      };

      const deleteMonth = async (key) => {
        if (!confirm('¿Eliminar el mes ' + key + '? Esta acción no se puede deshacer.')) return;
        const newMonths = { ...allMonths };
        delete newMonths[key];
        try {
          await fetch(`https://api.github.com/gists/${gistId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              files: { [GIST_FILENAME]: { content: JSON.stringify({ months: newMonths }) } }
            })
          });
          setAllMonths(newMonths);
          setSyncMsg(key + ' eliminado');
        } catch(e) { setSyncMsg('Error al eliminar'); }
      };

      const newMonth = () => {
        if (!confirm('¿Comenzar un mes nuevo? Los datos actuales en pantalla se limpiarán (los meses guardados permanecen).')) return;
        setProds([]); setCompras([]); setVentas([]); setGastos([]); setOtros([]);
        setImp({ isr:"", curIsr:"USD", ptu:"", curPtu:"USD", ex:"", curEx:"USD" });
        const now = new Date();
        setCfg(c => ({ ...c, mes: MESES[now.getMonth()], anio: now.getFullYear() }));
        setTab('config');
      };

      // ── Conversions ──
      const toUSD = (amount, cur) => {
        const a = num(amount);
        if (cur==='USD') return a;
        if (cur==='CUP') return num(cfg.CUP_inf)>0 ? a/num(cfg.CUP_inf) : 0;
        if (cur==='EUR') return a*num(cfg.EUR_usd);
        return a;
      };
      const toCUP_of = (amount, cur) => {
        const a = num(amount);
        if (cur==='USD') return a*num(cfg.CUP_of);
        if (cur==='CUP') return a;
        if (cur==='EUR') return a*num(cfg.EUR_usd)*num(cfg.CUP_of);
        return a;
      };

      const costProm = useMemo(() => {
        const r = {};
        prods.forEach(p => {
          const cs = compras.filter(c=>c.pid===p.id);
          const tq = cs.reduce((s,c)=>s+num(c.qty),0);
          const tv = cs.reduce((s,c)=>s+num(c.qty)*toUSD(c.punit,c.cur),0);
          r[p.id] = tq>0 ? tv/tq : 0;
        });
        return r;
      }, [prods, compras, cfg.CUP_inf, cfg.EUR_usd]);

      const st = useMemo(() => {
        const vBruta = ventas.reduce((s,v)=>s+v.items.reduce((ss,i)=>ss+num(i.qty)*toUSD(i.punit,i.cur),0),0);
        const cVentas = ventas.reduce((s,v)=>s+v.items.reduce((ss,i)=>ss+num(i.qty)*(costProm[i.pid]||0),0),0);
        const comis = ventas.reduce((s,v)=>{const t=v.items.reduce((ss,i)=>ss+num(i.qty)*toUSD(i.punit,i.cur),0);return s+t*num(v.com)/100;},0);
        const totComp = compras.reduce((s,c)=>s+num(c.qty)*toUSD(c.punit,c.cur),0);
        const invFin = num(cfg.invIni)+totComp-cVentas;
        const gOp = gastos.reduce((s,g)=>s+toUSD(g.monto,g.cur),0);
        const totGasOp = comis+gOp;
        const oIng = otros.filter(o=>o.tipo==="ingreso").reduce((s,o)=>s+toUSD(o.monto,o.cur),0);
        const oGas = otros.filter(o=>o.tipo==="gasto").reduce((s,o)=>s+toUSD(o.monto,o.cur),0);
        const totImp = toUSD(imp.isr,imp.curIsr||'USD')+toUSD(imp.ptu,imp.curPtu||'USD')+toUSD(imp.ex,imp.curEx||'USD');
        const uBruta=vBruta-cVentas, uOper=uBruta-totGasOp, uAnte=uOper+oIng-oGas, uNeta=uAnte-totImp;
        return { vBruta,cVentas,uBruta,comis,gOp,totGasOp,oIng,oGas,totImp,uOper,uAnte,uNeta,totComp,invFin,
          mbr:vBruta>0?uBruta/vBruta:0, mnr:vBruta>0?uNeta/vBruta:0 };
      }, [ventas,compras,gastos,otros,imp,costProm,cfg]);

      const onat = useMemo(() => {
        const ventasCUP = ventas.reduce((s,v)=>s+v.items.reduce((ss,i)=>ss+num(i.qty)*toCUP_of(i.punit,i.cur),0),0);
        const impVentas = ventasCUP*0.11;
        const utilCUP = st.uAnte*num(cfg.CUP_of);
        const impIngresos = utilCUP>0 ? utilCUP*0.35 : 0;
        const totalONAT = impVentas+impIngresos;
        return { ventasCUP, impVentas, utilCUP, impIngresos, totalONAT,
          usd_of: num(cfg.CUP_of)>0 ? totalONAT/num(cfg.CUP_of) : 0,
          usd_inf: num(cfg.CUP_inf)>0 ? totalONAT/num(cfg.CUP_inf) : 0 };
      }, [st, cfg, ventas]);

      // ── Handlers ──
      const addProd=()=>{if(!fp.nom)return;setProds(p=>[...p,{id:uid(),nom:fp.nom,uni:fp.uni}]);setFp({nom:"",uni:"pza"});};
      const delProd=(id)=>setProds(p=>p.filter(x=>x.id!==id));
      const addComp=()=>{if(!fc.pid||!fc.qty||!fc.punit)return;setCompras(c=>[...c,{...fc,id:uid()}]);setFc({fecha:"",prov:"",pid:"",qty:"",punit:"",cur:"USD"});};
      const delComp=(id)=>setCompras(c=>c.filter(x=>x.id!==id));
      const addVItem=()=>{if(!fvi.pid||!fvi.qty||!fvi.punit)return;setFv(v=>({...v,items:[...v.items,{...fvi,id:uid()}]}));setFvi({pid:"",qty:"",punit:"",cur:"USD"});};
      const delVItem=(id)=>setFv(v=>({...v,items:v.items.filter(i=>i.id!==id)}));
      const addVenta=()=>{if(!fv.cli||fv.items.length===0)return;setVentas(vs=>[...vs,{...fv,id:uid()}]);setFv({fecha:"",cli:"",vend:"",com:cfg.comDef,items:[]});};
      const delVenta=(id)=>setVentas(v=>v.filter(x=>x.id!==id));
      const addGasto=()=>{if(!fg.conc||!fg.monto)return;setGastos(g=>[...g,{...fg,id:uid()}]);setFg({cat:GCATS[0],conc:"",monto:"",cur:"USD"});};
      const delGasto=(id)=>setGastos(g=>g.filter(x=>x.id!==id));
      const addOtro=()=>{if(!fo.conc||!fo.monto)return;setOtros(o=>[...o,{...fo,id:uid()}]);setFo({tipo:"ingreso",conc:"",monto:"",cur:"USD"});};
      const delOtro=(id)=>setOtros(o=>o.filter(x=>x.id!==id));

      // ── Format ──
      const fmtC=(a,cur)=>{const v=num(a);const abs=Math.abs(v).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});const s=v<0?"-":"";if(cur==='USD')return s+'$'+abs;if(cur==='EUR')return s+'€'+abs;return s+abs+' CUP';};
      const fmtEq=(a,cur)=>{const m=fmtC(a,cur);if(cur==='USD')return m;return m+' (≈'+fmtC(toUSD(a,cur),'USD')+')';};
      const fmtM=(v)=>{const n2=num(v);const abs=Math.abs(n2).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});return (n2<0?"-":"")+"$"+abs;};
      const fmtCUP=(v)=>{const n2=num(v);const abs=Math.abs(n2).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});return (n2<0?"-":"")+abs+" CUP";};
      const pNom=(id)=>{const p=prods.find(p=>p.id===id);return p?p.nom:"?";};
      const pUni=(id)=>{const p=prods.find(p=>p.id===id);return p?p.uni:"";};

      const exportXL=()=>{
        const wb=XLSX.utils.book_new();const pct2=v=>`${(num(v)*100).toFixed(1)}%`;
        const er=[["ESTADO DE RESULTADOS (USD - Tasa Informal)","",""],
          [cfg.nombre,"",""],[cfg.mes+" "+cfg.anio,"",""],
          ["CUP oficial: 1 USD = "+cfg.CUP_of+" | CUP informal: 1 USD = "+cfg.CUP_inf+" | EUR: 1 EUR = "+cfg.EUR_usd+" USD","",""],
          ["","",""],["CONCEPTO","MONTO USD","% VENTAS"],
          ["Ventas Brutas",st.vBruta,"100.0%"],["","",""],
          ["COSTO DE VENTAS","",""],["  Inventario Inicial",num(cfg.invIni),""],
          ["  (+) Compras",st.totComp,""],["  (-) Inventario Final",st.invFin,""],
          ["  = Costo de Ventas",st.cVentas,st.vBruta>0?pct2(st.cVentas/st.vBruta):""],["","",""],
          ["UTILIDAD BRUTA",st.uBruta,st.vBruta>0?pct2(st.mbr):""],["","",""],
          ["GASTOS OPERATIVOS","",""],
          ["  Comisiones",st.comis,st.vBruta>0?pct2(st.comis/st.vBruta):""],
          ...gastos.map(g=>["  "+g.cat+" - "+g.conc+" ("+g.cur+")",toUSD(g.monto,g.cur),""]),
          ["  = Total Gastos",st.totGasOp,st.vBruta>0?pct2(st.totGasOp/st.vBruta):""],["","",""],
          ["UTILIDAD DE OPERACIÓN",st.uOper,st.vBruta>0?pct2(st.uOper/st.vBruta):""],["","",""],
          ["OTROS","",""],
          ...otros.filter(o=>o.tipo==="ingreso").map(o=>["  (+) "+o.conc+" ("+o.cur+")",toUSD(o.monto,o.cur),""]),
          ...otros.filter(o=>o.tipo==="gasto").map(o=>["  (-) "+o.conc+" ("+o.cur+")",-toUSD(o.monto,o.cur),""]),
          ["  = Neto Otros",st.oIng-st.oGas,""],["","",""],
          ["UTILIDAD ANTES DE IMPUESTOS",st.uAnte,st.vBruta>0?pct2(st.uAnte/st.vBruta):""],["","",""],
          ["ONAT (equiv. USD informal)",onat.usd_inf,""],
          ["UTILIDAD NETA",st.uNeta,st.vBruta>0?pct2(st.mnr):""]];
        const ws1=XLSX.utils.aoa_to_sheet(er);ws1["!cols"]=[{wch:52},{wch:20},{wch:12}];
        XLSX.utils.book_append_sheet(wb,ws1,"Estado de Resultados");
        const onatS=[["CÁLCULO ONAT",""],["",""],
          ["Tasa oficial: 1 USD = "+cfg.CUP_of+" CUP",""],["Tasa informal: 1 USD = "+cfg.CUP_inf+" CUP",""],["",""],
          ["CONCEPTO","MONTO CUP"],
          ["Ventas totales (USD)",st.vBruta],["Ventas en CUP (oficial)",onat.ventasCUP],["11% Impuesto s/ Ventas",onat.impVentas],["",""],
          ["Utilidad antes imp. (USD)",st.uAnte],["Utilidad en CUP (oficial)",onat.utilCUP],["35% Impuesto s/ Ingresos",onat.impIngresos],["",""],
          ["TOTAL ONAT (CUP)",onat.totalONAT],["Equiv. USD (oficial)",onat.usd_of],["Equiv. USD (informal)",onat.usd_inf]];
        XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(onatS),"ONAT");
        const vd=[["VENTA#","FECHA","CLIENTE","VENDEDOR","COM%","PRODUCTO","CANT","P.VENTA","MONEDA","SUBTOTAL USD","COSTO USD","MARGEN","COMISIÓN"]];
        ventas.forEach(v=>{v.items.forEach(i=>{const prod=prods.find(x=>x.id===i.pid);const sub=num(i.qty)*toUSD(i.punit,i.cur);const ct=num(i.qty)*(costProm[i.pid]||0);vd.push([v.id,v.fecha,v.cli,v.vend,num(v.com)/100,prod?prod.nom:"?",num(i.qty),num(i.punit),i.cur,sub,ct,sub>0?(sub-ct)/sub:0,sub*num(v.com)/100]);});});
        XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(vd),"Ventas Detalladas");
        const cd=[["FECHA","PROVEEDOR","PRODUCTO","CANT","P.COSTO","MONEDA","TOTAL USD"]];
        compras.forEach(c=>{const p=prods.find(x=>x.id===c.pid);cd.push([c.fecha,c.prov,p?p.nom:"?",num(c.qty),num(c.punit),c.cur,num(c.qty)*toUSD(c.punit,c.cur)]);});
        XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cd),"Compras");
        const gd=[["CATEGORÍA","CONCEPTO","MONTO","MONEDA","USD"]];
        gastos.forEach(g=>gd.push([g.cat,g.conc,num(g.monto),g.cur,toUSD(g.monto,g.cur)]));
        XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(gd),"Gastos");
        const comd=[["VENDEDOR","VENTAS USD","COMISIÓN USD"]];
        const bV={};ventas.forEach(v=>{const t=v.items.reduce((s,i)=>s+num(i.qty)*toUSD(i.punit,i.cur),0);if(!bV[v.vend])bV[v.vend]={v:0,c:0};bV[v.vend].v+=t;bV[v.vend].c+=t*num(v.com)/100;});
        Object.entries(bV).forEach(([vend,d])=>comd.push([vend,d.v,d.c]));
        XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(comd),"Comisiones");
        XLSX.writeFile(wb,"ER_"+cfg.nombre.replace(/\s+/g,"_")+"_"+cfg.mes+cfg.anio+".xlsx");
      };

      // ── Styles ──
      const BG="#0d1b0e",MID="#152218",MID2="#1a2d1c",ACE="#52b788",GOLD="#f4a228",MUTED="#6d9073",LIGHT="#e4ede5",RED="#e05252",BLUE="#5ba3d9",PUR="#c084fc";
      const inp={padding:"7px 10px",border:"1px solid #223d25",borderRadius:4,background:"#0d1b0e",color:LIGHT,fontSize:12,outline:"none",fontFamily:"inherit",width:"100%",boxSizing:"border-box"};
      const lbl={fontSize:10,color:MUTED,marginBottom:3,display:"block",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em"};
      const TH={background:MID2,color:MUTED,fontSize:10,fontWeight:700,padding:"9px 11px",textAlign:"left",textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid #223d25",whiteSpace:"nowrap"};
      const TD=(col)=>({padding:"8px 11px",fontSize:12,color:col||LIGHT,borderBottom:"1px solid "+MID2});
      const card={background:MID,borderRadius:6,padding:"18px 20px",marginBottom:14};
      const btn=(v)=>({padding:v==="sm"?"4px 10px":"8px 18px",background:v==="d"?RED:v==="g"?GOLD:v==="pur"?PUR:ACE,color:v==="g"?"#1a0e00":v==="pur"?BG:BG,border:"none",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:800,fontFamily:"inherit",whiteSpace:"nowrap"});
      const tabB=(t)=>({padding:"7px 13px",background:tab===t?ACE:"transparent",color:tab===t?BG:MUTED,border:"none",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap"});
      const row=(g)=>({display:"flex",gap:g||8,flexWrap:"wrap",marginBottom:g||8});
      const fld=(w)=>({display:"flex",flexDirection:"column",flex:w||1,minWidth:80});
      const curCol=(cur)=>cur==='USD'?GOLD:cur==='EUR'?BLUE:PUR;
      const curBadge=(cur)=><span style={{fontSize:9,fontWeight:800,padding:"2px 5px",borderRadius:3,background:curCol(cur)+'22',color:curCol(cur),fontFamily:"monospace"}}>{cur}</span>;
      const CurSel=({value,onChange})=>(<select style={{...inp,width:68,flex:'none',borderLeft:'none',borderRadius:'0 4px 4px 0',color:curCol(value),fontWeight:700}} value={value} onChange={e=>onChange(e.target.value)}>{CURRENCIES.map(c=><option key={c} style={{color:LIGHT}}>{c}</option>)}</select>);
      const AmtCur=({amt,cur,onAmtChange,onCurChange,ph})=>(<div style={{display:"flex"}}><input style={{...inp,borderRadius:"4px 0 0 4px",flex:1}} type="number" value={amt} onChange={e=>onAmtChange(e.target.value)} placeholder={ph||"0.00"}/><CurSel value={cur} onChange={onCurChange}/></div>);

                  {ventas.length>0&&(()=>{const bV={};ventas.forEach(v=>{const t=v.items.reduce((s,i)=>s+num(i.qty)*toUSD(i.punit,i.cur),0);const k=v.vend||"Sin nombre";if(!bV[k])bV[k]={v:0,c:0};bV[k].v+=t;bV[k].c+=t*num(v.com)/100;});return(<div style={{...card,padding:0,overflow:"hidden",marginBottom:14}}><div style={{background:MID2,padding:"10px 14px",fontSize:10,color:GOLD,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Comisiones por Vendedor</div><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>Vendedor</th><th style={TH}>Ventas USD</th><th style={TH}>Comisión USD</th></tr></thead><tbody>{Object.entries(bV).map(([vend,d])=><tr key={vend}><td style={TD()}>{vend}</td><td style={TD(ACE)}>{fmtM(d.v)}</td><td style={TD(GOLD)}>{fmtM(d.c)}</td></tr>)}</tbody></table></div>);})()}
                  <div style={{textAlign:"center"}}>
                    <button onClick={exportXL} style={{...btn("g"),padding:"11px 28px",fontSize:13}}>⬇ Exportar a Excel</button>
                    <div style={{fontSize:10,color:MUTED,marginTop:6,lineHeight:1.6}}>6 hojas: ER · ONAT · Ventas · Compras · Gastos · Comisiones</div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
