<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Resultados — Almacén Mayorista</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#0d1b0e;}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const GCATS = ["Renta/Bodega","Sueldos Admin","Luz/Agua/Internet","Mantenimiento","Papelería","Depreciación","Seguros","Honorarios Externos","Publicidad","Empaques/Embalaje","Fletes de Entrega","Otros"];

    let _uid = 200;
    const uid = () => String(++_uid);
    const num = (v) => isNaN(parseFloat(v)) ? 0 : parseFloat(v);

    function App() {
      const [tab, setTab] = useState("resultados");
      const [cfg, setCfg] = useState({ nombre:"Mi Almacén Mayorista", mes:"Junio", anio:2025, mon:"$", comDef:5, invIni:0 });
      const [prods, setProds] = useState([]);
      const [compras, setCompras] = useState([]);
      const [ventas, setVentas] = useState([]);
      const [gastos, setGastos] = useState([]);
      const [otros, setOtros] = useState([]);
      const [imp, setImp] = useState({ isr:"", ptu:"", ex:"" });
      const [fp, setFp] = useState({ nom:"", uni:"pza" });
      const [fc, setFc] = useState({ fecha:"", prov:"", pid:"", qty:"", punit:"" });
      const [fv, setFv] = useState({ fecha:"", cli:"", vend:"", com:5, items:[] });
      const [fvi, setFvi] = useState({ pid:"", qty:"", punit:"" });
      const [fg, setFg] = useState({ cat:GCATS[0], conc:"", monto:"" });
      const [fo, setFo] = useState({ tipo:"ingreso", conc:"", monto:"" });

      const costProm = useMemo(() => {
        const r = {};
        prods.forEach(p => {
          const cs = compras.filter(c => c.pid === p.id);
          const tq = cs.reduce((s,c) => s + num(c.qty), 0);
          const tv = cs.reduce((s,c) => s + num(c.qty) * num(c.punit), 0);
          r[p.id] = tq > 0 ? tv / tq : 0;
        });
        return r;
      }, [prods, compras]);

      const st = useMemo(() => {
        const vBruta = ventas.reduce((s,v) => s + v.items.reduce((ss,i) => ss + num(i.qty)*num(i.punit), 0), 0);
        const cVentas = ventas.reduce((s,v) => s + v.items.reduce((ss,i) => ss + num(i.qty)*(costProm[i.pid]||0), 0), 0);
        const comis = ventas.reduce((s,v) => { const tot = v.items.reduce((ss,i) => ss + num(i.qty)*num(i.punit), 0); return s + tot * num(v.com) / 100; }, 0);
        const totComp = compras.reduce((s,c) => s + num(c.qty)*num(c.punit), 0);
        const invFin = num(cfg.invIni) + totComp - cVentas;
        const gOp = gastos.reduce((s,g) => s + num(g.monto), 0);
        const totGasOp = comis + gOp;
        const oIng = otros.filter(o => o.tipo==="ingreso").reduce((s,o) => s + num(o.monto), 0);
        const oGas = otros.filter(o => o.tipo==="gasto").reduce((s,o) => s + num(o.monto), 0);
        const totImp = num(imp.isr) + num(imp.ptu) + num(imp.ex);
        const uBruta = vBruta - cVentas;
        const uOper = uBruta - totGasOp;
        const uAnte = uOper + oIng - oGas;
        const uNeta = uAnte - totImp;
        return { vBruta, cVentas, uBruta, comis, gOp, totGasOp, oIng, oGas, totImp, uOper, uAnte, uNeta, totComp, invFin,
          mbr: vBruta>0 ? uBruta/vBruta : 0, mnr: vBruta>0 ? uNeta/vBruta : 0 };
      }, [ventas, compras, gastos, otros, imp, costProm, cfg.invIni]);

      const addProd = () => { if(!fp.nom) return; setProds(p=>[...p,{id:uid(),nom:fp.nom,uni:fp.uni}]); setFp({nom:"",uni:"pza"}); };
      const delProd = (id) => setProds(p=>p.filter(x=>x.id!==id));
      const addComp = () => { if(!fc.pid||!fc.qty||!fc.punit) return; setCompras(c=>[...c,{...fc,id:uid()}]); setFc({fecha:"",prov:"",pid:"",qty:"",punit:""}); };
      const delComp = (id) => setCompras(c=>c.filter(x=>x.id!==id));
      const addVItem = () => { if(!fvi.pid||!fvi.qty||!fvi.punit) return; setFv(v=>({...v,items:[...v.items,{...fvi,id:uid()}]})); setFvi({pid:"",qty:"",punit:""}); };
      const delVItem = (id) => setFv(v=>({...v,items:v.items.filter(i=>i.id!==id)}));
      const addVenta = () => { if(!fv.cli||fv.items.length===0) return; setVentas(vs=>[...vs,{...fv,id:uid()}]); setFv({fecha:"",cli:"",vend:"",com:cfg.comDef,items:[]}); };
      const delVenta = (id) => setVentas(v=>v.filter(x=>x.id!==id));
      const addGasto = () => { if(!fg.conc||!fg.monto) return; setGastos(g=>[...g,{...fg,id:uid()}]); setFg({cat:GCATS[0],conc:"",monto:""}); };
      const delGasto = (id) => setGastos(g=>g.filter(x=>x.id!==id));
      const addOtro = () => { if(!fo.conc||!fo.monto) return; setOtros(o=>[...o,{...fo,id:uid()}]); setFo({tipo:"ingreso",conc:"",monto:""}); };
      const delOtro = (id) => setOtros(o=>o.filter(x=>x.id!==id));

      const exportXL = () => {
        const wb = XLSX.utils.book_new();
        const pct2 = v => `${(num(v)*100).toFixed(1)}%`;
        const er = [
          ["ESTADO DE RESULTADOS","",""],["  "+cfg.nombre,"",""],["  Período: "+cfg.mes+" "+cfg.anio,"",""],["","",""],
          ["CONCEPTO","MONTO","% VENTAS"],["INGRESOS","",""],["  Ventas Brutas", st.vBruta, "100.0%"],["","",""],
          ["COSTO DE VENTAS","",""],["  Inventario Inicial", num(cfg.invIni), ""],
          ["  (+) Compras Netas del Período", st.totComp, ""],["  (-) Inventario Final", st.invFin, ""],
          ["  = Costo de Ventas", st.cVentas, st.vBruta>0 ? pct2(st.cVentas/st.vBruta) : ""],["","",""],
          ["UTILIDAD BRUTA", st.uBruta, st.vBruta>0 ? pct2(st.mbr) : ""],["","",""],
          ["GASTOS OPERATIVOS","",""],["  Comisiones sobre Ventas", st.comis, st.vBruta>0 ? pct2(st.comis/st.vBruta) : ""],
          ...gastos.map(g => ["  "+g.cat+" - "+g.conc, num(g.monto), st.vBruta>0 ? pct2(num(g.monto)/st.vBruta) : ""]),
          ["  = Total Gastos Operativos", st.totGasOp, st.vBruta>0 ? pct2(st.totGasOp/st.vBruta) : ""],["","",""],
          ["UTILIDAD DE OPERACIÓN", st.uOper, st.vBruta>0 ? pct2(st.uOper/st.vBruta) : ""],["","",""],
          ["OTROS INGRESOS Y GASTOS","",""],
          ...otros.filter(o=>o.tipo==="ingreso").map(o => ["  (+) "+o.conc, num(o.monto), ""]),
          ...otros.filter(o=>o.tipo==="gasto").map(o => ["  (-) "+o.conc, -num(o.monto), ""]),
          ["  = Neto Otros", st.oIng - st.oGas, ""],["","",""],
          ["UTILIDAD ANTES DE IMPUESTOS", st.uAnte, st.vBruta>0 ? pct2(st.uAnte/st.vBruta) : ""],["","",""],
          ["IMPUESTOS","",""],["  ISR / Impuesto sobre la Renta", num(imp.isr), ""],
          ["  PTU", num(imp.ptu), ""],["  Otros Impuestos", num(imp.ex), ""],
          ["  = Total Impuestos", st.totImp, ""],["","",""],
          ["UTILIDAD NETA", st.uNeta, st.vBruta>0 ? pct2(st.mnr) : ""],
        ];
        const ws1 = XLSX.utils.aoa_to_sheet(er);
        ws1["!cols"] = [{wch:50},{wch:20},{wch:12}];
        XLSX.utils.book_append_sheet(wb, ws1, "Estado de Resultados");

        const vd = [["VENTA#","FECHA","CLIENTE","VENDEDOR","COM%","PRODUCTO","UNIDAD","CANTIDAD","P.VENTA UNIT","SUBTOTAL","COSTO UNIT","COSTO TOTAL","MARGEN %","COMISIÓN ITEM"]];
        ventas.forEach(v => {
          v.items.forEach(i => {
            const prod = prods.find(x=>x.id===i.pid);
            const cu = costProm[i.pid]||0;
            const sub = num(i.qty)*num(i.punit);
            const ct = num(i.qty)*cu;
            vd.push([v.id, v.fecha, v.cli, v.vend, num(v.com)/100, prod?prod.nom:"?", prod?prod.uni:"",
              num(i.qty), num(i.punit), sub, cu, ct, sub>0 ? (sub-ct)/sub : 0, sub * num(v.com)/100]);
          });
        });
        const ws2 = XLSX.utils.aoa_to_sheet(vd);
        XLSX.utils.book_append_sheet(wb, ws2, "Ventas Detalladas");

        const cd = [["#","FECHA","PROVEEDOR","PRODUCTO","UNIDAD","CANTIDAD","PRECIO COSTO","TOTAL"]];
        compras.forEach(c => { const prod = prods.find(x=>x.id===c.pid); cd.push([c.id, c.fecha, c.prov, prod?prod.nom:"?", prod?prod.uni:"", num(c.qty), num(c.punit), num(c.qty)*num(c.punit)]); });
        cd.push(["","","","","","","TOTAL", st.totComp]);
        const ws3 = XLSX.utils.aoa_to_sheet(cd);
        XLSX.utils.book_append_sheet(wb, ws3, "Compras");

        const gd = [["CATEGORÍA","CONCEPTO","MONTO"]];
        gd.push(["Comisiones sobre Ventas","(automático)", st.comis]);
        gastos.forEach(g => gd.push([g.cat, g.conc, num(g.monto)]));
        gd.push(["","TOTAL", st.totGasOp]);
        const ws4 = XLSX.utils.aoa_to_sheet(gd);
        XLSX.utils.book_append_sheet(wb, ws4, "Gastos Operativos");

        const comd = [["VENDEDOR","# VENTAS","VENTAS TOTALES","% COMISIÓN","COMISIÓN A PAGAR"]];
        const byVend = {};
        ventas.forEach(v => {
          const tot = v.items.reduce((s,i) => s + num(i.qty)*num(i.punit), 0);
          if(!byVend[v.vend]) byVend[v.vend] = { n:0, ventas:0, com:0 };
          byVend[v.vend].n++; byVend[v.vend].ventas += tot; byVend[v.vend].com += tot * num(v.com)/100;
        });
        Object.entries(byVend).forEach(([vend,d]) => comd.push([vend, d.n, d.ventas, d.ventas>0 ? d.com/d.ventas : 0, d.com]));
        comd.push(["TOTAL", ventas.length, st.vBruta, st.vBruta>0 ? st.comis/st.vBruta : 0, st.comis]);
        const ws5 = XLSX.utils.aoa_to_sheet(comd);
        XLSX.utils.book_append_sheet(wb, ws5, "Comisiones por Vendedor");

        const pd = [["PRODUCTO","UNIDAD","COSTO PROM POND.","COMPRAS (QTY)","COMPRAS ($)","VENDIDO (QTY)","COSTO VENTAS","INV. DISPONIBLE"]];
        prods.forEach(p => {
          const cs = compras.filter(c=>c.pid===p.id);
          const tq = cs.reduce((s,c)=>s+num(c.qty),0); const tv = cs.reduce((s,c)=>s+num(c.qty)*num(c.punit),0);
          const vq = ventas.reduce((s,v)=>s+v.items.filter(i=>i.pid===p.id).reduce((ss,i)=>ss+num(i.qty),0),0);
          pd.push([p.nom, p.uni, costProm[p.id]||0, tq, tv, vq, vq*(costProm[p.id]||0), tq-vq]);
        });
        const ws6 = XLSX.utils.aoa_to_sheet(pd);
        XLSX.utils.book_append_sheet(wb, ws6, "Costos por Producto");

        XLSX.writeFile(wb, "ER_"+cfg.nombre.replace(/\s+/g,"_")+"_"+cfg.mes+cfg.anio+".xlsx");
      };

      const BG="#0d1b0e", MID="#152218", MID2="#1a2d1c", ACE="#52b788", GOLD="#f4a228", MUTED="#6d9073", LIGHT="#e4ede5", RED="#e05252";
      const inp = { padding:"7px 10px", border:"1px solid #223d25", borderRadius:4, background:"#0d1b0e", color:LIGHT, fontSize:12, outline:"none", fontFamily:"inherit", width:"100%", boxSizing:"border-box" };
      const lbl = { fontSize:10, color:MUTED, marginBottom:3, display:"block", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em" };
      const TH = { background:MID2, color:MUTED, fontSize:10, fontWeight:700, padding:"9px 11px", textAlign:"left", textTransform:"uppercase", letterSpacing:"0.06em", borderBottom:"1px solid #223d25", whiteSpace:"nowrap" };
      const TD = (col) => ({ padding:"8px 11px", fontSize:12, color:col||LIGHT, borderBottom:"1px solid "+MID2 });
      const card = { background:MID, borderRadius:6, padding:"18px 20px", marginBottom:14 };
      const btn = (v) => ({ padding: v==="sm"?"4px 10px":"8px 18px", background: v==="d"?RED:v==="g"?GOLD:ACE, color: v==="g"?"#1a0e00":BG, border:"none", borderRadius:4, cursor:"pointer", fontSize:11, fontWeight:800, fontFamily:"inherit", whiteSpace:"nowrap" });
      const tabB = (t) => ({ padding:"7px 13px", background:tab===t?ACE:"transparent", color:tab===t?BG:MUTED, border:"none", borderRadius:4, cursor:"pointer", fontSize:11, fontWeight:700, fontFamily:"inherit", whiteSpace:"nowrap" });
      const row = (g) => ({ display:"flex", gap:g||8, flexWrap:"wrap", marginBottom:g||8 });
      const fld = (w) => ({ display:"flex", flexDirection:"column", flex:w||1, minWidth:80 });

      const fmtM = (v) => { const n2=num(v); const abs=Math.abs(n2).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2}); return (n2<0?"-":"")+cfg.mon+abs; };
      const pNom = (id) => { const p=prods.find(p=>p.id===id); return p?p.nom:"?"; };
      const pUni = (id) => { const p=prods.find(p=>p.id===id); return p?p.uni:""; };

      const SRow = ({ label, val, indent, bold, big }) => {
        indent = indent||0; bold = bold||false; big = big||false;
        const v = num(val); const isPos = v >= 0;
        const textColor = big ? (isPos ? ACE : RED) : (bold ? LIGHT : MUTED);
        return (
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
            padding:(big?"12px":"5px")+" 16px", paddingLeft:(indent*16)+16,
            background:big?MID2:"transparent", borderRadius:big?4:0, marginBottom:big?4:0 }}>
            <span style={{ fontSize:big?13:11, fontWeight:bold||big?700:400, color:textColor }}>{label}</span>
            <span style={{ fontSize:big?15:12, fontWeight:bold||big?700:400, color:big?(isPos?ACE:RED):textColor,
              fontFamily:"'Courier New',monospace", minWidth:110, textAlign:"right" }}>{fmtM(val)}</span>
          </div>
        );
      };

      return (
        <div style={{ background:BG, minHeight:"100vh", color:LIGHT, fontFamily:"'Segoe UI',system-ui,sans-serif", fontSize:13 }}>
          <div style={{ background:MID, padding:"12px 20px", borderBottom:"3px solid "+ACE, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
            <div>
              <div style={{ fontSize:16, fontWeight:800, color:ACE }}>📒 {cfg.nombre}</div>
              <div style={{ fontSize:10, color:MUTED, marginTop:2, fontFamily:"monospace" }}>Estado de Resultados · {cfg.mes} {cfg.anio}</div>
            </div>
            <div style={{ display:"flex", gap:12, alignItems:"center", flexWrap:"wrap" }}>
              <div style={{ fontSize:11, color:MUTED, fontFamily:"monospace" }}>
                Ventas <span style={{ color:ACE, fontWeight:700 }}>{fmtM(st.vBruta)}</span>
                {" · "}Utilidad neta <span style={{ color:num(st.uNeta)>=0?ACE:RED, fontWeight:700 }}>{fmtM(st.uNeta)}</span>
              </div>
              <button onClick={exportXL} style={{ ...btn("g"), padding:"9px 20px", fontSize:12 }}>⬇ Exportar Excel</button>
            </div>
          </div>

          <div style={{ background:MID, padding:"8px 16px", display:"flex", gap:4, flexWrap:"wrap", borderBottom:"1px solid #223d25" }}>
            {[["config","⚙ Config"],["prods","📦 Productos"],["compras","🛒 Compras"],["ventas","💰 Ventas"],["gastos","🏢 Gastos"],["otros","🔄 Otros"],["imp","🏛 Impuestos"],["resultados","📊 Resultados"]].map(([t,l]) => (
              <button key={t} style={tabB(t)} onClick={() => setTab(t)}>{l}</button>
            ))}
          </div>

          <div style={{ padding:"20px", maxWidth:1080, margin:"0 auto" }}>

            {tab==="config" && (
              <div style={card}>
                <div style={{ fontSize:13, fontWeight:700, color:ACE, marginBottom:14 }}>⚙ Configuración del Período</div>
                <div style={row()}>
                  <div style={fld(3)}><span style={lbl}>Nombre del Negocio</span><input style={inp} value={cfg.nombre} onChange={e=>setCfg(c=>({...c,nombre:e.target.value}))} placeholder="Nombre del almacén"/></div>
                  <div style={fld(1)}><span style={lbl}>Mes</span><select style={inp} value={cfg.mes} onChange={e=>setCfg(c=>({...c,mes:e.target.value}))}>{MESES.map(m=><option key={m}>{m}</option>)}</select></div>
                  <div style={fld(1)}><span style={lbl}>Año</span><input style={inp} type="number" value={cfg.anio} onChange={e=>setCfg(c=>({...c,anio:e.target.value}))}/></div>
                  <div style={fld(1)}><span style={lbl}>Símbolo moneda</span><input style={inp} value={cfg.mon} onChange={e=>setCfg(c=>({...c,mon:e.target.value}))} placeholder="$"/></div>
                  <div style={fld(1)}><span style={lbl}>Comisión % default</span><input style={inp} type="number" value={cfg.comDef} onChange={e=>setCfg(c=>({...c,comDef:e.target.value}))}/></div>
                  <div style={fld(2)}><span style={lbl}>Inventario inicial (a costo)</span><input style={inp} type="number" value={cfg.invIni} onChange={e=>setCfg(c=>({...c,invIni:e.target.value}))} placeholder="0.00"/></div>
                </div>
                <div style={{ marginTop:10, padding:"10px 14px", background:BG, borderRadius:4, fontSize:11, color:MUTED, lineHeight:1.7 }}>
                  <strong style={{color:ACE}}>📋 Flujo:</strong> Config → Productos → Compras → Ventas → Gastos → Resultados → Exportar Excel
                </div>
              </div>
            )}

            {tab==="prods" && (
              <div>
                <div style={card}>
                  <div style={{ fontSize:13, fontWeight:700, color:ACE, marginBottom:12 }}>📦 Catálogo de Productos</div>
                  <div style={row(8)}>
                    <div style={fld(4)}><span style={lbl}>Nombre del Producto</span><input style={inp} value={fp.nom} onChange={e=>setFp(p=>({...p,nom:e.target.value}))} placeholder="Ej: Azúcar 50kg"/></div>
                    <div style={fld(1)}><span style={lbl}>Unidad</span><input style={inp} value={fp.uni} onChange={e=>setFp(p=>({...p,uni:e.target.value}))} placeholder="pza, bulto, kg"/></div>
                    <div style={{ alignSelf:"flex-end", paddingBottom:1 }}><button onClick={addProd} style={btn()}>+ Agregar</button></div>
                  </div>
                </div>
                {prods.length > 0 && (
                  <div style={{ ...card, padding:0, overflow:"hidden" }}>
                    <table style={{ width:"100%", borderCollapse:"collapse" }}>
                      <thead><tr><th style={TH}>#</th><th style={TH}>Producto</th><th style={TH}>Unidad</th><th style={TH}>Costo Prom.</th><th style={TH}>Comprado</th><th style={TH}>Vendido</th><th style={TH}>Disponible</th><th style={TH}></th></tr></thead>
                      <tbody>
                        {prods.map((p,i) => {
                          const tq = compras.filter(c=>c.pid===p.id).reduce((s,c)=>s+num(c.qty),0);
                          const vq = ventas.reduce((s,v)=>s+v.items.filter(i=>i.pid===p.id).reduce((ss,i)=>ss+num(i.qty),0),0);
                          return (
                            <tr key={p.id}>
                              <td style={TD(MUTED)}>{i+1}</td><td style={TD()}>{p.nom}</td><td style={TD(MUTED)}>{p.uni}</td>
                              <td style={TD(GOLD)}>{fmtM(costProm[p.id]||0)}</td>
                              <td style={TD()}>{tq} {p.uni}</td><td style={TD()}>{vq} {p.uni}</td>
                              <td style={TD(tq-vq>=0?ACE:RED)}>{tq-vq} {p.uni}</td>
                              <td style={TD()}><button onClick={()=>delProd(p.id)} style={btn("d")}>✕</button></td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
                {prods.length===0 && <div style={{ ...card, color:MUTED, fontSize:12, textAlign:"center" }}>Aún no hay productos. Agrega uno arriba.</div>}
              </div>
            )}

            {tab==="compras" && (
              <div>
                <div style={card}>
                  <div style={{ fontSize:13, fontWeight:700, color:ACE, marginBottom:12 }}>🛒 Registrar Compra</div>
                  {prods.length===0 && <div style={{ fontSize:11, color:GOLD, marginBottom:10 }}>⚠ Primero crea tu catálogo de Productos.</div>}
                  <div style={row(8)}>
                    <div style={fld(1)}><span style={lbl}>Fecha</span><input style={inp} type="date" value={fc.fecha} onChange={e=>setFc(c=>({...c,fecha:e.target.value}))}/></div>
                    <div style={fld(2)}><span style={lbl}>Proveedor</span><input style={inp} value={fc.prov} onChange={e=>setFc(c=>({...c,prov:e.target.value}))} placeholder="Nombre del proveedor"/></div>
                    <div style={fld(2)}><span style={lbl}>Producto</span>
                      <select style={inp} value={fc.pid} onChange={e=>setFc(c=>({...c,pid:e.target.value}))}>
                        <option value="">— Seleccionar —</option>
                        {prods.map(p=><option key={p.id} value={p.id}>{p.nom}</option>)}
                      </select>
                    </div>
                    <div style={fld(1)}><span style={lbl}>Cantidad</span><input style={inp} type="number" value={fc.qty} onChange={e=>setFc(c=>({...c,qty:e.target.value}))} placeholder="0"/></div>
                    <div style={fld(1)}><span style={lbl}>Precio Costo Unit.</span><input style={inp} type="number" value={fc.punit} onChange={e=>setFc(c=>({...c,punit:e.target.value}))} placeholder="0.00"/></div>

                        <tbody>
                          {prods.map(p => {
                            const tq=compras.filter(c=>c.pid===p.id).reduce((s,c)=>s+num(c.qty),0);
                            const vq=ventas.reduce((s,v)=>s+v.items.filter(i=>i.pid===p.id).reduce((ss,i)=>ss+num(i.qty),0),0);
                            return (
                              <tr key={p.id}>
                                <td style={TD()}>{p.nom}</td><td style={TD(GOLD)}>{fmtM(costProm[p.id]||0)}</td>
                                <td style={TD(MUTED)}>{tq}</td><td style={TD(MUTED)}>{vq}</td>
                                <td style={TD(tq-vq>=0?ACE:RED)}>{tq-vq} {p.uni}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  )}
                  <div style={{ textAlign:"center" }}>
                    <button onClick={exportXL} style={{ ...btn("g"), padding:"11px 28px", fontSize:13 }}>⬇ Exportar a Excel</button>
                    <div style={{ fontSize:10, color:MUTED, marginTop:6, lineHeight:1.6 }}>6 hojas: Estado de Resultados · Ventas · Compras · Gastos · Comisiones · Costos</div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
