<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Resultados — Almacén Mayorista</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#0d1b0e;}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;
    const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const GCATS = ["Renta/Bodega","Sueldos Admin","Luz/Agua/Internet","Mantenimiento","Papelería","Depreciación","Seguros","Honorarios Externos","Publicidad","Empaques/Embalaje","Fletes de Entrega","Otros"];
    const CURRENCIES = ["USD","CUP","EUR"];
    let _uid = 200;
    const uid = () => String(++_uid);
    const num = (v) => isNaN(parseFloat(v)) ? 0 : parseFloat(v);

    function App() {
      const [tab, setTab] = useState("resultados");
      const [cfg, setCfg] = useState({
        nombre:"Mi Almacén Mayorista", mes:"Junio", anio:2025, comDef:5, invIni:0,
        CUP_of:24, CUP_inf:250, EUR_usd:1.08
      });
      const [prods, setProds] = useState([]);
      const [compras, setCompras] = useState([]);
      const [ventas, setVentas] = useState([]);
      const [gastos, setGastos] = useState([]);
      const [otros, setOtros] = useState([]);
      const [imp, setImp] = useState({ isr:"", curIsr:"USD", ptu:"", curPtu:"USD", ex:"", curEx:"USD" });
      const [fp, setFp] = useState({ nom:"", uni:"pza" });
      const [fc, setFc] = useState({ fecha:"", prov:"", pid:"", qty:"", punit:"", cur:"USD" });
      const [fv, setFv] = useState({ fecha:"", cli:"", vend:"", com:5, items:[] });
      const [fvi, setFvi] = useState({ pid:"", qty:"", punit:"", cur:"USD" });
      const [fg, setFg] = useState({ cat:GCATS[0], conc:"", monto:"", cur:"USD" });
      const [fo, setFo] = useState({ tipo:"ingreso", conc:"", monto:"", cur:"USD" });

      const toUSD = (amount, cur) => {
        const a = num(amount);
        if (cur==='USD') return a;
        if (cur==='CUP') return num(cfg.CUP_inf)>0 ? a/num(cfg.CUP_inf) : 0;
        if (cur==='EUR') return a*num(cfg.EUR_usd);
        return a;
      };
      const toCUP_of = (amount, cur) => {
        const a = num(amount);
        if (cur==='USD') return a*num(cfg.CUP_of);
        if (cur==='CUP') return a;
        if (cur==='EUR') return a*num(cfg.EUR_usd)*num(cfg.CUP_of);
        return a;
      };

      const costProm = useMemo(() => {
        const r = {};
        prods.forEach(p => {
          const cs = compras.filter(c=>c.pid===p.id);
          const tq = cs.reduce((s,c)=>s+num(c.qty),0);
          const tv = cs.reduce((s,c)=>s+num(c.qty)*toUSD(c.punit,c.cur),0);
          r[p.id] = tq>0 ? tv/tq : 0;
        });
        return r;
      }, [prods, compras, cfg.CUP_inf, cfg.EUR_usd]);

      const st = useMemo(() => {
        const vBruta = ventas.reduce((s,v)=>s+v.items.reduce((ss,i)=>ss+num(i.qty)*toUSD(i.punit,i.cur),0),0);
        const cVentas = ventas.reduce((s,v)=>s+v.items.reduce((ss,i)=>ss+num(i.qty)*(costProm[i.pid]||0),0),0);
        const comis = ventas.reduce((s,v)=>{const t=v.items.reduce((ss,i)=>ss+num(i.qty)*toUSD(i.punit,i.cur),0);return s+t*num(v.com)/100;},0);
        const totComp = compras.reduce((s,c)=>s+num(c.qty)*toUSD(c.punit,c.cur),0);
        const invFin = num(cfg.invIni)+totComp-cVentas;
        const gOp = gastos.reduce((s,g)=>s+toUSD(g.monto,g.cur),0);
        const totGasOp = comis+gOp;
        const oIng = otros.filter(o=>o.tipo==="ingreso").reduce((s,o)=>s+toUSD(o.monto,o.cur),0);
        const oGas = otros.filter(o=>o.tipo==="gasto").reduce((s,o)=>s+toUSD(o.monto,o.cur),0);
        const totImp = toUSD(imp.isr,imp.curIsr)+toUSD(imp.ptu,imp.curPtu)+toUSD(imp.ex,imp.curEx);
        const uBruta=vBruta-cVentas, uOper=uBruta-totGasOp, uAnte=uOper+oIng-oGas, uNeta=uAnte-totImp;
        return { vBruta,cVentas,uBruta,comis,gOp,totGasOp,oIng,oGas,totImp,uOper,uAnte,uNeta,totComp,invFin,
          mbr:vBruta>0?uBruta/vBruta:0, mnr:vBruta>0?uNeta/vBruta:0 };
      }, [ventas,compras,gastos,otros,imp,costProm,cfg]);

      const onat = useMemo(() => {
        const ventasCUP = ventas.reduce((s,v)=>s+v.items.reduce((ss,i)=>ss+num(i.qty)*toCUP_of(i.punit,i.cur),0),0);
        const impVentas = ventasCUP*0.11;
        const utilCUP = st.uAnte*num(cfg.CUP_of);
        const impIngresos = utilCUP>0 ? utilCUP*0.35 : 0;
        const totalONAT = impVentas+impIngresos;
        return { ventasCUP, impVentas, utilCUP, impIngresos, totalONAT,
          usd_of: num(cfg.CUP_of)>0 ? totalONAT/num(cfg.CUP_of) : 0,
          usd_inf: num(cfg.CUP_inf)>0 ? totalONAT/num(cfg.CUP_inf) : 0 };
      }, [st, cfg, ventas]);

      const addProd=()=>{if(!fp.nom)return;setProds(p=>[...p,{id:uid(),nom:fp.nom,uni:fp.uni}]);setFp({nom:"",uni:"pza"});};
      const delProd=(id)=>setProds(p=>p.filter(x=>x.id!==id));
      const addComp=()=>{if(!fc.pid||!fc.qty||!fc.punit)return;setCompras(c=>[...c,{...fc,id:uid()}]);setFc({fecha:"",prov:"",pid:"",qty:"",punit:"",cur:"USD"});};
      const delComp=(id)=>setCompras(c=>c.filter(x=>x.id!==id));
      const addVItem=()=>{if(!fvi.pid||!fvi.qty||!fvi.punit)return;setFv(v=>({...v,items:[...v.items,{...fvi,id:uid()}]}));setFvi({pid:"",qty:"",punit:"",cur:"USD"});};
      const delVItem=(id)=>setFv(v=>({...v,items:v.items.filter(i=>i.id!==id)}));
      const addVenta=()=>{if(!fv.cli||fv.items.length===0)return;setVentas(vs=>[...vs,{...fv,id:uid()}]);setFv({fecha:"",cli:"",vend:"",com:cfg.comDef,items:[]});};
      const delVenta=(id)=>setVentas(v=>v.filter(x=>x.id!==id));
      const addGasto=()=>{if(!fg.conc||!fg.monto)return;setGastos(g=>[...g,{...fg,id:uid()}]);setFg({cat:GCATS[0],conc:"",monto:"",cur:"USD"});};
      const delGasto=(id)=>setGastos(g=>g.filter(x=>x.id!==id));
      const addOtro=()=>{if(!fo.conc||!fo.monto)return;setOtros(o=>[...o,{...fo,id:uid()}]);setFo({tipo:"ingreso",conc:"",monto:"",cur:"USD"});};
      const delOtro=(id)=>setOtros(o=>o.filter(x=>x.id!==id));

      const fmtC=(a,cur)=>{const v=num(a);const abs=Math.abs(v).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});const s=v<0?"-":"";if(cur==='USD')return s+'$'+abs;if(cur==='EUR')return s+'€'+abs;return s+abs+' CUP';};
      const fmtEq=(a,cur)=>{const m=fmtC(a,cur);if(cur==='USD')return m;return m+' (≈'+fmtC(toUSD(a,cur),'USD')+')';};
      const fmtM=(v)=>{const n2=num(v);const abs=Math.abs(n2).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});return (n2<0?"-":"")+"$"+abs;};
      const fmtCUP=(v)=>{const n2=num(v);const abs=Math.abs(n2).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});return (n2<0?"-":"")+abs+" CUP";};
      const pNom=(id)=>{const p=prods.find(p=>p.id===id);return p?p.nom:"?";};
      const pUni=(id)=>{const p=prods.find(p=>p.id===id);return p?p.uni:"";};

      const exportXL=()=>{
        const wb=XLSX.utils.book_new();
        const pct2=v=>`${(num(v)*100).toFixed(1)}%`;
        const er=[
          ["ESTADO DE RESULTADOS (USD - Tasa Informal)","",""],
          [cfg.nombre,"",""],["Período: "+cfg.mes+" "+cfg.anio,"",""],
          ["CUP oficial: 1 USD = "+cfg.CUP_of+" CUP | CUP informal: 1 USD = "+cfg.CUP_inf+" CUP | EUR: 1 EUR = "+cfg.EUR_usd+" USD","",""],
          ["","",""],["CONCEPTO","MONTO USD","% VENTAS"],
          ["Ventas Brutas",st.vBruta,"100.0%"],["","",""],
          ["COSTO DE VENTAS","",""],["  Inventario Inicial",num(cfg.invIni),""],
          ["  (+) Compras Netas",st.totComp,""],["  (-) Inventario Final",st.invFin,""],
          ["  = Costo de Ventas",st.cVentas,st.vBruta>0?pct2(st.cVentas/st.vBruta):""],["","",""],
          ["UTILIDAD BRUTA",st.uBruta,st.vBruta>0?pct2(st.mbr):""],["","",""],
          ["GASTOS OPERATIVOS","",""],
          ["  Comisiones sobre Ventas",st.comis,st.vBruta>0?pct2(st.comis/st.vBruta):""],
          ...gastos.map(g=>["  "+g.cat+" - "+g.conc+" ("+g.cur+")",toUSD(g.monto,g.cur),""]),
          ["  = Total Gastos",st.totGasOp,st.vBruta>0?pct2(st.totGasOp/st.vBruta):""],["","",""],
          ["UTILIDAD DE OPERACIÓN",st.uOper,st.vBruta>0?pct2(st.uOper/st.vBruta):""],["","",""],
          ["OTROS INGRESOS Y GASTOS","",""],
          ...otros.filter(o=>o.tipo==="ingreso").map(o=>["  (+) "+o.conc+" ("+o.cur+")",toUSD(o.monto,o.cur),""]),
          ...otros.filter(o=>o.tipo==="gasto").map(o=>["  (-) "+o.conc+" ("+o.cur+")",-toUSD(o.monto,o.cur),""]),
          ["  = Neto Otros",st.oIng-st.oGas,""],["","",""],
          ["UTILIDAD ANTES DE IMPUESTOS",st.uAnte,st.vBruta>0?pct2(st.uAnte/st.vBruta):""],["","",""],
          ["IMPUESTOS","",""],
          ["  ONAT Total (equiv. USD informal)",onat.usd_inf,""],
          ["  ISR/Otros",toUSD(imp.isr,imp.curIsr),""],["  PTU",toUSD(imp.ptu,imp.curPtu),""],
          ["  = Total",st.totImp,""],["","",""],
          ["UTILIDAD NETA",st.uNeta,st.vBruta>0?pct2(st.mnr):""]
        ];
        const ws1=XLSX.utils.aoa_to_sheet(er);ws1["!cols"]=[{wch:52},{wch:20},{wch:12}];
        XLSX.utils.book_append_sheet(wb,ws1,"Estado de Resultados");
        const onatS=[
          ["CÁLCULO ONAT — AGENCIA TRIBUTARIA CUBA",""],
          [cfg.nombre,""],[cfg.mes+" "+cfg.anio,""],["",""],
          ["Tasa oficial utilizada:","1 USD = "+cfg.CUP_of+" CUP"],
          ["Tasa informal (referencia):","1 USD = "+cfg.CUP_inf+" CUP"],["",""],
          ["CONCEPTO","MONTO CUP"],["",""],
          ["1. IMPUESTO SOBRE LAS VENTAS (11%)",""],
          ["   Ventas totales (USD)",st.vBruta],
          ["   Ventas en CUP (tasa oficial)",onat.ventasCUP],
          ["   = 11% s/ Ventas",onat.impVentas],["",""],
          ["2. IMPUESTO SOBRE LOS INGRESOS (35%)",""],
          ["   Utilidad antes imp. (USD)",st.uAnte],
          ["   Utilidad en CUP (tasa oficial)",onat.utilCUP],
          ["   = 35% s/ Ingresos (si utilidad > 0)",onat.impIngresos],["",""],
          ["TOTAL A PAGAR ONAT (CUP)",onat.totalONAT],["",""],
          ["EQUIVALENCIAS DEL TOTAL ONAT",""],
          ["   En USD (tasa oficial)",onat.usd_of],
          ["   En USD (tasa informal / real)",onat.usd_inf],["",""],
          ["NOTA: Cálculos orientativos. Confirmar con gestor ONAT.",""]
        ];
        const ws_o=XLSX.utils.aoa_to_sheet(onatS);ws_o["!cols"]=[{wch:45},{wch:22}];
        XLSX.utils.book_append_sheet(wb,ws_o,"ONAT");
        const vd=[["VENTA#","FECHA","CLIENTE","VENDEDOR","COM%","PRODUCTO","CANT","P.VENTA","MONEDA","SUBTOTAL ORIG","SUBTOTAL USD","COSTO USD","MARGEN","COMISIÓN USD"]];
        ventas.forEach(v=>{
          v.items.forEach(i=>{
            const prod=prods.find(x=>x.id===i.pid);
            const sub=num(i.qty)*toUSD(i.punit,i.cur);const ct=num(i.qty)*(costProm[i.pid]||0);
            vd.push([v.id,v.fecha,v.cli,v.vend,num(v.com)/100,prod?prod.nom:"?",num(i.qty),num(i.punit),i.cur,num(i.qty)*num(i.punit),sub,ct,sub>0?(sub-ct)/sub:0,sub*num(v.com)/100]);
          });
        });
        XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(vd),"Ventas Detalladas");
        const cd=[["#","FECHA","PROVEEDOR","PRODUCTO","CANT","P.COSTO","MONEDA","TOTAL ORIG","TOTAL USD"]];
        compras.forEach(c=>{const p=prods.find(x=>x.id===c.pid);const cu=toUSD(c.punit,c.cur);cd.push([c.id,c.fecha,c.prov,p?p.nom:"?",num(c.qty),num(c.punit),c.cur,num(c.qty)*num(c.punit),num(c.qty)*cu]);});
        XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cd),"Compras");
        const gd=[["CATEGORÍA","CONCEPTO","MONTO","MONEDA","EQUIV USD"]];
        gd.push(["Comisiones s/ventas","(automático)",st.comis,"USD",st.comis]);
        gastos.forEach(g=>gd.push([g.cat,g.conc,num(g.monto),g.cur,toUSD(g.monto,g.cur)]));
        XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(gd),"Gastos");
        const comd=[["VENDEDOR","VENTAS USD","%COM","COMISIÓN USD"]];
        const bV={};ventas.forEach(v=>{const t=v.items.reduce((s,i)=>s+num(i.qty)*toUSD(i.punit,i.cur),0);if(!bV[v.vend])bV[v.vend]={v:0,c:0};bV[v.vend].v+=t;bV[v.vend].c+=t*num(v.com)/100;});
        Object.entries(bV).forEach(([vend,d])=>comd.push([vend,d.v,d.v>0?d.c/d.v:0,d.c]));
        XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(comd),"Comisiones");
        XLSX.writeFile(wb,"ER_"+cfg.nombre.replace(/\s+/g,"_")+"_"+cfg.mes+cfg.anio+".xlsx");
      };

      const BG="#0d1b0e",MID="#152218",MID2="#1a2d1c",ACE="#52b788",GOLD="#f4a228",MUTED="#6d9073",LIGHT="#e4ede5",RED="#e05252",BLUE="#5ba3d9",PUR="#c084fc";
      const inp={padding:"7px 10px",border:"1px solid #223d25",borderRadius:4,background:"#0d1b0e",color:LIGHT,fontSize:12,outline:"none",fontFamily:"inherit",width:"100%",boxSizing:"border-box"};
      const lbl={fontSize:10,color:MUTED,marginBottom:3,display:"block",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em"};
      const TH={background:MID2,color:MUTED,fontSize:10,fontWeight:700,padding:"9px 11px",textAlign:"left",textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid #223d25",whiteSpace:"nowrap"};
      const TD=(col)=>({padding:"8px 11px",fontSize:12,color:col||LIGHT,borderBottom:"1px solid "+MID2});
      const card={background:MID,borderRadius:6,padding:"18px 20px",marginBottom:14};
      const btn=(v)=>({padding:v==="sm"?"4px 10px":"8px 18px",background:v==="d"?RED:v==="g"?GOLD:ACE,color:v==="g"?"#1a0e00":BG,border:"none",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:800,fontFamily:"inherit",whiteSpace:"nowrap"});
      const tabB=(t)=>({padding:"7px 13px",background:tab===t?ACE:"transparent",color:tab===t?BG:MUTED,border:"none",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap"});
      const row=(g)=>({display:"flex",gap:g||8,flexWrap:"wrap",marginBottom:g||8});
      const fld=(w)=>({display:"flex",flexDirection:"column",flex:w||1,minWidth:80});
      const curCol=(cur)=>cur==='USD'?GOLD:cur==='EUR'?BLUE:PUR;
      const curBadge=(cur)=><span style={{fontSize:9,fontWeight:800,padding:"2px 5px",borderRadius:3,background:curCol(cur)+'22',color:curCol(cur),fontFamily:"monospace"}}>{cur}</span>;
      const CurSel=({value,onChange})=>(
        <select style={{...inp,width:68,flex:'none',borderLeft:'none',borderRadius:'0 4px 4px 0',color:curCol(value),fontWeight:700}} value={value} onChange={e=>onChange(e.target.value)}>
          {CURRENCIES.map(c=><option key={c} style={{color:LIGHT}}>{c}</option>)}
        </select>
      );
      const AmtCur=({amt,cur,onAmtChange,onCurChange,placeholder})=>(
        <div style={{display:"flex"}}>
          <input style={{...inp,borderRadius:"4px 0 0 4px",flex:1}} type="number" value={amt} onChange={e=>onAmtChange(e.target.value)} placeholder={placeholder||"0.00"}/>
          <CurSel value={cur} onChange={onCurChange}/>
        </div>
      );
      const SRow=({label,val,indent,bold,big})=>{
        indent=indent||0;bold=bold||false;big=big||false;
        const v=num(val),isPos=v>=0,tc=big?(isPos?ACE:RED):(bold?LIGHT:MUTED);
        return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:(big?"12px":"5px")+" 16px",paddingLeft:(indent*16)+16,background:big?MID2:"transparent",borderRadius:big?4:0,marginBottom:big?4:0}}>
          <span style={{fontSize:big?13:11,fontWeight:bold||big?700:400,color:tc}}>{label}</span>
          <span style={{fontSize:big?15:12,fontWeight:bold||big?700:400,color:big?(isPos?ACE:RED):tc,fontFamily:"'Courier New',monospace",minWidth:110,textAlign:"right"}}>{fmtM(val)}</span>
        </div>);
      };

      return (
        <div style={{background:BG,minHeight:"100vh",color:LIGHT,fontFamily:"'Segoe UI',system-ui,sans-serif",fontSize:13}}>
          <div style={{background:MID,padding:"12px 20px",borderBottom:"3px solid "+ACE,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:ACE}}>📒 {cfg.nombre}</div>
              <div style={{fontSize:10,color:MUTED,marginTop:2,fontFamily:"monospace"}}>Estado de Resultados · {cfg.mes} {cfg.anio} · USD / CUP / EUR</div>
            </div>
            <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{fontSize:11,color:MUTED,fontFamily:"monospace"}}>
                Ventas <span style={{color:ACE,fontWeight:700}}>{fmtM(st.vBruta)}</span>
                {" · "}Utilidad <span style={{color:num(st.uNeta)>=0?ACE:RED,fontWeight:700}}>{fmtM(st.uNeta)}</span>
                {" · "}ONAT <span style={{color:PUR,fontWeight:700}}>{fmtCUP(onat.totalONAT)}</span>
              </div>
              <button onClick={exportXL} style={{...btn("g"),padding:"9px 20px",fontSize:12}}>⬇ Exportar Excel</button>
            </div>
          </div>

          <div style={{background:MID,padding:"8px 16px",display:"flex",gap:4,flexWrap:"wrap",borderBottom:"1px solid #223d25"}}>
            {[["config","⚙ Config"],["prods","📦 Productos"],["compras","🛒 Compras"],["ventas","💰 Ventas"],["gastos","🏢 Gastos"],["otros","🔄 Otros"],["onat","🏛 ONAT"],["resultados","📊 Resultados"]].map(([t,l])=>(
              <button key={t} style={tabB(t)} onClick={()=>setTab(t)}>{l}</button>
            ))}
          </div>

          <div style={{padding:"20px",maxWidth:1100,margin:"0 auto"}}>

            {tab==="config" && (
              <div>
                <div style={card}>
                  <div style={{fontSize:13,fontWeight:700,color:ACE,marginBottom:14}}>⚙ Configuración del Período</div>
                  <div style={row()}>
                    <div style={fld(3)}><span style={lbl}>Nombre del Negocio</span><input style={inp} value={cfg.nombre} onChange={e=>setCfg(c=>({...c,nombre:e.target.value}))} placeholder="Nombre del almacén"/></div>
                    <div style={fld(1)}><span style={lbl}>Mes</span><select style={inp} value={cfg.mes} onChange={e=>setCfg(c=>({...c,mes:e.target.value}))}>{MESES.map(m=><option key={m}>{m}</option>)}</select></div>
                    <div style={fld(1)}><span style={lbl}>Año</span><input style={inp} type="number" value={cfg.anio} onChange={e=>setCfg(c=>({...c,anio:e.target.value}))}/></div>
                    <div style={fld(1)}><span style={lbl}>Comisión % default</span><input style={inp} type="number" value={cfg.comDef} onChange={e=>setCfg(c=>({...c,comDef:e.target.value}))}/></div>
                    <div style={fld(2)}><span style={lbl}>Inventario inicial (USD)</span><input style={inp} type="number" value={cfg.invIni} onChange={e=>setCfg(c=>({...c,invIni:e.target.value}))} placeholder="0.00"/></div>
                  </div>
                </div>
                <div style={{...card,borderTop:"3px solid "+GOLD}}>
                  <div style={{fontSize:13,fontWeight:700,color:GOLD,marginBottom:6}}>💱 Tipos de Cambio</div>
                  <div style={{fontSize:11,color:MUTED,marginBottom:14,lineHeight:1.7}}>
                    Cuba tiene dos tasas. La <strong style={{color:PUR}}>oficial</strong> es la que usa la ONAT para calcular impuestos.
                    La <strong style={{color:GOLD}}>informal</strong> es la realidad del mercado y se usa en el estado de resultados real.
                  </div>
                  <div style={row(14)}>
                    <div style={fld(1)}>
                      <span style={{...lbl,color:PUR}}>1 USD = ? CUP (Tasa Oficial ONAT)</span>

                    <div style={{display:"flex",justifyContent:"space-between",padding:"12px 10px",background:MID2,borderRadius:4,marginTop:8}}>
                      <span style={{fontSize:13,fontWeight:700,color:LIGHT}}>= 11% Impuesto s/ Ventas</span>
                      <span style={{fontFamily:"monospace",fontWeight:800,fontSize:16,color:GOLD}}>{fmtCUP(onat.impVentas)}</span>
                    </div>
                  </div>

                  <div style={{...card,borderTop:"2px solid "+ACE}}>
                    <div style={{fontSize:12,fontWeight:700,color:ACE,marginBottom:12}}>2. Impuesto sobre los Ingresos — 35%</div>
                    {[
                      {lbl:"Utilidad antes de impuestos",val:fmtM(st.uAnte),col:num(st.uAnte)>=0?ACE:RED},
                      {lbl:"× Tasa oficial ("+cfg.CUP_of+" CUP/USD) →",val:fmtCUP(onat.utilCUP),col:PUR},
                    ].map((r,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #223d25"}}>
                        <span style={{fontSize:11,color:MUTED}}>{r.lbl}</span>
                        <span style={{fontFamily:"monospace",color:r.col,fontWeight:600}}>{r.val}</span>
                      </div>
                    ))}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"12px 10px",background:MID2,borderRadius:4,marginTop:8}}>
                      <span style={{fontSize:13,fontWeight:700,color:LIGHT}}>= 35% Impuesto s/ Ingresos</span>
                      <span style={{fontFamily:"monospace",fontWeight:800,fontSize:16,color:ACE}}>{fmtCUP(onat.impIngresos)}</span>
                    </div>
                    {num(st.uAnte)<=0&&<div style={{fontSize:10,color:MUTED,fontStyle:"italic",marginTop:6}}>* No aplica — utilidad negativa o cero</div>}
                  </div>
                </div>

                <div style={{...card,background:"#120d1e",border:"2px solid "+PUR}}>
                  <div style={{fontSize:13,fontWeight:700,color:PUR,marginBottom:14}}>📋 Resumen Total ONAT</div>
                  {[
                    {lbl:"Impuesto s/ Ventas (11%)",val:fmtCUP(onat.impVentas),col:GOLD},
                    {lbl:"Impuesto s/ Ingresos (35%)",val:fmtCUP(onat.impIngresos),col:ACE},
                  ].map((r,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #2a1a40"}}>
                      <span style={{color:MUTED}}>{r.lbl}</span>
                      <span style={{fontFamily:"monospace",color:r.col,fontWeight:600}}>{r.val}</span>
                    </div>
                  ))}
                  <div style={{display:"flex",justifyContent:"space-between",padding:"14px 0 8px"}}>
                    <span style={{fontSize:16,fontWeight:800,color:PUR}}>TOTAL A PAGAR</span>
                    <span style={{fontFamily:"monospace",fontWeight:800,fontSize:22,color:PUR}}>{fmtCUP(onat.totalONAT)}</span>
                  </div>
                  <div style={{display:"flex",gap:16,flexWrap:"wrap",padding:"12px 0",borderTop:"1px solid #2a1a40"}}>
                    <div style={{flex:1,background:BG,borderRadius:4,padding:"10px 12px"}}>
                      <div style={{fontSize:10,color:MUTED,marginBottom:2}}>Equivalente USD (tasa oficial)</div>
                      <div style={{fontFamily:"monospace",color:MUTED,fontSize:13}}>{fmtM(onat.usd_of)}</div>
                      <div style={{fontSize:10,color:MUTED,marginTop:1}}>A {cfg.CUP_of} CUP/USD</div>
                    </div>
                    <div style={{flex:1,background:BG,borderRadius:4,padding:"10px 12px",border:"1px solid "+GOLD+'44'}}>
                      <div style={{fontSize:10,color:MUTED,marginBottom:2}}>Equivalente USD (tasa informal / real)</div>
                      <div style={{fontFamily:"monospace",color:GOLD,fontSize:13,fontWeight:700}}>{fmtM(onat.usd_inf)}</div>
                      <div style={{fontSize:10,color:MUTED,marginTop:1}}>A {cfg.CUP_inf} CUP/USD</div>
                    </div>
                  </div>
                  <div style={{marginTop:10,padding:"8px 12px",background:BG,borderRadius:4,fontSize:10,color:"#9b7ac4",lineHeight:1.7}}>
                    ⚠ Cálculos orientativos basados en 11% s/ventas y 35% s/ingresos a tasa oficial. Pueden aplicar deducciones, escalas progresivas u otros conceptos según tu régimen. Confirmar con tu gestor de la ONAT.
                  </div>
                </div>
              </div>
            )}

            {tab==="resultados" && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"start"}}>
                <div style={{...card,padding:0,overflow:"hidden"}}>
                  <div style={{background:MID2,padding:"16px 18px",borderBottom:"1px solid #223d25",textAlign:"center"}}>
                    <div style={{fontSize:10,color:MUTED,textTransform:"uppercase",letterSpacing:"0.12em",fontFamily:"monospace"}}>Estado de Resultados · USD (tasa informal)</div>
                    <div style={{fontSize:18,fontWeight:800,color:ACE,marginTop:3}}>{cfg.nombre}</div>
                    <div style={{fontSize:11,color:MUTED,marginTop:2,fontFamily:"monospace"}}>Período: {cfg.mes} {cfg.anio}</div>
                  </div>
                  <div style={{padding:"10px 0"}}>
                    <div style={{padding:"4px 16px 6px",fontSize:9,color:MUTED,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>Ingresos</div>
                    <SRow label="Ventas Brutas" val={st.vBruta} bold={true}/>
                    <div style={{padding:"10px 16px 4px",fontSize:9,color:MUTED,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>Costo de Ventas</div>
                    <SRow label="Inventario Inicial" val={cfg.invIni} indent={1}/>
                    <SRow label="(+) Compras del Período" val={st.totComp} indent={1}/>
                    <SRow label="(-) Inventario Final" val={-num(st.invFin)} indent={1}/>
                    <SRow label="= Costo de Ventas" val={-st.cVentas} bold={true}/>
                    <div style={{height:1,background:"#223d25",margin:"8px 0"}}/>
                    <SRow label="UTILIDAD BRUTA" val={st.uBruta} big={true}/>
                    <div style={{fontSize:10,color:MUTED,textAlign:"right",paddingRight:16,paddingBottom:6,fontFamily:"monospace"}}>Margen bruto: {(st.mbr*100).toFixed(1)}%</div>
                    <div style={{padding:"6px 16px 4px",fontSize:9,color:MUTED,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>Gastos Operativos</div>
                    <SRow label="(-) Comisiones sobre Ventas" val={-st.comis} indent={1}/>
                    {gastos.map(g=><SRow key={g.id} label={"(-) "+g.cat+" ("+g.cur+")"} val={-toUSD(g.monto,g.cur)} indent={1}/>)}
                    <SRow label="= Total Gastos Operativos" val={-st.totGasOp} bold={true}/>
                    <div style={{height:1,background:"#223d25",margin:"8px 0"}}/>
                    <SRow label="UTILIDAD DE OPERACIÓN" val={st.uOper} big={true}/>
                    <div style={{fontSize:10,color:MUTED,textAlign:"right",paddingRight:16,paddingBottom:6,fontFamily:"monospace"}}>Margen operativo: {st.vBruta>0?(st.uOper/st.vBruta*100).toFixed(1):0}%</div>
                    {otros.length>0 && (
                      <div>
                        <div style={{padding:"6px 16px 4px",fontSize:9,color:MUTED,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>Otros Ingresos y Gastos</div>
                        {otros.filter(o=>o.tipo==="ingreso").map(o=><SRow key={o.id} label={"(+) "+o.conc+" ("+o.cur+")"} val={toUSD(o.monto,o.cur)} indent={1}/>)}
                        {otros.filter(o=>o.tipo==="gasto").map(o=><SRow key={o.id} label={"(-) "+o.conc+" ("+o.cur+")"} val={-toUSD(o.monto,o.cur)} indent={1}/>)}
                        <SRow label="= Neto Otros" val={st.oIng-st.oGas} bold={true}/>
                        <div style={{height:1,background:"#223d25",margin:"8px 0"}}/>
                      </div>
                    )}
                    <SRow label="UTILIDAD ANTES DE IMPUESTOS" val={st.uAnte} big={true}/>
                    <div style={{padding:"6px 16px 4px",fontSize:9,color:PUR,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>ONAT (ver pestaña ONAT)</div>
                    <SRow label={"(-) ONAT estimado (equiv. USD informal)"} val={-onat.usd_inf} indent={1}/>
                    {num(imp.isr)>0&&<SRow label="(-) ISR / Otros impuestos" val={-toUSD(imp.isr,imp.curIsr)} indent={1}/>}
                    <div style={{height:1,background:"#223d25",margin:"8px 0"}}/>
                    <div style={{padding:"4px 0 14px"}}>
                      <SRow label="UTILIDAD NETA" val={st.uNeta} big={true}/>
                      <div style={{fontSize:10,color:MUTED,textAlign:"right",paddingRight:16,fontFamily:"monospace"}}>Margen neto: {(st.mnr*100).toFixed(1)}%</div>
                    </div>
                  </div>
                </div>

                <div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                    {[
                      {label:"Ventas (USD)",val:fmtM(st.vBruta),color:ACE},
                      {label:"Margen Bruto",val:(st.mbr*100).toFixed(1)+"%",color:st.mbr>=0.2?ACE:st.mbr>=0?GOLD:RED},
                      {label:"Utilidad Neta (USD)",val:fmtM(st.uNeta),color:num(st.uNeta)>=0?ACE:RED},
                      {label:"Margen Neto",val:(st.mnr*100).toFixed(1)+"%",color:st.mnr>=0.08?ACE:st.mnr>=0?GOLD:RED},
                      {label:"ONAT a pagar (CUP)",val:fmtCUP(onat.totalONAT),color:PUR},
                      {label:"ONAT equiv. USD informal",val:fmtM(onat.usd_inf),color:PUR},
                      {label:"Comisiones Vendedores",val:fmtM(st.comis),color:GOLD},
                      {label:"COGS (USD)",val:fmtM(st.cVentas),color:MUTED},
                    ].map(k=>(
                      <div key={k.label} style={{background:MID,borderRadius:4,padding:"11px 13px"}}>
                        <div style={{fontSize:9,color:MUTED,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,fontWeight:700}}>{k.label}</div>
                        <div style={{fontSize:14,fontWeight:800,color:k.color,fontFamily:"'Courier New',monospace"}}>{k.val}</div>
                      </div>
                    ))}
                  </div>

                  <div style={{...card,background:MID2,marginBottom:14}}>
                    <div style={{fontSize:10,fontWeight:700,color:MUTED,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>Tasas de Cambio Activas</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {[{lbl:"CUP OFICIAL",val:"1 USD = "+cfg.CUP_of+" CUP",col:PUR},{lbl:"CUP INFORMAL",val:"1 USD = "+cfg.CUP_inf+" CUP",col:GOLD},{lbl:"EUR/USD",val:"1 EUR = "+cfg.EUR_usd+" USD",col:BLUE}].map(r=>(
                        <div key={r.lbl} style={{background:BG,borderRadius:4,padding:"8px 12px",flex:1}}>
                          <div style={{fontSize:9,color:MUTED,marginBottom:2}}>{r.lbl}</div>
                          <div style={{fontFamily:"monospace",color:r.col,fontWeight:700,fontSize:12}}>{r.val}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {ventas.length>0&&(()=>{
                    const bV={};ventas.forEach(v=>{const t=v.items.reduce((s,i)=>s+num(i.qty)*toUSD(i.punit,i.cur),0);const k=v.vend||"Sin nombre";if(!bV[k])bV[k]={v:0,c:0};bV[k].v+=t;bV[k].c+=t*num(v.com)/100;});
                    return(<div style={{...card,padding:0,overflow:"hidden",marginBottom:14}}>
                      <div style={{background:MID2,padding:"10px 14px",fontSize:10,color:GOLD,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Comisiones por Vendedor</div>
                      <table style={{width:"100%",borderCollapse:"collapse"}}>
                        <thead><tr><th style={TH}>Vendedor</th><th style={TH}>Ventas USD</th><th style={TH}>Comisión USD</th></tr></thead>
                        <tbody>{Object.entries(bV).map(([vend,d])=><tr key={vend}><td style={TD()}>{vend}</td><td style={TD(ACE)}>{fmtM(d.v)}</td><td style={TD(GOLD)}>{fmtM(d.c)}</td></tr>)}</tbody>
                      </table>
                    </div>);
                  })()}

                  <div style={{textAlign:"center"}}>
                    <button onClick={exportXL} style={{...btn("g"),padding:"11px 28px",fontSize:13}}>⬇ Exportar a Excel</button>
                    <div style={{fontSize:10,color:MUTED,marginTop:6,lineHeight:1.6}}>6 hojas: Estado de Resultados · ONAT · Ventas · Compras · Gastos · Comisiones</div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
