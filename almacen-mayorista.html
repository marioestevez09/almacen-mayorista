<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Resultados — Almacén Mayorista</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
  <style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#0d1b0e;}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;
    const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const GCATS = ["Renta/Bodega","Sueldos Admin","Luz/Agua/Internet","Mantenimiento","Papelería","Depreciación","Seguros","Honorarios Externos","Publicidad","Empaques/Embalaje","Fletes de Entrega","Otros"];
    const CURRENCIES = ["USD","CUP","EUR"];
    const GIST_FILENAME = "almacen-mayorista-data.json";

    // Defined OUTSIDE App so React doesn't recreate them on every render (fixes focus loss)
    const INP = {padding:"7px 10px",border:"1px solid #223d25",borderRadius:4,background:"#0d1b0e",color:"#e4ede5",fontSize:12,outline:"none",fontFamily:"inherit",width:"100%",boxSizing:"border-box"};
    const curCol = (cur) => cur==='USD'?"#f4a228":cur==='EUR'?"#5ba3d9":"#c084fc";
    const CurSel = ({value, onChange}) => (
      <select style={{...INP,width:68,flex:'none',borderLeft:'none',borderRadius:'0 4px 4px 0',color:curCol(value),fontWeight:700}}
        value={value} onChange={e=>onChange(e.target.value)}>
        {CURRENCIES.map(c=><option key={c} style={{color:"#e4ede5"}}>{c}</option>)}
      </select>
    );
    const AmtCur = ({amt, cur, onAmtChange, onCurChange, ph}) => (
      <div style={{display:"flex"}}>
        <input style={{...INP,borderRadius:"4px 0 0 4px",flex:1}} type="number" value={amt}
          onChange={e=>onAmtChange(e.target.value)} placeholder={ph||"0.00"}/>
        <CurSel value={cur} onChange={onCurChange}/>
      </div>
    );

    let _uid = 200;
    const uid = () => String(++_uid);
    const num = (v) => isNaN(parseFloat(v)) ? 0 : parseFloat(v);

    function App() {
      const [tab, setTab] = useState("resultados");
      const [cfg, setCfg] = useState({ nombre:"Mi Almacén Mayorista", mes:"Junio", anio:2025, comDef:5, invIni:0, CUP_of:24, CUP_inf:250, EUR_usd:1.08 });
      const [prods, setProds] = useState([]);
      const [compras, setCompras] = useState([]);
      const [ventas, setVentas] = useState([]);
      const [gastos, setGastos] = useState([]);
      const [otros, setOtros] = useState([]);
      const [imp, setImp] = useState({ isr:"", curIsr:"USD", ptu:"", curPtu:"USD", ex:"", curEx:"USD" });
      const [fp, setFp] = useState({ nom:"", uni:"pza" });
      const [fc, setFc] = useState({ fecha:"", prov:"", pid:"", qty:"", punit:"", cur:"USD" });
      const [fv, setFv] = useState({ fecha:"", cli:"", vend:"", com:5, items:[] });
      const [fvi, setFvi] = useState({ pid:"", qty:"", punit:"", cur:"USD" });
      const [expandedSale, setExpandedSale] = useState(null);
      // PIN protection
      const [appPin, setAppPin] = useState(() => localStorage.getItem('app_pin')||'');
      const [isUnlocked, setIsUnlocked] = useState(() => sessionStorage.getItem('app_unlocked')==='1' || !localStorage.getItem('app_pin'));
      const [pinInput, setPinInput] = useState('');
      const [pinError, setPinError] = useState('');
      const [newPin1, setNewPin1] = useState('');
      const [newPin2, setNewPin2] = useState('');
      const [pinMsg, setPinMsg] = useState('');
      const [fg, setFg] = useState({ cat:GCATS[0], conc:"", monto:"", cur:"USD" });
      const [fo, setFo] = useState({ tipo:"ingreso", conc:"", monto:"", cur:"USD" });

      // ── GitHub Sync ──
      const [ghToken, setGhToken] = useState(() => localStorage.getItem('gh_token') || '');
      const [gistId, setGistId] = useState(() => localStorage.getItem('gist_id') || '');
      const [tokenInput, setTokenInput] = useState('');
      const [allMonths, setAllMonths] = useState({});
      const [syncStatus, setSyncStatus] = useState(ghToken ? 'idle' : 'notoken');
      const [syncMsg, setSyncMsg] = useState('');

      useEffect(() => {
        if (ghToken && gistId) loadAllMonths(ghToken, gistId);
      }, []);

      const loadAllMonths = async (token, id) => {
        try {
          const res = await fetch(`https://api.github.com/gists/${id}`, {
            headers: { 'Authorization': `token ${token}` }
          });
          if (!res.ok) throw new Error('no se pudo cargar');
          const gist = await res.json();
          const content = gist.files[GIST_FILENAME]?.content;
          if (content) {
            const data = JSON.parse(content);
            setAllMonths(data.months || {});
          }
          setSyncStatus('ok');
          setSyncMsg('Conectado ✓');
        } catch(e) {
          setSyncStatus('error');
          setSyncMsg('Error al cargar datos');
        }
      };

      const connectGitHub = async () => {
        const token = tokenInput.trim();
        if (!token) return;
        setSyncStatus('connecting');
        setSyncMsg('Conectando...');
        try {
          const res = await fetch('https://api.github.com/gists?per_page=100', {
            headers: { 'Authorization': `token ${token}` }
          });
          if (!res.ok) throw new Error('Token inválido — verifica que copiaste bien el token');
          const gists = await res.json();
          const found = gists.find(g => g.files && g.files[GIST_FILENAME]);
          let id, months = {};
          if (found) {
            id = found.id;
            const fullRes = await fetch(`https://api.github.com/gists/${id}`, {
              headers: { 'Authorization': `token ${token}` }
            });
            const full = await fullRes.json();
            const parsed = JSON.parse(full.files[GIST_FILENAME].content);
            months = parsed.months || {};
            setSyncMsg('¡Datos anteriores encontrados! ' + Object.keys(months).length + ' mes(es) cargados.');
          } else {
            const createRes = await fetch('https://api.github.com/gists', {
              method: 'POST',
              headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({
                description: 'Datos Almacén Mayorista — App Estado de Resultados',
                public: false,
                files: { [GIST_FILENAME]: { content: JSON.stringify({ months: {} }) } }
              })
            });
            const created = await createRes.json();
            id = created.id;
            setSyncMsg('Almacenamiento creado. ¡Listo para guardar meses!');
          }
          localStorage.setItem('gh_token', token);
          localStorage.setItem('gist_id', id);
          setGhToken(token);
          setGistId(id);
          setAllMonths(months);
          setSyncStatus('ok');
          setTokenInput('');
        } catch(e) {
          setSyncStatus('error');
          setSyncMsg(e.message);
        }
      };

      const saveMonth = async () => {
        if (!ghToken || !gistId) { alert('Primero conecta con GitHub en la pestaña Config'); return; }
        setSyncStatus('saving');
        setSyncMsg('Guardando...');
        const key = cfg.mes + '-' + cfg.anio;
        const monthData = {
          savedAt: new Date().toISOString(),
          label: key,
          cfg, prods, compras, ventas, gastos, otros, imp
        };
        const newMonths = { ...allMonths, [key]: monthData };
        try {
          const res = await fetch(`https://api.github.com/gists/${gistId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              files: { [GIST_FILENAME]: { content: JSON.stringify({ months: newMonths }) } }
            })
          });
          if (!res.ok) throw new Error('Error al guardar');
          setAllMonths(newMonths);
          setSyncStatus('ok');
          setSyncMsg('Guardado ✓  ' + key);
        } catch(e) {
          setSyncStatus('error');
          setSyncMsg('Error al guardar: ' + e.message);
        }
      };

      const loadMonth = (key) => {
        const m = allMonths[key];
        if (!m) return;
        if (!confirm('¿Cargar ' + key + '? Se reemplazarán los datos actuales en pantalla.')) return;
        setCfg(m.cfg);
        setProds(m.prods || []);
        setCompras(m.compras || []);
        setVentas(m.ventas || []);
        setGastos(m.gastos || []);
        setOtros(m.otros || []);
        setImp(m.imp || { isr:"", curIsr:"USD", ptu:"", curPtu:"USD", ex:"", curEx:"USD" });
        setTab('resultados');
        setSyncMsg(key + ' cargado ✓');
      };

      const deleteMonth = async (key) => {
        if (!confirm('¿Eliminar el mes ' + key + '? Esta acción no se puede deshacer.')) return;
        const newMonths = { ...allMonths };
        delete newMonths[key];
        try {
          await fetch(`https://api.github.com/gists/${gistId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              files: { [GIST_FILENAME]: { content: JSON.stringify({ months: newMonths }) } }
            })
          });
          setAllMonths(newMonths);
          setSyncMsg(key + ' eliminado');
        } catch(e) { setSyncMsg('Error al eliminar'); }
      };

      const newMonth = () => {
        if (!confirm('¿Comenzar un mes nuevo? Los datos actuales en pantalla se limpiarán (los meses guardados permanecen).')) return;
        setProds([]); setCompras([]); setVentas([]); setGastos([]); setOtros([]);
        setImp({ isr:"", curIsr:"USD", ptu:"", curPtu:"USD", ex:"", curEx:"USD" });
        const now = new Date();
        setCfg(c => ({ ...c, mes: MESES[now.getMonth()], anio: now.getFullYear() }));
        setTab('config');
      };

      // ── Conversions ──
      const toUSD = (amount, cur) => {
        const a = num(amount);
        if (cur==='USD') return a;
        if (cur==='CUP') return num(cfg.CUP_inf)>0 ? a/num(cfg.CUP_inf) : 0;
        if (cur==='EUR') return a*num(cfg.EUR_usd);
        return a;
      };
      const toCUP_of = (amount, cur) => {
        const a = num(amount);
        if (cur==='USD') return a*num(cfg.CUP_of);
        if (cur==='CUP') return a;
        if (cur==='EUR') return a*num(cfg.EUR_usd)*num(cfg.CUP_of);
        return a;
      };

      const costProm = useMemo(() => {
        const r = {};
        prods.forEach(p => {
          const cs = compras.filter(c=>c.pid===p.id);
          const tq = cs.reduce((s,c)=>s+num(c.qty),0);
          const tv = cs.reduce((s,c)=>s+num(c.qty)*toUSD(c.punit,c.cur),0);
          r[p.id] = tq>0 ? tv/tq : 0;
        });
        return r;
      }, [prods, compras, cfg.CUP_inf, cfg.EUR_usd]);

      const st = useMemo(() => {
        const vBruta = ventas.reduce((s,v)=>s+v.items.reduce((ss,i)=>ss+num(i.qty)*toUSD(i.punit,i.cur),0),0);
        const cVentas = ventas.reduce((s,v)=>s+v.items.reduce((ss,i)=>ss+num(i.qty)*(costProm[i.pid]||0),0),0);
        const comis = ventas.reduce((s,v)=>{const t=v.items.reduce((ss,i)=>ss+num(i.qty)*toUSD(i.punit,i.cur),0);return s+t*num(v.com)/100;},0);
        const totComp = compras.reduce((s,c)=>s+num(c.qty)*toUSD(c.punit,c.cur),0);
        const invFin = num(cfg.invIni)+totComp-cVentas;
        const gOp = gastos.reduce((s,g)=>s+toUSD(g.monto,g.cur),0);
        const totGasOp = comis+gOp;
        const oIng = otros.filter(o=>o.tipo==="ingreso").reduce((s,o)=>s+toUSD(o.monto,o.cur),0);
        const oGas = otros.filter(o=>o.tipo==="gasto").reduce((s,o)=>s+toUSD(o.monto,o.cur),0);
        const totImp = toUSD(imp.isr,imp.curIsr||'USD')+toUSD(imp.ptu,imp.curPtu||'USD')+toUSD(imp.ex,imp.curEx||'USD');
        const uBruta=vBruta-cVentas, uOper=uBruta-totGasOp, uAnte=uOper+oIng-oGas, uNeta=uAnte-totImp;
        return { vBruta,cVentas,uBruta,comis,gOp,totGasOp,oIng,oGas,totImp,uOper,uAnte,uNeta,totComp,invFin,
          mbr:vBruta>0?uBruta/vBruta:0, mnr:vBruta>0?uNeta/vBruta:0 };
      }, [ventas,compras,gastos,otros,imp,costProm,cfg]);

      const onat = useMemo(() => {
        const ventasCUP = ventas.reduce((s,v)=>s+v.items.reduce((ss,i)=>ss+num(i.qty)*toCUP_of(i.punit,i.cur),0),0);
        const impVentas = ventasCUP*0.11;
        const utilCUP = st.uAnte*num(cfg.CUP_of);
        const impIngresos = utilCUP>0 ? utilCUP*0.35 : 0;
        const totalONAT = impVentas+impIngresos;
        return { ventasCUP, impVentas, utilCUP, impIngresos, totalONAT,
          usd_of: num(cfg.CUP_of)>0 ? totalONAT/num(cfg.CUP_of) : 0,
          usd_inf: num(cfg.CUP_inf)>0 ? totalONAT/num(cfg.CUP_inf) : 0 };
      }, [st, cfg, ventas]);

      // ── Handlers ──
      const addProd=()=>{if(!fp.nom)return;setProds(p=>[...p,{id:uid(),nom:fp.nom,uni:fp.uni}]);setFp({nom:"",uni:"pza"});};
      const delProd=(id)=>setProds(p=>p.filter(x=>x.id!==id));
      const addComp=()=>{if(!fc.pid||!fc.qty||!fc.punit)return;setCompras(c=>[...c,{...fc,id:uid()}]);setFc({fecha:"",prov:"",pid:"",qty:"",punit:"",cur:"USD"});};
      const delComp=(id)=>setCompras(c=>c.filter(x=>x.id!==id));
      const addVItem=()=>{if(!fvi.pid||!fvi.qty||!fvi.punit)return;setFv(v=>({...v,items:[...v.items,{...fvi,id:uid()}]}));setFvi({pid:"",qty:"",punit:"",cur:"USD"});};
      const delVItem=(id)=>setFv(v=>({...v,items:v.items.filter(i=>i.id!==id)}));
      const addVenta=()=>{if(!fv.cli||fv.items.length===0)return;setVentas(vs=>[...vs,{...fv,id:uid()}]);setFv({fecha:"",cli:"",vend:"",com:cfg.comDef,items:[]});};
      const delVenta=(id)=>setVentas(v=>v.filter(x=>x.id!==id));
      const addGasto=()=>{if(!fg.conc||!fg.monto)return;setGastos(g=>[...g,{...fg,id:uid()}]);setFg({cat:GCATS[0],conc:"",monto:"",cur:"USD"});};
      const delGasto=(id)=>setGastos(g=>g.filter(x=>x.id!==id));
      const addOtro=()=>{if(!fo.conc||!fo.monto)return;setOtros(o=>[...o,{...fo,id:uid()}]);setFo({tipo:"ingreso",conc:"",monto:"",cur:"USD"});};
      const delOtro=(id)=>setOtros(o=>o.filter(x=>x.id!==id));

      // ── Format ──
      const fmtC=(a,cur)=>{const v=num(a);const abs=Math.abs(v).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});const s=v<0?"-":"";if(cur==='USD')return s+'$'+abs;if(cur==='EUR')return s+'€'+abs;return s+abs+' CUP';};
      const fmtEq=(a,cur)=>{const m=fmtC(a,cur);if(cur==='USD')return m;return m+' (≈'+fmtC(toUSD(a,cur),'USD')+')';};
      const fmtM=(v)=>{const n2=num(v);const abs=Math.abs(n2).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});return (n2<0?"-":"")+"$"+abs;};
      const fmtCUP=(v)=>{const n2=num(v);const abs=Math.abs(n2).toLocaleString("es-MX",{minimumFractionDigits:2,maximumFractionDigits:2});return (n2<0?"-":"")+abs+" CUP";};
      const pNom=(id)=>{const p=prods.find(p=>p.id===id);return p?p.nom:"?";};
      const pUni=(id)=>{const p=prods.find(p=>p.id===id);return p?p.uni:"";};

      const exportXL = async () => {
        const wb = new ExcelJS.Workbook();
        wb.creator = cfg.nombre; wb.created = new Date();

        // ── Style constants ──
        const SC = 4; // Start col D
        const GRN='52b788',DRK='0f2318',MID_G='1a2d1c',GLD='f4a228',RD='e05252',PUR_X='c084fc',MUT='6d9073',WHT='FFFFFF',LIT='e4ede5';
        const brd = {top:{style:'thin',color:{argb:'FF2d5a3d'}},left:{style:'thin',color:{argb:'FF2d5a3d'}},bottom:{style:'thin',color:{argb:'FF2d5a3d'}},right:{style:'thin',color:{argb:'FF2d5a3d'}}};
        const fnt = (b,sz,c,i) => ({name:'Calibri',size:sz||10,bold:!!b,italic:!!i,color:c?{argb:'FF'+c}:undefined});
        const fl = c => ({type:'pattern',pattern:'solid',fgColor:{argb:'FF'+c}});
        const al = (h,v) => ({horizontal:h||'left',vertical:v||'middle'});
        const USD_F = '"$"#,##0.00', PCT_F = '0.0%', CUP_F = '#,##0.00" CUP"';

        // ── Helpers ──
        const setHdr = (ws, r, headers, bg) => {
          ws.getRow(r).height = 22;
          headers.forEach((h,i) => {
            const c = ws.getCell(r, SC+i);
            c.value = h; c.font = fnt(true,10,WHT); c.fill = fl(bg||DRK);
            c.border = brd; c.alignment = al('center');
          });
          return r+1;
        };

        const setRow = (ws, r, vals, fmts, opts) => {
          opts = opts||{};
          ws.getRow(r).height = opts.big ? 24 : opts.sec ? 16 : 18;
          vals.forEach((v,i) => {
            const c = ws.getCell(r, SC+i);
            c.value = v; c.border = brd;
            if (opts.big) {
              c.font = fnt(true,11, i===0?LIT:(typeof v==='number'?(v>=0?GRN:RD):LIT));
              c.fill = fl('1f3d2a'); c.alignment = al(i===0?'left':'right');
            } else if (opts.tot) {
              c.font = fnt(true,10, i===0?MUT:(typeof v==='number'?(v>=0?GRN:RD):LIT));
              c.fill = fl('172d1e'); c.alignment = al(i===0?'left':'right');
            } else if (opts.sec) {
              c.font = fnt(true,9,GRN); c.fill = fl('152218'); c.alignment = al('left');
            } else {
              c.font = fnt(opts.b||false,10,opts.col||null);
              c.alignment = al(i===0?'left':'right');
            }
            if (typeof v==='number' && !opts.sec && fmts && fmts[i]) c.numFmt = fmts[i];
          });
          return r+1;
        };

        const addTitle = (ws, rows) => {
          let r = 3;
          rows.forEach(t => {
            const c = ws.getCell(r, SC);
            c.value = t.v; c.font = fnt(t.b,t.sz,t.c,t.i);
            c.border = brd; ws.getRow(r).height = t.rh||18;
            if (t.m) ws.mergeCells(r,SC,r,SC+t.m-1);
            r++;
          });
          return r+1;
        };

        const autoFit = (ws, n) => {
          for (let ci=SC; ci<SC+n; ci++) {
            let mx=10;
            ws.getColumn(ci).eachCell({includeEmpty:false}, c => {
              const l = c.value!=null?String(c.value).replace(/[\$,]/g,'').length:0;
              if(l>mx) mx=l;
            });
            ws.getColumn(ci).width = Math.min(mx+5,62);
          }
        };

        // ═══ SHEET 1: Estado de Resultados ═══
        const ws1 = wb.addWorksheet('Estado de Resultados');
        ws1.properties.tabColor = {argb:'FF'+GRN};
        let r1 = addTitle(ws1,[
          {v:'ESTADO DE RESULTADOS',b:true,sz:16,c:GRN,rh:28,m:3},
          {v:cfg.nombre,b:true,sz:13,c:LIT,rh:22,m:3},
          {v:'Período: '+cfg.mes+' '+cfg.anio,sz:10,c:MUT,m:3},
          {v:'CUP oficial: 1 USD = '+cfg.CUP_of+' | CUP informal: 1 USD = '+cfg.CUP_inf+' | EUR: 1 EUR = '+cfg.EUR_usd+' USD',sz:9,c:MUT,i:true,m:3}
        ]);
        r1 = setHdr(ws1,r1,['CONCEPTO','MONTO USD','% VENTAS']);
        const ER=[null,USD_F,PCT_F];
        r1 = setRow(ws1,r1,['INGRESOS','',''],ER,{sec:true});
        r1 = setRow(ws1,r1,['Ventas Brutas',st.vBruta,1],ER,{b:true});
        r1++;
        r1 = setRow(ws1,r1,['COSTO DE VENTAS','',''],ER,{sec:true});
        r1 = setRow(ws1,r1,['  Inventario Inicial',num(cfg.invIni),''],ER,{});
        r1 = setRow(ws1,r1,['  (+) Compras del Período',st.totComp,''],ER,{});
        r1 = setRow(ws1,r1,['  (-) Inventario Final',st.invFin,''],ER,{});
        r1 = setRow(ws1,r1,['  = Costo de Ventas',st.cVentas,st.vBruta>0?st.cVentas/st.vBruta:0],ER,{tot:true});
        r1++;
        r1 = setRow(ws1,r1,['UTILIDAD BRUTA',st.uBruta,st.mbr],ER,{big:true});
        r1++;
        r1 = setRow(ws1,r1,['GASTOS OPERATIVOS','',''],ER,{sec:true});
        r1 = setRow(ws1,r1,['  Comisiones sobre Ventas',st.comis,st.vBruta>0?st.comis/st.vBruta:0],ER,{});
        gastos.forEach(g=>{r1=setRow(ws1,r1,['  '+g.cat+' — '+g.conc+' ('+g.cur+')',toUSD(g.monto,g.cur),''],ER,{});});
        r1 = setRow(ws1,r1,['  = Total Gastos Operativos',st.totGasOp,st.vBruta>0?st.totGasOp/st.vBruta:0],ER,{tot:true});
        r1++;
        r1 = setRow(ws1,r1,['UTILIDAD DE OPERACIÓN',st.uOper,st.vBruta>0?st.uOper/st.vBruta:0],ER,{big:true});
        r1++;
        if(otros.length>0){
          r1 = setRow(ws1,r1,['OTROS INGRESOS Y GASTOS','',''],ER,{sec:true});
          otros.filter(o=>o.tipo==="ingreso").forEach(o=>{r1=setRow(ws1,r1,['  (+) '+o.conc+' ('+o.cur+')',toUSD(o.monto,o.cur),''],ER,{});});

                    <tbody>
                      <tr style={{background:MID2}}><td style={TD(MUTED)}>Comisiones s/ventas</td><td style={TD(MUTED)}>Automático ({ventas.length} ventas)</td><td style={TD(GOLD)}>{fmtM(st.comis)}</td><td style={TD()}>{curBadge('USD')}</td><td style={TD(GOLD)}>{fmtM(st.comis)}</td><td style={TD()}></td></tr>
                      {gastos.map(g=>(<tr key={g.id}><td style={TD(MUTED)}>{g.cat}</td><td style={TD()}>{g.conc}</td><td style={TD(curCol(g.cur))}>{fmtC(g.monto,g.cur)}</td><td style={TD()}>{curBadge(g.cur)}</td><td style={TD(MUTED)}>{fmtM(toUSD(g.monto,g.cur))}</td><td style={TD()}><button onClick={()=>delGasto(g.id)} style={btn("d")}>✕</button></td></tr>))}
                      <tr style={{background:MID2}}><td colSpan={4} style={{...TD(MUTED),fontWeight:700,textAlign:"right"}}>TOTAL USD</td><td style={{...TD(RED),fontWeight:700}}>{fmtM(st.totGasOp)}</td><td style={TD()}></td></tr>
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* ─── OTROS ─── */}
            {tab==="otros" && (
              <div>
                <div style={card}>
                  <div style={{fontSize:13,fontWeight:700,color:ACE,marginBottom:6}}>🔄 Otros Ingresos y Gastos</div>
                  <div style={{fontSize:11,color:MUTED,marginBottom:12}}>Intereses, multas, venta de activos — en cualquier moneda.</div>
                  <div style={row(8)}>
                    <div style={fld(1)}><span style={lbl}>Tipo</span><select style={inp} value={fo.tipo} onChange={e=>setFo(o=>({...o,tipo:e.target.value}))}><option value="ingreso">✅ Otro Ingreso</option><option value="gasto">❌ Otro Gasto</option></select></div>
                    <div style={fld(3)}><span style={lbl}>Concepto</span><input style={inp} value={fo.conc} onChange={e=>setFo(o=>({...o,conc:e.target.value}))} placeholder="Ej: Interés bancario, Multa..."/></div>
                    <div style={fld(2)}><span style={lbl}>Monto + Moneda</span><AmtCur amt={fo.monto} cur={fo.cur} onAmtChange={v=>setFo(o=>({...o,monto:v}))} onCurChange={v=>setFo(o=>({...o,cur:v}))}/></div>
                    <div style={{alignSelf:"flex-end",paddingBottom:1}}><button onClick={addOtro} style={btn()}>+ Agregar</button></div>
                  </div>
                </div>
                {otros.length>0&&(<div style={{...card,padding:0}}><table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr><th style={TH}>Tipo</th><th style={TH}>Concepto</th><th style={TH}>Monto</th><th style={TH}>Mon.</th><th style={TH}>≈ USD</th><th style={TH}></th></tr></thead>
                  <tbody>{otros.map(o=>(<tr key={o.id}><td style={TD(o.tipo==="ingreso"?ACE:RED)}>{o.tipo==="ingreso"?"(+) Ingreso":"(-) Gasto"}</td><td style={TD()}>{o.conc}</td><td style={TD(curCol(o.cur))}>{o.tipo==="gasto"?"-":""}{fmtC(o.monto,o.cur)}</td><td style={TD()}>{curBadge(o.cur)}</td><td style={TD(MUTED)}>{fmtM(toUSD(o.monto,o.cur))}</td><td style={TD()}><button onClick={()=>delOtro(o.id)} style={btn("d")}>✕</button></td></tr>))}</tbody>
                </table></div>)}
              </div>
            )}

            {/* ─── ONAT ─── */}
            {tab==="onat" && (
              <div>
                <div style={{...card,borderTop:"3px solid "+PUR}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:PUR,marginBottom:4}}>🏛 Cálculo ONAT — Agencia Tributaria Cuba</div>
                      <div style={{fontSize:11,color:MUTED}}>Tasa oficial: <span style={{color:PUR,fontFamily:"monospace",fontWeight:700}}>1 USD = {cfg.CUP_of} CUP</span>{"  ·  "}Informal: <span style={{color:GOLD,fontFamily:"monospace",fontWeight:700}}>1 USD = {cfg.CUP_inf} CUP</span></div>
                    </div>
                    <div style={{background:BG,borderRadius:4,padding:"10px 16px",textAlign:"right",border:"1px solid "+PUR+'44'}}>
                      <div style={{fontSize:10,color:MUTED}}>Total a Pagar ONAT</div>
                      <div style={{fontSize:22,fontWeight:800,color:PUR,fontFamily:"'Courier New',monospace"}}>{fmtCUP(onat.totalONAT)}</div>
                      <div style={{fontSize:10,color:GOLD,marginTop:2}}>≈ {fmtM(onat.usd_inf)} USD (informal)</div>
                    </div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
                  <div style={{...card,borderTop:"2px solid "+GOLD}}>
                    <div style={{fontSize:12,fontWeight:700,color:GOLD,marginBottom:12}}>1. Impuesto sobre las Ventas — 11%</div>
                    {[{lbl:"Ventas totales (USD)",val:fmtM(st.vBruta),col:ACE},{lbl:"× Tasa oficial → CUP",val:fmtCUP(onat.ventasCUP),col:PUR}].map((r,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #223d25"}}><span style={{fontSize:11,color:MUTED}}>{r.lbl}</span><span style={{fontFamily:"monospace",color:r.col,fontWeight:600}}>{r.val}</span></div>
                    ))}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"12px 10px",background:MID2,borderRadius:4,marginTop:8}}>
                      <span style={{fontSize:13,fontWeight:700,color:LIGHT}}>= 11% Impuesto s/ Ventas</span>
                      <span style={{fontFamily:"monospace",fontWeight:800,fontSize:16,color:GOLD}}>{fmtCUP(onat.impVentas)}</span>
                    </div>
                  </div>
                  <div style={{...card,borderTop:"2px solid "+ACE}}>
                    <div style={{fontSize:12,fontWeight:700,color:ACE,marginBottom:12}}>2. Impuesto sobre los Ingresos — 35%</div>
                    {[{lbl:"Utilidad antes de imp. (USD)",val:fmtM(st.uAnte),col:num(st.uAnte)>=0?ACE:RED},{lbl:"× Tasa oficial → CUP",val:fmtCUP(onat.utilCUP),col:PUR}].map((r,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #223d25"}}><span style={{fontSize:11,color:MUTED}}>{r.lbl}</span><span style={{fontFamily:"monospace",color:r.col,fontWeight:600}}>{r.val}</span></div>
                    ))}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"12px 10px",background:MID2,borderRadius:4,marginTop:8}}>
                      <span style={{fontSize:13,fontWeight:700,color:LIGHT}}>= 35% Impuesto s/ Ingresos</span>
                      <span style={{fontFamily:"monospace",fontWeight:800,fontSize:16,color:ACE}}>{fmtCUP(onat.impIngresos)}</span>
                    </div>
                    {num(st.uAnte)<=0&&<div style={{fontSize:10,color:MUTED,fontStyle:"italic",marginTop:6}}>* No aplica — utilidad negativa o cero</div>}
                  </div>
                </div>
                <div style={{...card,background:"#120d1e",border:"2px solid "+PUR}}>
                  <div style={{fontSize:13,fontWeight:700,color:PUR,marginBottom:14}}>📋 Total ONAT a Pagar</div>
                  {[{lbl:"Impuesto s/ Ventas (11%)",val:fmtCUP(onat.impVentas),col:GOLD},{lbl:"Impuesto s/ Ingresos (35%)",val:fmtCUP(onat.impIngresos),col:ACE}].map((r,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #2a1a40"}}><span style={{color:MUTED}}>{r.lbl}</span><span style={{fontFamily:"monospace",color:r.col,fontWeight:600}}>{r.val}</span></div>))}
                  <div style={{display:"flex",justifyContent:"space-between",padding:"14px 0 8px"}}><span style={{fontSize:16,fontWeight:800,color:PUR}}>TOTAL A PAGAR</span><span style={{fontFamily:"monospace",fontWeight:800,fontSize:22,color:PUR}}>{fmtCUP(onat.totalONAT)}</span></div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap",padding:"12px 0",borderTop:"1px solid #2a1a40"}}>
                    <div style={{flex:1,background:BG,borderRadius:4,padding:"10px 12px"}}><div style={{fontSize:10,color:MUTED,marginBottom:2}}>USD (tasa oficial)</div><div style={{fontFamily:"monospace",color:MUTED,fontSize:13}}>{fmtM(onat.usd_of)}</div></div>
                    <div style={{flex:1,background:BG,borderRadius:4,padding:"10px 12px",border:"1px solid "+GOLD+'44'}}><div style={{fontSize:10,color:MUTED,marginBottom:2}}>USD (tasa informal / real)</div><div style={{fontFamily:"monospace",color:GOLD,fontSize:13,fontWeight:700}}>{fmtM(onat.usd_inf)}</div></div>
                  </div>
                  <div style={{marginTop:10,padding:"8px 12px",background:BG,borderRadius:4,fontSize:10,color:"#9b7ac4",lineHeight:1.7}}>⚠ Cálculos orientativos. Confirmar con tu gestor de la ONAT.</div>
                </div>
              </div>
            )}

            {/* ─── RESULTADOS ─── */}
            {tab==="resultados" && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"start"}}>
                <div style={{...card,padding:0,overflow:"hidden"}}>
                  <div style={{background:MID2,padding:"16px 18px",borderBottom:"1px solid #223d25",textAlign:"center"}}>
                    <div style={{fontSize:10,color:MUTED,textTransform:"uppercase",letterSpacing:"0.12em",fontFamily:"monospace"}}>Estado de Resultados · USD (tasa informal)</div>
                    <div style={{fontSize:18,fontWeight:800,color:ACE,marginTop:3}}>{cfg.nombre}</div>
                    <div style={{fontSize:11,color:MUTED,marginTop:2,fontFamily:"monospace"}}>Período: {cfg.mes} {cfg.anio}</div>
                  </div>
                  <div style={{padding:"10px 0"}}>
                    <div style={{padding:"4px 16px 6px",fontSize:9,color:MUTED,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>Ingresos</div>
                    <SRow label="Ventas Brutas" val={st.vBruta} bold={true}/>
                    <div style={{padding:"10px 16px 4px",fontSize:9,color:MUTED,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>Costo de Ventas</div>
                    <SRow label="Inventario Inicial" val={cfg.invIni} indent={1}/><SRow label="(+) Compras del Período" val={st.totComp} indent={1}/><SRow label="(-) Inventario Final" val={-num(st.invFin)} indent={1}/><SRow label="= Costo de Ventas" val={-st.cVentas} bold={true}/>
                    <div style={{height:1,background:"#223d25",margin:"8px 0"}}/>
                    <SRow label="UTILIDAD BRUTA" val={st.uBruta} big={true}/>
                    <div style={{fontSize:10,color:MUTED,textAlign:"right",paddingRight:16,paddingBottom:6,fontFamily:"monospace"}}>Margen bruto: {(st.mbr*100).toFixed(1)}%</div>
                    <div style={{padding:"6px 16px 4px",fontSize:9,color:MUTED,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>Gastos Operativos</div>
                    <SRow label="(-) Comisiones sobre Ventas" val={-st.comis} indent={1}/>
                    {gastos.map(g=><SRow key={g.id} label={"(-) "+g.cat+" ("+g.cur+")"} val={-toUSD(g.monto,g.cur)} indent={1}/>)}
                    <SRow label="= Total Gastos Operativos" val={-st.totGasOp} bold={true}/>
                    <div style={{height:1,background:"#223d25",margin:"8px 0"}}/>
                    <SRow label="UTILIDAD DE OPERACIÓN" val={st.uOper} big={true}/>
                    <div style={{fontSize:10,color:MUTED,textAlign:"right",paddingRight:16,paddingBottom:6,fontFamily:"monospace"}}>Margen operativo: {st.vBruta>0?(st.uOper/st.vBruta*100).toFixed(1):0}%</div>
                    {otros.length>0&&(<div><div style={{padding:"6px 16px 4px",fontSize:9,color:MUTED,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>Otros Ingresos y Gastos</div>{otros.filter(o=>o.tipo==="ingreso").map(o=><SRow key={o.id} label={"(+) "+o.conc+" ("+o.cur+")"} val={toUSD(o.monto,o.cur)} indent={1}/>)}{otros.filter(o=>o.tipo==="gasto").map(o=><SRow key={o.id} label={"(-) "+o.conc+" ("+o.cur+")"} val={-toUSD(o.monto,o.cur)} indent={1}/>)}<SRow label="= Neto Otros" val={st.oIng-st.oGas} bold={true}/><div style={{height:1,background:"#223d25",margin:"8px 0"}}/></div>)}
                    <SRow label="UTILIDAD ANTES DE IMPUESTOS" val={st.uAnte} big={true}/>
                    <div style={{padding:"6px 16px 4px",fontSize:9,color:PUR,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>ONAT</div>
                    <SRow label={"(-) ONAT estimado (equiv. USD informal)"} val={-onat.usd_inf} indent={1}/>
                    <div style={{height:1,background:"#223d25",margin:"8px 0"}}/>
                    <div style={{padding:"4px 0 14px"}}>
                      <SRow label="UTILIDAD NETA" val={st.uNeta} big={true}/>
                      <div style={{fontSize:10,color:MUTED,textAlign:"right",paddingRight:16,fontFamily:"monospace"}}>Margen neto: {(st.mnr*100).toFixed(1)}%</div>
                    </div>
                  </div>
                </div>
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                    {[{label:"Ventas (USD)",val:fmtM(st.vBruta),color:ACE},{label:"Margen Bruto",val:(st.mbr*100).toFixed(1)+"%",color:st.mbr>=0.2?ACE:st.mbr>=0?GOLD:RED},{label:"Utilidad Neta",val:fmtM(st.uNeta),color:num(st.uNeta)>=0?ACE:RED},{label:"Margen Neto",val:(st.mnr*100).toFixed(1)+"%",color:st.mnr>=0.08?ACE:st.mnr>=0?GOLD:RED},{label:"ONAT (CUP)",val:fmtCUP(onat.totalONAT),color:PUR},{label:"ONAT (USD inf.)",val:fmtM(onat.usd_inf),color:PUR},{label:"Comisiones",val:fmtM(st.comis),color:GOLD},{label:"COGS",val:fmtM(st.cVentas),color:MUTED}].map(k=>(
                      <div key={k.label} style={{background:MID,borderRadius:4,padding:"11px 13px"}}><div style={{fontSize:9,color:MUTED,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,fontWeight:700}}>{k.label}</div><div style={{fontSize:14,fontWeight:800,color:k.color,fontFamily:"'Courier New',monospace"}}>{k.val}</div></div>
                    ))}
                  </div>
                  <div style={{...card,background:MID2,marginBottom:14}}>
                    <div style={{fontSize:10,fontWeight:700,color:MUTED,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>Tasas Activas</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {[{lbl:"CUP OFICIAL",val:"1 USD = "+cfg.CUP_of+" CUP",col:PUR},{lbl:"CUP INFORMAL",val:"1 USD = "+cfg.CUP_inf+" CUP",col:GOLD},{lbl:"EUR/USD",val:"1 EUR = "+cfg.EUR_usd+" USD",col:BLUE}].map(r=>(
                        <div key={r.lbl} style={{background:BG,borderRadius:4,padding:"8px 12px",flex:1}}><div style={{fontSize:9,color:MUTED,marginBottom:2}}>{r.lbl}</div><div style={{fontFamily:"monospace",color:r.col,fontWeight:700,fontSize:12}}>{r.val}</div></div>
                      ))}
                    </div>
                  </div>
                  {ventas.length>0&&(()=>{const bV={};ventas.forEach(v=>{const t=v.items.reduce((s,i)=>s+num(i.qty)*toUSD(i.punit,i.cur),0);const k=v.vend||"Sin nombre";if(!bV[k])bV[k]={v:0,c:0};bV[k].v+=t;bV[k].c+=t*num(v.com)/100;});return(<div style={{...card,padding:0,overflow:"hidden",marginBottom:14}}><div style={{background:MID2,padding:"10px 14px",fontSize:10,color:GOLD,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Comisiones por Vendedor</div><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={TH}>Vendedor</th><th style={TH}>Ventas USD</th><th style={TH}>Comisión USD</th></tr></thead><tbody>{Object.entries(bV).map(([vend,d])=><tr key={vend}><td style={TD()}>{vend}</td><td style={TD(ACE)}>{fmtM(d.v)}</td><td style={TD(GOLD)}>{fmtM(d.c)}</td></tr>)}</tbody></table></div>);})()}
                  <div style={{textAlign:"center"}}>
                    <button onClick={exportXL} style={{...btn("g"),padding:"11px 28px",fontSize:13}}>⬇ Exportar a Excel</button>
                    <div style={{fontSize:10,color:MUTED,marginTop:6,lineHeight:1.6}}>6 hojas: ER · ONAT · Ventas · Compras · Gastos · Comisiones</div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
