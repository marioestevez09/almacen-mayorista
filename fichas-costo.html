<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;
const fmt=(n,d=2)=>{if(n===null||n===undefined||isNaN(n))return "0."+"0".repeat(d);return Number(n).toLocaleString("es-ES",{minimumFractionDigits:d,maximumFractionDigits:d});};
const num=v=>parseFloat(v)||0;
const uid=()=>Math.random().toString(36).slice(2,10);
const today=()=>new Date().toISOString().slice(0,10);

const TERMINOS=[{k:"CIF",l:"CIF — Costo, Seguro y Flete"},{k:"CFR",l:"CFR — Costo y Flete"},{k:"FOB",l:"FOB — Franco a Bordo"},{k:"NAC",l:"Compra Nacionalizada"},{k:"PROD",l:"Producción Propia"},{k:"OTRA",l:"Otra Vía"}];
const TBADGE={CIF:"b-cif",CFR:"b-cfr",FOB:"b-fob",NAC:"b-nac",PROD:"b-prod",OTRA:"b-otra"};
const MONEDAS=["USD","CUP","EUR"];

// ── MODELOS DE DATOS ──
// Gasto de LOTE: compartido, se distribuye entre productos por proporción
// enOnat=true → entra en el costo base ONAT de cada producto
// enReal=true → entra en el costo real de cada producto
const emptyGastoLote=()=>({id:uid(),concepto:"",monto:"",moneda:"USD",enOnat:true,enReal:true});
// Gasto ESPECÍFICO de producto: solo afecta a ese producto, solo va a ficha Real
const emptyGastoProd=()=>({id:uid(),concepto:"",monto:"",moneda:"USD"});
// Producto dentro del lote
const emptyProd=()=>({
  id:uid(),nombre:"",codigo:"",
  precioFactura:"",monedaPrecio:"USD",tipoPrecio:"total",
  niveles:[],          // [{id,nombre,unidad,total,porNivelAnterior}] nivel 0=unidad base
  gastosEsp:[],        // gastos específicos del producto (solo Real)
  pvOnat:"",monedaPvOnat:"CUP",
  pvReal:"",monedaPvReal:"USD",
  notas:""
});
// Lote / Contenedor
const defCont=()=>({
  id:uid(),codigo:"",nombre:"",termino:"CIF",proveedor:"",pais:"",fecha:today(),notas:"",
  flete:"",monedaFlete:"USD",
  thcd:"",monedaThcd:"USD",
  seguroTipo:"pct",seguroValor:"",monedaSeguro:"USD",
  gastos:[],     // gastos del lote con flags enOnat/enReal
  productos:[]
});

// ── GIST ──
async function loadGist(token,gistId){
  const r=await fetch("https://api.github.com/gists/"+gistId,{headers:{Authorization:"token "+token,Accept:"application/vnd.github.v3+json"}});
  if(!r.ok)throw new Error("Error "+r.status);
  const d=await r.json();
  const c=d.files["fichas-costo.json"]?.content;
  return c?JSON.parse(c):null;
}
async function saveGist(token,gistId,payload){
  const r=await fetch("https://api.github.com/gists/"+gistId,{method:"PATCH",
    headers:{Authorization:"token "+token,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},
    body:JSON.stringify({files:{"fichas-costo.json":{content:JSON.stringify(payload,null,2)}}})});
  if(!r.ok)throw new Error("Error "+r.status);
}

// ── CONVERSIONES ──
const toUSD=(m,mon,rates)=>{
  if(mon==="USD")return num(m);
  if(mon==="EUR")return num(m)*rates.eurUsd;
  return num(m)/rates.mercado;
};
const toCUPonat=(m,mon,rates)=>{
  if(mon==="CUP")return num(m);
  if(mon==="USD")return num(m)*rates.onat;
  return num(m)*rates.eurUsd*rates.onat;
};

// ── CÁLCULO DEL LOTE ──
// Retorna totales del lote para distribución posterior
function calcLote(c,rates){
  const prods=c.productos||[];
  // Valor mercancía = suma de precios de factura de todos los productos en USD
  let valorMercUSD=0;
  prods.forEach(p=>{
    let pu=toUSD(p.precioFactura,p.monedaPrecio,rates);
    if(p.tipoPrecio==="unit"){const cb=num((p.niveles||[])[0]?.total||0);pu*=cb;}
    valorMercUSD+=pu;
  });
  const fleteUSD=toUSD(c.flete,c.monedaFlete,rates);
  const thcdUSD=toUSD(c.thcd,c.monedaThcd,rates);
  let seguroUSD=0;
  if(c.seguroTipo==="pct")seguroUSD=valorMercUSD*(num(c.seguroValor)/100);
  else seguroUSD=toUSD(c.seguroValor,c.monedaSeguro,rates);
  const cifUSD=valorMercUSD+fleteUSD+thcdUSD+seguroUSD;
  // Gastos del lote totales (para info general)
  const gastosLoteOnatUSD=(c.gastos||[]).filter(g=>g.enOnat).reduce((s,g)=>s+toUSD(g.monto,g.moneda,rates),0);
  const gastosLoteRealUSD=(c.gastos||[]).filter(g=>g.enReal).reduce((s,g)=>s+toUSD(g.monto,g.moneda,rates),0);
  const costoTotalUSD=cifUSD+gastosLoteRealUSD;
  return {valorMercUSD,fleteUSD,thcdUSD,seguroUSD,cifUSD,gastosLoteOnatUSD,gastosLoteRealUSD,costoTotalUSD};
}

// ── CÁLCULO POR PRODUCTO ──
// Un solo costo unitario USD se calcula primero.
// Al final: ONAT multiplica por tasa ONAT → CUP. Real queda en USD.
function calcProducto(p,c,rates,lote){
  const cantBase=num((p.niveles||[])[0]?.total||0);
  // Precio mercancía del producto en USD
  let precioMercUSD=toUSD(p.precioFactura,p.monedaPrecio,rates);
  if(p.tipoPrecio==="unit")precioMercUSD*=cantBase;
  // Proporción del valor total del lote
  const prop=lote.valorMercUSD>0?precioMercUSD/lote.valorMercUSD:0;
  // CIF proporcional (flete+THCD+seguro distribuidos por valor)
  const fleteP=lote.fleteUSD*prop;
  const thcdP=lote.thcdUSD*prop;
  const seguroP=lote.seguroUSD*prop;
  const cifPropUSD=fleteP+thcdP+seguroP;
  // BASE COMPARTIDA: precio mercancía + CIF proporcional
  const baseUSD=precioMercUSD+cifPropUSD;
  // Gastos del LOTE filtrados y distribuidos por proporción
  const gastosLoteOnatP=lote.gastosLoteOnatUSD*prop;  // van a ONAT
  const gastosLoteRealP=lote.gastosLoteRealUSD*prop;  // van a Real
  // Gastos específicos del producto (solo Real)
  const gastosEspUSD=(p.gastosEsp||[]).reduce((s,g)=>s+toUSD(g.monto,g.moneda,rates),0);

  // ── FICHA ONAT (en USD primero, luego × tasa ONAT al final) ──
  // Costo ONAT USD = base + gastos lote marcados enOnat (proporción)
  const costoOnatTotalUSD=baseUSD+gastosLoteOnatP;
  const costoOnatUnitUSD=cantBase>0?costoOnatTotalUSD/cantBase:0;
  // Al final aplicamos la tasa ONAT para expresar en CUP
  const costoOnatUnitCUP=costoOnatUnitUSD*rates.onat;
  const costoOnatTotalCUP=costoOnatTotalUSD*rates.onat;
  // CIF proporcional en CUP (para display en ficha ONAT)
  const cifOnatCUP=baseUSD*rates.onat;

  // ── FICHA REAL (todo en USD con tasa mercado) ──
  // Costo Real USD = base + gastos lote marcados enReal + gastos específicos producto
  const costoRealTotalUSD=baseUSD+gastosLoteRealP+gastosEspUSD;
  const costoRealUnitUSD=cantBase>0?costoRealTotalUSD/cantBase:0;

  return {
    cantBase,prop,precioMercUSD,fleteP,thcdP,seguroP,cifPropUSD,
    baseUSD,gastosLoteOnatP,gastosLoteRealP,gastosEspUSD,
    costoOnatTotalUSD,costoOnatUnitUSD,costoOnatUnitCUP,costoOnatTotalCUP,cifOnatCUP,
    costoRealTotalUSD,costoRealUnitUSD
  };
}

// ── CÁLCULO DE NIVELES DE EMPAQUE ──
// Recibe costoUnitBase (en cualquier moneda) y calcula costo por cada nivel
function calcNiveles(niveles,costoUnitBase){
  if(!niveles||!niveles.length)return[];
  return niveles.map((n,i)=>{
    let ub=1;
    // unidadesBase acumula multiplicando porNivelAnterior desde nivel 1 en adelante
    if(i>0){for(let j=1;j<=i;j++)ub*=num(niveles[j].porNivelAnterior||0);}
    return {...n,unidadesBase:ub,costo:costoUnitBase*ub};
  });
}

// ── CÁLCULO DE IMPUESTOS ONAT ──
function calcImpuestos(pvOnatCUP,costoOnatUnitCUP){
  if(!pvOnatCUP||pvOnatCUP<=0)return{imp11:0,utilOnat:0,imp35:0,totalImpCUP:0};
  const imp11=pvOnatCUP*0.11;
  const utilOnat=pvOnatCUP-costoOnatUnitCUP;
  const imp35=utilOnat>0?utilOnat*0.35:0;
  const totalImpCUP=imp11+imp35;
  return{imp11,utilOnat,imp35,totalImpCUP};
}

// ── INDICADORES DE RENTABILIDAD ──
// markup = utilidad / costo × 100 (cuánto gano sobre lo que invertí)
// margen = utilidad / ventas × 100 (cuánto de cada peso vendido es ganancia)
function calcRentabilidad(costoUSD,pvUSD,impuestosUSD){
  if(!costoUSD||costoUSD<=0||!pvUSD||pvUSD<=0)return null;
  const margenBruto=pvUSD-costoUSD;
  const margenNeto=margenBruto-impuestosUSD;
  const markupBruto=costoUSD>0?(margenBruto/costoUSD)*100:0;
  const markupNeto=costoUSD>0?(margenNeto/costoUSD)*100:0;
  const margenBrutoPct=pvUSD>0?(margenBruto/pvUSD)*100:0;
  const margenNetoPct=pvUSD>0?(margenNeto/pvUSD)*100:0;
  return{margenBruto,margenNeto,markupBruto,markupNeto,margenBrutoPct,margenNetoPct};
}

// ── PIN ──
function PinScreen({onUnlock,storedHash}){
  const [digits,setDigits]=useState("");
  const [error,setError]=useState("");
  const [setup,setSetup]=useState(!storedHash);
  const [confirm,setConfirm]=useState("");
  const [step,setStep]=useState(1);
  const hashPin=async p=>{const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(p));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");};
  const press=async d=>{
    if(digits.length>=6)return;
    const next=digits+d;setDigits(next);setError("");
    if(next.length===6){
      if(setup){
        if(step===1){setConfirm(next);setDigits("");setStep(2);}
        else{if(next===confirm){const h=await hashPin(next);onUnlock(h,true);}else{setError("Los PINs no coinciden");setDigits("");setStep(1);setConfirm("");}}
      }else{const h=await hashPin(next);if(h===storedHash)onUnlock(h,false);else{setError("PIN incorrecto");setDigits("");}}
    }
  };
  const del=()=>{setDigits(d=>d.slice(0,-1));setError("");};
  return(
    <div className="pin-overlay"><div className="pin-card">
      <div className="pin-logo">Almacén Mayorista</div>
      <div className="pin-title">Fichas de Costo</div>
      <div className="pin-sub">{setup?(step===1?"Crea tu PIN (6 dígitos)":"Confirma tu PIN"):"Ingresa tu PIN"}</div>
      <div className="pin-dots">{[...Array(6)].map((_,i)=><div key={i} className={"pin-dot"+(i<digits.length?" filled":"")}/>)}</div>
      <div className="pin-grid">{[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i)=><button key={i} className="pin-btn" onClick={()=>d===""?null:d==="⌫"?del():press(String(d))} style={d===""?{visibility:"hidden"}:{}}>{d}</button>)}</div>
      <div className="pin-error">{error}</div>
    </div></div>
  );
}

                <div style={{display:"flex",gap:6}}><input className="finp mono" type="number" step="0.0001" min="0" value={p.pvReal||""} onChange={e=>updP(p.id,"pvReal",e.target.value)} placeholder="0.00" style={{flex:1}}/><MSel value={p.monedaPvReal} onChange={v=>updP(p.id,"monedaPvReal",v)} style={{width:78}}/></div>
              </div>
            </div>
            <div className="fgrp" style={{marginTop:8}}><label className="flbl">Notas</label><input className="finp" value={p.notas||""} onChange={e=>updP(p.id,"notas",e.target.value)} placeholder="Observaciones..."/></div>
          </div>
        ))}
        <button className="btn bp bsm" onClick={addP} style={{marginBottom:16}}>+ Agregar producto</button>

        <div className="sec">Notas del Lote</div>
        <textarea className="ftxt" value={c.notas||""} onChange={e=>upd("notas",e.target.value)} placeholder="Número de BL, factura, observaciones..." style={{marginBottom:16}}/>

        {lote.costoTotalUSD>0&&(
          <div style={{background:"var(--sf2)",border:"1px solid var(--bd)",borderRadius:10,padding:14,marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--ac)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Vista previa — Costo total del lote</div>
            {[["Valor mercancía",lote.valorMercUSD],["Flete",lote.fleteUSD],["THCD",lote.thcdUSD],["Seguro",lote.seguroUSD],["Gastos reales lote",lote.gastosLoteRealUSD]].map(([l,v])=>v>0&&(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid var(--bd)",fontSize:13}}>
                <span style={{color:"var(--tx2)"}}>{l}</span>
                <span style={{fontFamily:"monospace",color:"var(--usd)"}}>$ {fmt(v,2)}</span>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 0",fontWeight:700,fontSize:14}}>
              <span>COSTO TOTAL</span><span style={{fontFamily:"monospace",color:"var(--usd)"}}>$ {fmt(lote.costoTotalUSD,2)}</span>
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button className="btn bs" onClick={onClose}>Cancelar</button>
          <button className="btn bp" onClick={()=>onSave(c)} disabled={!isValid}>💾 Guardar</button>
        </div>
      </div>
    </div>
  );
}

// ── FICHAS PRODUCTO (vista detalle) ──
function FichasProducto({p,c,rates,lote}){
  const pCalc=calcProducto(p,c,rates,lote);
  const nivelesReal=calcNiveles(p.niveles||[],pCalc.costoRealUnitUSD);
  const nivelesOnat=calcNiveles(p.niveles||[],pCalc.costoOnatUnitCUP);
  const pvOnatCUP=toCUPonat(p.pvOnat||0,p.monedaPvOnat,rates);
  const pvRealUSD=toUSD(p.pvReal||0,p.monedaPvReal,rates);
  const imp=calcImpuestos(pvOnatCUP,pCalc.costoOnatUnitCUP);
  const totImpUSD=imp.totalImpCUP/rates.mercado;
  const rentUnit=pvRealUSD>0?calcRentabilidad(pCalc.costoRealUnitUSD,pvRealUSD,totImpUSD):null;
  const rentLote=pvRealUSD>0?calcRentabilidad(pCalc.costoRealTotalUSD,pvRealUSD*pCalc.cantBase,totImpUSD*pCalc.cantBase):null;

  return(
    <div className="card">
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <span style={{fontWeight:700,fontSize:16}}>{p.nombre}</span>
        {p.codigo&&<span className="tag">{p.codigo}</span>}
        <span className="tag">Prop. {fmt(pCalc.prop*100,1)}% del lote</span>
        <span className="tag">{fmt(pCalc.cantBase,0)} {(p.niveles||[])[0]?.nombre||"u"} totales</span>
        {totImpUSD>0&&<span className="tag" style={{background:"rgba(247,111,79,.1)",borderColor:"rgba(247,111,79,.3)",color:"var(--ac4)"}}>
          Imp. lote: $ {fmt(totImpUSD*pCalc.cantBase,2)} / {fmt(imp.totalImpCUP*pCalc.cantBase,2)} CUP
        </span>}
      </div>

      {nivelesReal.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--tx2)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:8}}>Costo por nivel de empaque</div>
          <div className="tw">
            <table className="niv-table">
              <thead><tr>
                <th>Nivel</th><th>= Unid. base</th><th>Cant. en lote</th>
                <th style={{color:"var(--usd)"}}>Costo Real / u (USD)</th>
                <th style={{color:"var(--tx3)"}}>CUP merc.</th>
                <th style={{color:"var(--cup)"}}>Costo ONAT / u (CUP)</th>
                <th style={{color:"var(--tx3)"}}>≈ USD</th>
              </tr></thead>
              <tbody>{nivelesReal.map((n,ni)=>{
                const no=nivelesOnat[ni];
                const cantTot=ni===0?pCalc.cantBase:Math.round(pCalc.cantBase/(n.unidadesBase||1));
                return(<tr key={n.id} className={ni===0?"niv-tot":""}>
                  <td><b>{n.nombre||"Nivel "+(ni+1)}</b>{ni===0&&<span className="tag" style={{marginLeft:6,fontSize:9}}>BASE</span>}</td>
                  <td className="tm">{ni===0?"1":fmt(n.unidadesBase,0)}</td>
                  <td className="tm">{fmt(cantTot,0)} {n.unidad}</td>
                  <td className="tusd">$ {fmt(n.costo,4)}</td>
                  <td className="tm" style={{color:"var(--tx3)",fontSize:11}}>{fmt(n.costo*rates.mercado,2)}</td>
                  <td className="tcup">{no?fmt(no.costo,2):"-"} CUP</td>
                  <td className="tm" style={{color:"var(--tx3)",fontSize:11}}>{no?"≈ $"+fmt(no.costo/rates.mercado,4):"-"}</td>
                </tr>);
              })}</tbody>
            </table>
          </div>
        </div>
      )}

      <div className="fichas-grid">
        {/* FICHA ONAT */}
        <div className="ficha-onat">
          <div className="ficha-title ft-onat">🧾 Ficha ONAT</div>
          <div className="frow sub"><span className="flbl2">CIF proporcional (base)</span>
            <span><span className="fval-main" style={{color:"var(--cup)",fontSize:13}}>{fmt(pCalc.cifOnatCUP,2)} CUP</span><span className="fval-sec">≈ $ {fmt(pCalc.cifOnatCUP/rates.mercado,4)}</span></span>
          </div>
          {(c.gastos||[]).filter(g=>g.enOnat).map(g=>{
            const v=toUSD(g.monto,g.moneda,rates)*rates.onat*pCalc.prop;
            return(<div key={g.id} className="frow sub"><span className="flbl2">{g.concepto||"Gasto ONAT"}</span>
              <span><span className="fval-main" style={{color:"var(--cup)",fontSize:13}}>{fmt(v,2)} CUP</span><span className="fval-sec">≈ $ {fmt(v/rates.mercado,4)}</span></span>
            </div>);
          })}
          <div className="frow ftot"><span style={{color:"var(--cup)"}}>Costo Total ONAT</span>
            <span><span className="fval-main" style={{color:"var(--cup)"}}>{fmt(pCalc.costoOnatTotalCUP,2)} CUP</span><span className="fval-sec">≈ $ {fmt(pCalc.costoOnatTotalUSD,4)}</span></span>
          </div>
          <div className="frow sub"><span className="flbl2">Costo unitario ONAT</span>
            <span><span className="fval-main" style={{color:"var(--cup)",fontSize:13}}>{fmt(pCalc.costoOnatUnitCUP,4)} CUP</span><span className="fval-sec">≈ $ {fmt(pCalc.costoOnatUnitUSD,4)}</span></span>
          </div>
          {pvOnatCUP>0?(<>
            <div style={{height:1,background:"var(--bd)",margin:"10px 0"}}/>
            <div className="frow sub"><span className="flbl2">PV ONAT / unidad</span>
              <span className="fval-main" style={{color:"var(--cup)",fontSize:13}}>{fmt(pvOnatCUP,4)} CUP</span>
            </div>
            <div className="frow sub"><span className="flbl2">Utilidad ONAT / unidad</span>
              <span className="fval-main" style={{color:imp.utilOnat>=0?"var(--ac2)":"var(--ac4)",fontSize:13}}>{imp.utilOnat>=0?"+":""}{fmt(imp.utilOnat,4)} CUP</span>
            </div>
            <div style={{height:1,background:"var(--bd)",margin:"10px 0"}}/>
            <div style={{fontSize:11,fontWeight:700,color:"var(--ac4)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Impuestos ONAT / unidad</div>
            <div className="frow sub"><span className="flbl2">11% sobre ventas</span><span className="fval-main" style={{color:"var(--ac4)",fontSize:13}}>{fmt(imp.imp11,4)} CUP</span></div>
            <div className="frow sub"><span className="flbl2">35% sobre utilidad</span><span className="fval-main" style={{color:"var(--ac4)",fontSize:13}}>{fmt(imp.imp35,4)} CUP</span></div>
            <div className="frow ftot" style={{borderTopColor:"var(--ac4)"}}><span style={{color:"var(--ac4)"}}>Total impuestos / unidad</span>
              <span><span className="fval-main" style={{color:"var(--ac4)"}}>{fmt(imp.totalImpCUP,4)} CUP</span><span className="fval-sec">≈ $ {fmt(totImpUSD,4)}</span></span>
            </div>
            <div style={{height:1,background:"var(--bd)",margin:"10px 0"}}/>
            <div style={{fontSize:10,color:"var(--tx3)",marginBottom:4}}>TOTAL LOTE ({fmt(pCalc.cantBase,0)} {(p.niveles||[])[0]?.nombre||"u"})</div>
            {(()=>{
              const totVta=pvOnatCUP*pCalc.cantBase;
              const totCosto=pCalc.costoOnatTotalCUP;
              const totUtil=totVta-totCosto;
              const tot11=totVta*0.11;
              const tot35=totUtil>0?totUtil*0.35:0;
              const totImpL=tot11+tot35;
              return(<>
                <div className="frow sub"><span className="flbl2">Ventas ONAT totales</span><span className="fval-main" style={{color:"var(--cup)",fontSize:12}}>{fmt(totVta,2)} CUP</span></div>
                <div className="frow sub"><span className="flbl2">Impuesto 11%</span><span className="fval-main" style={{color:"var(--ac4)",fontSize:12}}>{fmt(tot11,2)} CUP</span></div>
                <div className="frow sub"><span className="flbl2">Impuesto 35%</span><span className="fval-main" style={{color:"var(--ac4)",fontSize:12}}>{fmt(tot35,2)} CUP</span></div>
                <div className="frow ftot" style={{borderTopColor:"var(--ac4)"}}><span style={{color:"var(--ac4)"}}>TOTAL IMPUESTOS LOTE</span>
                  <span><span className="fval-main" style={{color:"var(--ac4)"}}>{fmt(totImpL,2)} CUP</span><span className="fval-sec">≈ $ {fmt(totImpL/rates.mercado,2)}</span></span>
                </div>
              </>);
            })()}
          </>):(
            <div className="alert ai" style={{marginTop:10,fontSize:12}}>Agrega el PV ONAT para calcular impuestos.</div>
          )}
        </div>

        {/* FICHA REAL */}
        <div className="ficha-real">
          <div className="ficha-title ft-real">💰 Ficha Real</div>
          <div className="frow sub"><span className="flbl2">Valor mercancía</span><span><span className="fval-main" style={{color:"var(--usd)",fontSize:13}}>$ {fmt(pCalc.precioMercUSD,4)}</span><span className="fval-sec">{fmt(pCalc.precioMercUSD*rates.mercado,2)} CUP</span></span></div>
          {pCalc.fleteP>0&&<div className="frow sub"><span className="flbl2">Flete prop.</span><span className="fval-main" style={{color:"var(--usd)",fontSize:13}}>$ {fmt(pCalc.fleteP,4)}</span></div>}
          {pCalc.thcdP>0&&<div className="frow sub"><span className="flbl2">THCD prop.</span><span className="fval-main" style={{color:"var(--usd)",fontSize:13}}>$ {fmt(pCalc.thcdP,4)}</span></div>}
          {pCalc.seguroP>0&&<div className="frow sub"><span className="flbl2">Seguro prop.</span><span className="fval-main" style={{color:"var(--usd)",fontSize:13}}>$ {fmt(pCalc.seguroP,4)}</span></div>}
          {(c.gastos||[]).filter(g=>g.enReal).map(g=>{
            const v=toUSD(g.monto,g.moneda,rates)*pCalc.prop;
            return(<div key={g.id} className="frow sub"><span className="flbl2">{g.concepto||"Gasto"} (prop.)</span><span className="fval-main" style={{color:"var(--usd)",fontSize:13}}>$ {fmt(v,4)}</span></div>);
          })}
          {(p.gastosEsp||[]).map(g=>{
            const v=toUSD(g.monto,g.moneda,rates);
            return(<div key={g.id} className="frow sub"><span className="flbl2">{g.concepto||"Gasto espec."}</span><span className="fval-main" style={{color:"var(--usd)",fontSize:13}}>$ {fmt(v,4)}</span></div>);
          })}
          <div className="frow ftot"><span style={{color:"var(--ac)"}}>Costo Total Real</span>
            <span><span className="fval-main" style={{color:"var(--usd)"}}>$ {fmt(pCalc.costoRealTotalUSD,2)}</span><span className="fval-sec">{fmt(pCalc.costoRealTotalUSD*rates.mercado,0)} CUP</span></span>
          </div>
          <div className="frow sub"><span className="flbl2">Costo unitario real</span>
            <span><span className="fval-main" style={{color:"var(--usd)",fontSize:13}}>$ {fmt(pCalc.costoRealUnitUSD,4)}</span><span className="fval-sec">{fmt(pCalc.costoRealUnitUSD*rates.mercado,2)} CUP</span></span>
          </div>
          {totImpUSD>0&&(<>
            <div style={{height:1,background:"var(--bd)",margin:"10px 0"}}/>
            <div className="frow fimp"><span className="flbl2">− Impuestos ONAT / unidad</span>
              <span><span className="fval-main" style={{color:"var(--ac4)",fontSize:13}}>$ {fmt(totImpUSD,4)}</span><span className="fval-sec">{fmt(imp.totalImpCUP,2)} CUP</span></span>
            </div>
            <div className="frow sub"><span className="flbl2">Costo unitario + impuestos</span>
              <span className="fval-main" style={{color:"var(--ac3)",fontSize:13}}>$ {fmt(pCalc.costoRealUnitUSD+totImpUSD,4)}</span>
            </div>
          </>)}
          {pvRealUSD>0&&(<>
            <div style={{height:1,background:"var(--bd)",margin:"10px 0"}}/>
            <div className="frow sub"><span className="flbl2">PV Real / unidad</span>
              <span><span className="fval-main" style={{color:"var(--ac2)",fontSize:13}}>$ {fmt(pvRealUSD,4)}</span><span className="fval-sec">{fmt(pvRealUSD*rates.mercado,2)} CUP</span></span>
            </div>
            {(()=>{
              const mb=pvRealUSD-pCalc.costoRealUnitUSD;
              const mn=mb-totImpUSD;
              return(<>
                {totImpUSD>0&&<div className="frow sub"><span className="flbl2">Margen bruto / unidad</span><span className="fval-main" style={{color:mb>=0?"var(--ac2)":"var(--ac4)",fontSize:13}}>{mb>=0?"+":""}$ {fmt(mb,4)}</span></div>}
                <div className="frow ftot" style={{borderTopColor:"var(--ac2)"}}><span style={{color:"var(--ac2)"}}>Ganancia neta / unidad</span>
                  <span><span className="fval-main" style={{color:mn>=0?"var(--ac2)":"var(--ac4)"}}>{mn>=0?"+":""}$ {fmt(mn,4)}</span><span className="fval-sec">{fmt(mn*rates.mercado,2)} CUP</span></span>
                </div>
              </>);
            })()}
            <IndicadoresRent rent={rentUnit} lote={false}/>
            <div style={{height:1,background:"var(--bd)",margin:"14px 0"}}/>
            <div style={{fontSize:10,color:"var(--tx3)",marginBottom:4}}>TOTAL LOTE ({fmt(pCalc.cantBase,0)} {(p.niveles||[])[0]?.nombre||"u"})</div>
            {(()=>{
              const totVR=pvRealUSD*pCalc.cantBase;
              const totCR=pCalc.costoRealTotalUSD;
              const totIU=totImpUSD*pCalc.cantBase;
              const totMN=totVR-totCR-totIU;
              return(<>
                <div className="frow sub"><span className="flbl2">Ventas reales totales</span><span className="fval-main" style={{color:"var(--ac2)",fontSize:12}}>$ {fmt(totVR,2)}</span></div>
                <div className="frow sub"><span className="flbl2">Impuestos totales</span><span className="fval-main" style={{color:"var(--ac4)",fontSize:12}}>$ {fmt(totIU,2)}</span></div>
                <div className="frow ftot" style={{borderTopColor:"var(--ac2)"}}><span style={{color:"var(--ac2)"}}>GANANCIA NETA LOTE</span>
                  <span><span className="fval-main" style={{color:totMN>=0?"var(--ac2)":"var(--ac4)"}}>{totMN>=0?"+":""}$ {fmt(totMN,2)}</span><span className="fval-sec">{fmt(totMN*rates.mercado,0)} CUP</span></span>
                </div>
                <IndicadoresRent rent={rentLote} lote={true}/>
              </>);
            })()}
          </>)}
          {!pvRealUSD&&<div className="alert ai" style={{marginTop:10,fontSize:12}}>Agrega el PV Real para ver el margen.</div>}
        </div>
      </div>
    </div>
  );
}

// ── APP ──
function App(){
  const [pinHash,setPH]=useState(()=>sessionStorage.getItem("fc_pin")||"");
  const [storedHash,setSH]=useState(()=>localStorage.getItem("fc_pin_hash")||"");
  const [unlocked,setUL]=useState(false);
  const [gistToken,setGT]=useState(()=>localStorage.getItem("fc_gist_token")||"");
  const [gistId,setGI]=useState(()=>localStorage.getItem("fc_gist_id")||"");
  const [rates,setRates]=useState(()=>{try{return JSON.parse(localStorage.getItem("fc_rates"))||{mercado:340,onat:24,eurUsd:1.08};}catch{return{mercado:340,onat:24,eurUsd:1.08};}});
  const [editR,setER]=useState(false);const [tmpR,setTR]=useState(rates);
  const [conts,setConts]=useState([]);
  const [loading,setLoading]=useState(false);const [saving,setSaving]=useState(false);const [saveMsg,setSM]=useState("");
  const [tab,setTab]=useState("lista");const [sel,setSel]=useState(null);
  const [showMo,setShowMo]=useState(false);const [editC,setEditC]=useState(null);
  const [search,setSearch]=useState("");const [filterT,setFilterT]=useState("");

  useEffect(()=>{if(pinHash&&pinHash===storedHash)setUL(true);},[]);
  useEffect(()=>{localStorage.setItem("fc_rates",JSON.stringify(rates));},[rates]);
  useEffect(()=>{
    if(!unlocked||!gistToken||!gistId)return;
    setLoading(true);
    loadGist(gistToken,gistId).then(d=>{if(d?.contenedores)setConts(d.contenedores);}).catch(e=>console.error(e)).finally(()=>setLoading(false));
  },[unlocked]);

  const persist=useCallback(async(next)=>{
    setConts(next);
    if(!gistToken||!gistId)return;
    setSaving(true);
    try{await saveGist(gistToken,gistId,{contenedores:next,updatedAt:new Date().toISOString()});setSM("Guardado ✓");}
    catch(e){setSM("Error guardando");}
    finally{setSaving(false);setTimeout(()=>setSM(""),3000);}
  },[gistToken,gistId]);

  const handleUnlock=(h,isNew)=>{if(isNew){localStorage.setItem("fc_pin_hash",h);setSH(h);}sessionStorage.setItem("fc_pin",h);setPH(h);setUL(true);};
  const saveCont=(c)=>{const idx=conts.findIndex(x=>x.id===c.id);const next=idx>=0?conts.map(x=>x.id===c.id?c:x):[...conts,c];persist(next);setShowMo(false);setSel(c);setTab("detalle");};
  const delCont=(id)=>{if(!confirm("¿Eliminar este lote y todos sus productos?"))return;persist(conts.filter(x=>x.id!==id));if(sel?.id===id){setSel(null);setTab("lista");}};

  const filtered=conts.filter(c=>{
    const q=search.toLowerCase();
    const mq=!q||c.nombre.toLowerCase().includes(q)||((c.codigo||"").toLowerCase().includes(q))||((c.proveedor||"").toLowerCase().includes(q))||(c.productos||[]).some(p=>p.nombre.toLowerCase().includes(q));
    return mq&&(!filterT||c.termino===filterT);
  });

  if(!unlocked)return <PinScreen onUnlock={handleUnlock} storedHash={storedHash}/>;

  return(<div>
    <div className="app-header">
      <div><div className="hlogo">Almacén Mayorista</div><div className="htitle">Fichas de Costo</div></div>
      <div style={{flex:1}}/>
      <div style={{display:"flex",gap:10,alignItems:"center"}}>
        {editR?(<>
          <input className="finp mono" style={{width:88,padding:"4px 8px",fontSize:12}} placeholder="Mercado" type="number" value={tmpR.mercado} onChange={e=>setTR(r=>({...r,mercado:e.target.value}))}/>
          <input className="finp mono" style={{width:78,padding:"4px 8px",fontSize:12}} placeholder="ONAT" type="number" value={tmpR.onat} onChange={e=>setTR(r=>({...r,onat:e.target.value}))}/>
          <input className="finp mono" style={{width:78,padding:"4px 8px",fontSize:12}} placeholder="EUR" type="number" value={tmpR.eurUsd} onChange={e=>setTR(r=>({...r,eurUsd:e.target.value}))}/>
          <button className="btn bsu bsm" onClick={()=>{setRates({mercado:num(tmpR.mercado),onat:num(tmpR.onat),eurUsd:num(tmpR.eurUsd)});setER(false);}}>✓</button>
          <button className="btn bs bsm" onClick={()=>setER(false)}>✕</button>
        </>):(<>
          <div className="rpill"><div className="rdot" style={{background:"#a78bfa"}}/><span>Mercado</span><span className="rval">{rates.mercado}</span><button className="redit" onClick={()=>{setTR(rates);setER(true);}}>✎</button></div>
          <div className="rpill"><div className="rdot" style={{background:"#4f8ef7"}}/><span>ONAT</span><span className="rval">{rates.onat}</span></div>
          <div className="rpill"><div className="rdot" style={{background:"#38d9a9"}}/><span>EUR</span><span className="rval">{rates.eurUsd}</span></div>
        </>)}
      </div>
      <div className="sind" style={{marginLeft:12}}>
        <div className={"sdot"+(saving?" saving":"")}/>
        <span>{saveMsg||(saving?"Guardando...":"Sync")}</span>
      </div>
    </div>

    <div className="nav-tabs">
      {[{key:"lista",label:"📋 Lotes"},...(sel?[{key:"detalle",label:"📄 "+sel.nombre}]:[]),{key:"config",label:"⚙️ Config"}].map(t=>(
        <button key={t.key} className={"ntab"+(tab===t.key?" active":"")} onClick={()=>setTab(t.key)}>{t.label}</button>
      ))}
      <button className="ntab" onClick={()=>{setEditC(defCont());setShowMo(true);}}>➕ Nuevo Lote</button>
    </div>

    <div className="main">
      {loading&&<div className="alert ai">⏳ Cargando...</div>}

      {tab==="lista"&&(
        <div>
          <div className="abar">
            <input className="sinp" placeholder="🔍 Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/>
            <select className="fsl" value={filterT} onChange={e=>setFilterT(e.target.value)}>
              <option value="">Todos</option>{TERMINOS.map(t=><option key={t.k} value={t.k}>{t.k}</option>)}
            </select>
            <div style={{flex:1}}/><button className="btn bp" onClick={()=>{setEditC(defCont());setShowMo(true);}}>➕ Nuevo Lote</button>
          </div>
          {filtered.length===0?(
            <div className="empty"><div style={{fontSize:48,marginBottom:12}}>📦</div><div style={{fontSize:16,fontWeight:600,color:"var(--tx2)",marginBottom:6}}>{conts.length===0?"No hay lotes registrados":"Sin resultados"}</div></div>
          ):(
            <div className="card" style={{padding:0}}>
              <div className="tw"><table>
                <thead><tr><th>Código</th><th>Lote</th><th>Término</th><th>Proveedor</th><th>Fecha</th><th>Prods.</th><th>Costo Total USD</th><th>Acciones</th></tr></thead>
                <tbody>{filtered.map(c=>{
                  const lt=calcLote(c,rates);
                  return(<tr key={c.id} style={{cursor:"pointer"}} onClick={()=>{setSel(c);setTab("detalle");}}>
                    <td><span className="tag">{c.codigo||"-"}</span></td>
                    <td style={{fontWeight:600}}>{c.nombre}</td>
                    <td><span className={"badge "+(TBADGE[c.termino]||"b-otra")}>{c.termino}</span></td>
                    <td style={{color:"var(--tx2)"}}>{c.proveedor||"-"}</td>
                    <td className="tm" style={{color:"var(--tx2)"}}>{c.fecha}</td>
                    <td><span className="tag">{(c.productos||[]).length}</span></td>
                    <td className="tusd">$ {fmt(lt.costoTotalUSD,2)}</td>
                    <td onClick={e=>e.stopPropagation()}>
                      <div style={{display:"flex",gap:4}}>
                        <button className="btn bs bsm" onClick={()=>{setEditC(JSON.parse(JSON.stringify(c)));setShowMo(true);}}>✎</button>
                        <button className="btn bd2 bsm" onClick={()=>delCont(c.id)}>🗑</button>
                      </div>
                    </td>
                  </tr>);
                })}</tbody>
              </table></div>
            </div>
          )}
        </div>
      )}

      {tab==="detalle"&&sel&&(()=>{
        const c=conts.find(x=>x.id===sel.id)||sel;
        const lote=calcLote(c,rates);
        return(<div>
          <div className="dh">
            <div className="dc">#{c.codigo||"SIN CÓDIGO"}</div>
            <div className="dn">{c.nombre}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <span className={"badge "+(TBADGE[c.termino]||"b-otra")}>{c.termino}</span>
              <span className="tag">{c.fecha}</span>
              {c.proveedor&&<span className="tag">🏭 {c.proveedor}</span>}
              {c.pais&&<span className="tag">🌐 {c.pais}</span>}
              <span className="tag">📦 {(c.productos||[]).length} productos</span>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            <button className="btn bs" onClick={()=>{setEditC(JSON.parse(JSON.stringify(c)));setShowMo(true);}}>✎ Editar</button>
            <button className="btn bd2" onClick={()=>delCont(c.id)}>🗑 Eliminar</button>
          </div>
          <div className="srow">
            <div className="sbox"><div className="slbl">Valor Mercancía</div><div className="sval" style={{color:"var(--usd)"}}>$ {fmt(lote.valorMercUSD,2)}</div><div className="ssub">precio factura</div></div>
            <div className="sbox"><div className="slbl">CIF Total</div><div className="sval" style={{color:"var(--ac2)"}}>$ {fmt(lote.cifUSD,2)}</div><div className="ssub">+flete+thcd+seguro</div></div>
            <div className="sbox"><div className="slbl">Gastos del Lote</div><div className="sval" style={{color:"var(--ac3)"}}>$ {fmt(lote.gastosLoteRealUSD,2)}</div><div className="ssub">a tasa mercado</div></div>
            <div className="sbox"><div className="slbl">Costo Total Real</div><div className="sval">$ {fmt(lote.costoTotalUSD,2)}</div><div className="ssub">{fmt(lote.costoTotalUSD*rates.mercado,0)} CUP</div></div>
          </div>
          {(c.productos||[]).map(p=><FichasProducto key={p.id} p={p} c={c} rates={rates} lote={lote}/>)}
          {c.notas&&<div className="card"><div className="ctitle"><span>📝</span> Notas</div><p style={{color:"var(--tx2)",fontSize:13,lineHeight:1.6}}>{c.notas}</p></div>}
        </div>);
      })()}

      {tab==="config"&&(
        <div style={{maxWidth:600}}>
          <div className="card">
            <div className="ctitle"><span>🔗</span> GitHub Gist</div>
            <div className="alert ai" style={{marginBottom:12}}>Usa el mismo PAT y Gist ID del Estado de Resultados, o uno nuevo.</div>
            <div className="fg" style={{gap:12}}>
              <div className="fgrp"><label className="flbl">Personal Access Token</label><input className="finp mono" type="password" value={gistToken} onChange={e=>{setGT(e.target.value);localStorage.setItem("fc_gist_token",e.target.value);}} placeholder="ghp_xxxxxxxxxxxx"/></div>
              <div className="fgrp"><label className="flbl">Gist ID</label><input className="finp mono" value={gistId} onChange={e=>{setGI(e.target.value);localStorage.setItem("fc_gist_id",e.target.value);}} placeholder="ID del Gist"/></div>
              <button className="btn bp" onClick={()=>{setLoading(true);loadGist(gistToken,gistId).then(d=>{if(d?.contenedores)setConts(d.contenedores);setSM("Cargado ✓");}).catch(e=>setSM("Error: "+e.message)).finally(()=>setLoading(false));}}>Conectar y Cargar</button>
            </div>
          </div>
          <div className="card">
            <div className="ctitle"><span>💱</span> Tipos de Cambio</div>
            <div className="fg g3">
              <div className="fgrp"><label className="flbl">Mercado informal (CUP/USD)</label><div className="iw"><input className="finp mono" type="number" step="0.01" value={rates.mercado} onChange={e=>setRates(r=>({...r,mercado:num(e.target.value)}))} placeholder="340"/><span className="cb cb-cup">CUP</span></div></div>
              <div className="fgrp"><label className="flbl">Oficial ONAT (CUP/USD)</label><div className="iw"><input className="finp mono" type="number" step="0.01" value={rates.onat} onChange={e=>setRates(r=>({...r,onat:num(e.target.value)}))} placeholder="24"/><span className="cb cb-cup">CUP</span></div></div>
              <div className="fgrp"><label className="flbl">EUR / USD</label><div className="iw"><input className="finp mono" type="number" step="0.0001" value={rates.eurUsd} onChange={e=>setRates(r=>({...r,eurUsd:num(e.target.value)}))} placeholder="1.08"/><span className="cb cb-usd">USD</span></div></div>
            </div>
          </div>
          <div className="card"><div className="ctitle"><span>🔐</span> PIN</div><button className="btn bs" onClick={()=>{localStorage.removeItem("fc_pin_hash");sessionStorage.removeItem("fc_pin");window.location.reload();}}>Cambiar PIN</button></div>
        </div>
      )}
    </div>
    {showMo&&editC&&<ContenedorModal inicial={editC} rates={rates} onSave={saveCont} onClose={()=>setShowMo(false)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
