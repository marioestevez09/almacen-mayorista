<style>

.fsel:focus{outline:none;border-color:var(--accent);}

.nc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}

@media(max-width:768px){.g2,.g3,.g4,.g5{grid-template-columns:1fr;}.nivel-row{grid-template-columns:1fr 1fr;}.header-rates{display:none;}.stats-row{grid-template-columns:1fr 1fr;}}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ── HELPERS ──────────────────────────────────────────────────────────────
const fmt = (n,d=2) => { if(n===null||n===undefined||isNaN(n)) return '0.'+'0'.repeat(d); return Number(n).toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d}); };
const num = v => parseFloat(v)||0;
const uid = () => Math.random().toString(36).slice(2,10);
const today = () => new Date().toISOString().slice(0,10);

const TERMINOS = [{k:'CIF',label:'CIF — Costo, Seguro y Flete'},{k:'CFR',label:'CFR — Costo y Flete'},{k:'FOB',label:'FOB — Franco a Bordo'},{k:'NAC',label:'Compra Nacionalizada'},{k:'PROD',label:'Producción Propia'},{k:'OTRA',label:'Otra Vía'}];
const TERMINO_BADGE = {CIF:'b-cif',CFR:'b-cfr',FOB:'b-fob',NAC:'b-nac',PROD:'b-prod',OTRA:'b-otra'};
const MONEDAS = ['USD','CUP','EUR'];

const emptyNivel = () => ({id:uid(),nombre:'',cantidad:'',unidad:'',precioUnitario:'',moneda:'USD'});
const emptyGasto = () => ({id:uid(),concepto:'',monto:'',moneda:'USD'});
const emptyProducto = () => ({id:uid(),nombre:'',codigo:'',precioFactura:'',monedaPrecio:'USD',tipoPrecio:'total',niveles:[],precioVentaEst:'',monedaVenta:'USD',notas:''});
const defaultContenedor = () => ({
  id:uid(), codigo:'', nombre:'', termino:'CIF', proveedor:'', pais:'', fecha:today(), notas:'',
  // valor mercancía (puede ser total del contenedor o se suma de productos)
  valorMercancia:'', monedaValor:'USD',
  // flete, thcd, seguro (siempre disponibles)
  flete:'', monedaFlete:'USD',
  thcd:'', monedaThcd:'USD',
  seguroTipo:'pct', seguroValor:'', // pct = % sobre valor, fijo = monto fijo
  monedaSeguro:'USD',
  // gastos adicionales
  gastos:[],
  // productos
  productos:[],
});

// ── GIST ─────────────────────────────────────────────────────────────────
async function loadGist(token,gistId){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json'}});
  if(!r.ok) throw new Error('Error '+r.status);
  const d=await r.json();
  const c=d.files['fichas-costo.json']?.content;
  return c?JSON.parse(c):null;
}
async function saveGist(token,gistId,payload){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{method:'PATCH',headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({files:{'fichas-costo.json':{content:JSON.stringify(payload,null,2)}}})});
  if(!r.ok) throw new Error('Error '+r.status);
}

// ── CÁLCULOS ──────────────────────────────────────────────────────────────
function toUSD(monto, moneda, rates){
  if(moneda==='USD') return num(monto);
  if(moneda==='EUR') return num(monto)*rates.eurUsd;
  return num(monto)/rates.mercado;
}

function calcContenedor(c, rates){
  // Valor mercancía total USD
  let valorMercUSD = toUSD(c.valorMercancia, c.monedaValor, rates);
  // Si hay productos con precio, el valor de mercancía = suma de precios de productos
  const prodConPrecio = (c.productos||[]).filter(p=>num(p.precioFactura)>0);
  if(prodConPrecio.length>0){
    valorMercUSD = prodConPrecio.reduce((s,p)=>{
      const pu = toUSD(p.precioFactura, p.monedaPrecio, rates);
      return s + pu; // ya es total si tipoPrecio=total, o total si tipoPrecio=unit (multiplicado abajo)
    },0);
  }

  const fleteUSD = toUSD(c.flete, c.monedaFlete, rates);
  const thcdUSD = toUSD(c.thcd, c.monedaThcd, rates);
  let seguroUSD = 0;
  if(c.seguroTipo==='pct'){
    seguroUSD = valorMercUSD * (num(c.seguroValor)/100);
  } else {
    seguroUSD = toUSD(c.seguroValor, c.monedaSeguro, rates);
  }
  const cifUSD = valorMercUSD + fleteUSD + thcdUSD + seguroUSD;

  const gastosUSD = (c.gastos||[]).reduce((s,g)=>s+toUSD(g.monto,g.moneda,rates),0);
  const costoTotalUSD = cifUSD + gastosUSD;

  return {valorMercUSD, fleteUSD, thcdUSD, seguroUSD, cifUSD, gastosUSD, costoTotalUSD};
}

function calcProducto(p, c, rates, calc){
  // Precio de mercancía de este producto en USD
  let precioMercUSD = toUSD(p.precioFactura, p.monedaPrecio, rates);
  // si es precio unitario (por unidad base) × cantidad total base
  if(p.tipoPrecio==='unit'){
    const cantBase = calcCantidadBase(p);
    precioMercUSD = precioMercUSD * cantBase;
  }

  // Proporción del valor total del contenedor
  const proporcion = calc.valorMercUSD > 0 ? precioMercUSD / calc.valorMercUSD : 0;

  // Parte del flete+thcd+seguro+gastos que le toca
  const flete = calc.fleteUSD * proporcion;
  const thcd = calc.thcdUSD * proporcion;
  const seguro = calc.seguroUSD * proporcion;
  const gastos = calc.gastosUSD * proporcion;
  const cifProd = precioMercUSD + flete + thcd + seguro;
  const costoTotalProd = cifProd + gastos;

  return {precioMercUSD, proporcion, flete, thcd, seguro, gastos, cifProd, costoTotalProd};
}

function calcCantidadBase(p){
  // El nivel 0 es la unidad base. Los niveles superiores multiplican hacia arriba.
  if(!(p.niveles||[]).length) return 0;
  const base = p.niveles[0];
  let total = num(base.cantidad);
  return total;
}

function calcNiveles(p, costoTotalProd, rates){
  // niveles[0] = unidad base, niveles[1] = caja/saco, niveles[2] = pallet, niveles[3] = contenedor
  const nivs = p.niveles||[];
  if(!nivs.length) return [];
  const cantBase = calcCantidadBase(p);
  if(cantBase===0) return nivs.map(n=>({...n,costoUSD:0,costoCUPMerc:0,costoCUPOnat:0}));
  const costoUnitBase = costoTotalProd / cantBase;
  // Calcular cantidad acumulada por nivel (de abajo hacia arriba)
  // niveles[0]: cantidad = total unidades base
  // niveles[1]: cantidad = cuántas unidades base por caja/saco → costoNivel1 = costoUnitBase * cantBase1
  // etc.
  return nivs.map((n,i)=>{
    let cantPorNivel;
    if(i===0){
      cantPorNivel = 1; // costo por 1 unidad base
    } else {
      // producto de todos los niveles anteriores
      cantPorNivel = 1;
      for(let j=0;j<i;j++) cantPorNivel *= num(nivs[j+1]?.cantidadPorNivelAnterior||0);
      // Redefinir: niveles[1].cantidadPorNivelAnterior = cuántas unidades base hay en 1 caja
      cantPorNivel = num(n.cantidadPorNivelAnterior||0);
    }
    const costoUSD = i===0 ? costoUnitBase : costoUnitBase * cantPorNivel;
    return {...n, costoUSD, costoCUPMerc: costoUSD*rates.mercado, costoCUPOnat: costoUSD*rates.onat};
  });
}

// ── PIN ───────────────────────────────────────────────────────────────────
function PinScreen({onUnlock,storedHash}){
  const [digits,setDigits]=useState('');
  const [error,setError]=useState('');
  const [setup,setSetup]=useState(!storedHash);
  const [confirm,setConfirm]=useState('');
  const [step,setStep]=useState(1);
  const hashPin=async pin=>{const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');};
  const press=async d=>{
    if(digits.length>=6)return;
    const next=digits+d; setDigits(next); setError('');
    if(next.length===6){
      if(setup){
        if(step===1){setConfirm(next);setDigits('');setStep(2);}
        else{if(next===confirm){const h=await hashPin(next);onUnlock(h,true);}else{setError('Los PINs no coinciden');setDigits('');setStep(1);setConfirm('');}}
      } else {
        const h=await hashPin(next);
        if(h===storedHash)onUnlock(h,false);else{setError('PIN incorrecto');setDigits('');}
      }
    }
  };
  const del=()=>{setDigits(d=>d.slice(0,-1));setError('');};
  return(
    <div className="pin-overlay">
      <div className="pin-card">
        <div className="pin-logo">Almacén Mayorista</div>
        <div className="pin-title">📦 Fichas de Costo</div>
        <div className="pin-sub">{setup?(step===1?'Crea tu PIN (6 dígitos)':'Confirma tu PIN'):'Ingresa tu PIN'}</div>
        <div className="pin-dots">{[...Array(6)].map((_,i)=><div key={i} className={`pin-dot${i<digits.length?' filled':''}`}/>)}</div>
        <div className="pin-grid">{[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((d,i)=><button key={i} className="pin-btn" onClick={()=>d===''?null:d==='⌫'?del():press(String(d))} style={d===''?{visibility:'hidden'}:{}}>{d}</button>)}</div>
        <div className="pin-error">{error}</div>
      </div>
    </div>
  );
}

// ── MODAL CONTENEDOR ──────────────────────────────────────────────────────
function ContenedorModal({inicial,rates,onSave,onClose}){
  const [c,setC]=useState(inicial);
  const upd=(k,v)=>setC(p=>({...p,[k]:v}));
  const addGasto=()=>upd('gastos',[...(c.gastos||[]),emptyGasto()]);
  const updG=(id,k,v)=>upd('gastos',c.gastos.map(g=>g.id===id?{...g,[k]:v}:g));
  const delG=id=>upd('gastos',c.gastos.filter(g=>g.id!==id));
  const addProd=()=>upd('productos',[...(c.productos||[]),emptyProducto()]);
  const updP=(id,k,v)=>upd('productos',c.productos.map(p=>p.id===id?{...p,[k]:v}:p));
  const delP=id=>upd('productos',c.productos.filter(p=>p.id!==id));
  const updPNivel=(pid,nid,k,v)=>upd('productos',c.productos.map(p=>p.id===pid?{...p,niveles:p.niveles.map(n=>n.id===nid?{...n,[k]:v}:n)}:p));
  const addNivel=pid=>upd('productos',c.productos.map(p=>p.id===pid?{...p,niveles:[...(p.niveles||[]),{id:uid(),nombre:'',cantidad:'',unidad:'',cantidadPorNivelAnterior:'',moneda:'USD',precioUnitario:''}]}:p));
  const delNivel=(pid,nid)=>upd('productos',c.productos.map(p=>p.id===pid?{...p,niveles:p.niveles.filter(n=>n.id!==nid)}:p));

  const calc=calcContenedor(c,rates);

        </div>

          <div className="form-group"><label className="form-label">Código interno</label><input className="form-input mono" value={c.codigo} onChange={e=>upd('codigo',e.target.value)} placeholder="CONT-001"/></div>

        <div className="form-grid g3" style={{marginBottom:12}}>

            <label className="form-label">Término de entrega</label>

        <div className="sec-label">Notas del Contenedor</div>
        <textarea className="form-textarea" value={c.notas} onChange={e=>upd('notas',e.target.value)} placeholder="Número de factura, observaciones generales..." style={{marginBottom:16}}/>

        {/* PREVIEW */}
        {calc.costoTotalUSD>0&&(
          <div className="cost-box" style={{marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Vista previa — Costo total del lote</div>
            <div className="cost-row sub"><span className="cost-label">Valor mercancía</span><span className="cost-val" style={{color:'var(--usd)'}}>$ {fmt(calc.valorMercUSD,2)}</span></div>
            {calc.fleteUSD>0&&<div className="cost-row sub"><span className="cost-label">Flete</span><span className="cost-val" style={{color:'var(--usd)'}}>$ {fmt(calc.fleteUSD,2)}</span></div>}

            {calc.seguroUSD>0&&<div className="cost-row sub"><span className="cost-label">Seguro</span><span className="cost-val" style={{color:'var(--usd)'}}>$ {fmt(calc.seguroUSD,2)}</span></div>}
            {calc.gastosUSD>0&&<div className="cost-row sub"><span className="cost-label">Gastos adicionales</span><span className="cost-val" style={{color:'var(--usd)'}}>$ {fmt(calc.gastosUSD,2)}</span></div>}
            <div className="cost-row total"><span>COSTO TOTAL</span><span className="cost-val" style={{color:'var(--usd)'}}>$ {fmt(calc.costoTotalUSD,2)}</span></div>
          </div>
        )}

        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={()=>onSave(c)} disabled={!isValid}>💾 Guardar</button>
        </div>
      </div>
    </div>
  );
}

// ── EXCEL EXPORT ──────────────────────────────────────────────────────────
async function exportExcel(cont, rates){
  const wb = new ExcelJS.Workbook();
  wb.creator='Almacén Mayorista'; wb.created=new Date();
  const calc = calcContenedor(cont, rates);
  const BG='0F1117',SURF='1E2333',SURF2='252B3D',ACC='4F8EF7',ACC2='38D9A9',ACC3='F7C948',PUR='A78BFA',TXT='E8ECF4',TXT2='9AA3BC',BRD='2A3050';

  const styleH=(c,bg,fg,sz=10)=>{c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+bg}};c.font={bold:true,color:{argb:'FF'+fg},size:sz,name:'Calibri'};c.alignment={horizontal:'center',vertical:'middle',wrapText:true};};
  const styleD=(c,bg,fg,bold=false,align='left')=>{c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+bg}};c.font={bold,color:{argb:'FF'+fg},size:10,name:'Calibri'};c.alignment={horizontal:align,vertical:'middle',wrapText:true};};
  const bord=(c)=>{c.border={top:{style:'thin',color:{argb:'FF'+BRD}},left:{style:'thin',color:{argb:'FF'+BRD}},bottom:{style:'thin',color:{argb:'FF'+BRD}},right:{style:'thin',color:{argb:'FF'+BRD}}};};

  // ── HOJA 1: RESUMEN CONTENEDOR ──
  const ws=wb.addWorksheet('Contenedor');
  ws.views=[{showGridLines:false}];
  [28,20,18,18,18,16,16].forEach((w,i)=>ws.getColumn(i+1).width=w);

  ws.mergeCells('A1:G1'); ws.getRow(1).height=38;
  const t1=ws.getCell('A1'); t1.value='📦 FICHA DE COSTO — '+cont.nombre.toUpperCase(); styleH(t1,BG,ACC,13);
  ws.mergeCells('A2:G2'); ws.getRow(2).height=20;
  const t2=ws.getCell('A2'); t2.value=`Término: ${cont.termino}  |  Proveedor: ${cont.proveedor||'-'}  |  País: ${cont.pais||'-'}  |  Fecha: ${cont.fecha}  |  Código: ${cont.codigo||'-'}`; styleH(t2,SURF,TXT2,9);
  ws.getRow(3).height=6; for(let i=1;i<=7;i++) ws.getCell(3,i).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+BG}};

  // Resumen financiero
  ws.getRow(4).height=16; ws.mergeCells('A4:G4'); const sh1=ws.getCell('A4'); sh1.value='▌ RESUMEN FINANCIERO DEL LOTE'; styleH(sh1,SURF2,ACC,10);
  const finRows=[['Valor mercancía',calc.valorMercUSD],['Flete',calc.fleteUSD],['THCD',calc.thcdUSD],['Seguro',calc.seguroUSD],['Subtotal CIF',calc.cifUSD],['Gastos adicionales',calc.gastosUSD],['COSTO TOTAL DEL LOTE',calc.costoTotalUSD]];
  let row=5;
  finRows.forEach(([label,usd],fi)=>{
    const isT=fi===finRows.length-1; const isSub=fi===4;
    ws.getRow(row).height=isT?20:16;
    const bg=isT?SURF2:SURF; const fg=isT?TXT:(isSub?ACC2:TXT2);
    ['A','B','C','D','E','F','G'].forEach((col,ci)=>{
      const cell=ws.getCell(`${col}${row}`);
      styleD(cell,bg,fg,isT||isSub);
      if(ci===0){cell.value=label;}
      else if(ci===1){cell.value=parseFloat(usd.toFixed(2));cell.alignment={horizontal:'right',vertical:'middle'};}
      else if(ci===2){cell.value=parseFloat((usd*rates.mercado).toFixed(2));cell.alignment={horizontal:'right',vertical:'middle'};}
      else if(ci===3){cell.value=parseFloat((usd*rates.onat).toFixed(2));cell.alignment={horizontal:'right',vertical:'middle'};}
      bord(cell);
    });
    if(row===5){['USD','CUP Mercado','CUP ONAT','','',''].forEach((h,i)=>{if(i>0){}});}
    row++;
  });

  // Headers para las columnas numéricas en fila 5
  ['','USD','CUP Mercado','CUP ONAT','','',''].forEach((h,i)=>{
    if(i>0&&h){const c=ws.getCell(5,i+1); c.font={...c.font,italic:true,color:{argb:'FF'+TXT2}};}
  });

  row++; // espacio
  ws.getRow(row).height=6; for(let i=1;i<=7;i++) ws.getCell(row,i).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+BG}}; row++;

  // Gastos detallados
  ws.getRow(row).height=16; ws.mergeCells(`A${row}:G${row}`); styleH(ws.getCell(`A${row}`),SURF2,ACC3,10); ws.getCell(`A${row}`).value='▌ GASTOS ADICIONALES'; row++;
  if((cont.gastos||[]).length===0){ws.getRow(row).height=14;ws.mergeCells(`A${row}:G${row}`);styleD(ws.getCell(`A${row}`),BG,TXT2);ws.getCell(`A${row}`).value='Sin gastos adicionales';row++;}
  (cont.gastos||[]).forEach((g,gi)=>{
    ws.getRow(row).height=14;
    const bg=gi%2===0?BG:SURF; const usdv=toUSD(g.monto,g.moneda,rates);
    [g.concepto,num(g.monto),g.moneda,parseFloat(usdv.toFixed(2)),parseFloat((usdv*rates.mercado).toFixed(2)),'',''].forEach((v,i)=>{
      const cell=ws.getCell(row,i+1); styleD(cell,bg,i===0?TXT:TXT2,false,i===0?'left':'right'); cell.value=v; bord(cell);
    }); row++;
  });

  // ── HOJAS POR PRODUCTO ──
  (cont.productos||[]).forEach((p,pi)=>{
    const pCalc=calcProducto(p,cont,rates,calc);
    const cantBase=calcCantidadBase(p);
    const costoUnitBase=cantBase>0?pCalc.costoTotalProd/cantBase:0;
    const pvUSD=num(p.precioVentaEst)>0?toUSD(p.precioVentaEst,p.monedaVenta,rates):0;
    const imp11=pvUSD*0.11; const util=pvUSD-costoUnitBase; const imp35=util>0?util*0.35:0;

    const wsp=wb.addWorksheet(`Producto ${pi+1} - ${p.nombre.slice(0,20)}`);
    wsp.views=[{showGridLines:false}];
    [30,18,18,18,18,14,14].forEach((w,i)=>wsp.getColumn(i+1).width=w);

    wsp.mergeCells('A1:G1'); wsp.getRow(1).height=34;
    const ph=wsp.getCell('A1'); ph.value=`📦 ${p.nombre.toUpperCase()} — ${cont.nombre}`; styleH(ph,BG,PUR,12);
    wsp.mergeCells('A2:G2'); wsp.getRow(2).height=18;
    const ph2=wsp.getCell('A2'); ph2.value=`Código: ${p.codigo||'-'}  |  Lote: ${cont.codigo||'-'}  |  Fecha: ${cont.fecha}  |  Proporción del lote: ${fmt(pCalc.proporcion*100,2)}%`; styleH(ph2,SURF,TXT2,9);
    wsp.getRow(3).height=6; for(let i=1;i<=7;i++) wsp.getCell(3,i).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+BG}};

    let rp=4;
    // Costos del producto
    wsp.getRow(rp).height=16; wsp.mergeCells(`A${rp}:G${rp}`); styleH(wsp.getCell(`A${rp}`),SURF2,PUR,10); wsp.getCell(`A${rp}`).value='▌ COSTOS DEL PRODUCTO (TOTALES)'; rp++;
    const pcRows=[['Valor mercancía producto',pCalc.precioMercUSD],['Flete (proporcional)',pCalc.flete],['THCD (proporcional)',pCalc.thcd],['Seguro (proporcional)',pCalc.seguro],['Gastos adicionales (proporcional)',pCalc.gastos],['COSTO TOTAL DEL PRODUCTO',pCalc.costoTotalProd]];
    pcRows.forEach(([lbl,usd],fi)=>{
      const isT=fi===pcRows.length-1; wsp.getRow(rp).height=isT?20:15;
      const bg=isT?SURF2:BG;
      [lbl,parseFloat(usd.toFixed(4)),parseFloat((usd*rates.mercado).toFixed(2)),parseFloat((usd*rates.onat).toFixed(2)),'','',''].forEach((v,i)=>{
        const cell=wsp.getCell(rp,i+1); styleD(cell,bg,isT?(i===0?TXT:ACC):(i===0?TXT2:TXT),isT,i===0?'left':'right'); cell.value=v; bord(cell);
      }); rp++;
    });

    rp++;
    wsp.getRow(rp).height=6; for(let i=1;i<=7;i++) wsp.getCell(rp,i).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+BG}}; rp++;

    // Costos por nivel
    wsp.getRow(rp).height=16; wsp.mergeCells(`A${rp}:G${rp}`); styleH(wsp.getCell(`A${rp}`),SURF2,ACC2,10); wsp.getCell(`A${rp}`).value='▌ COSTO POR NIVEL DE EMPAQUE'; rp++;
    const nhdr=['Nivel','Cantidad total','Unidad','Costo por unidad (USD)','Costo por unidad (CUP Mercado)','Costo por unidad (CUP ONAT)',''];
    wsp.getRow(rp).height=16;
    nhdr.forEach((h,i)=>{const cell=wsp.getCell(rp,i+1);styleH(cell,ACC2+'22',ACC2,9);cell.value=h;bord(cell);if(i>0)cell.alignment={...cell.alignment,horizontal:'right'};});
    rp++;
    (p.niveles||[]).forEach((n,ni)=>{
      wsp.getRow(rp).height=15;
      let costoUnitNivel;
      if(ni===0){ costoUnitNivel=costoUnitBase; }
      else { costoUnitNivel=costoUnitBase*num(n.cantidadPorNivelAnterior||0); }
      const bg=ni%2===0?BG:SURF;
      [n.nombre,ni===0?cantBase:num(n.cantidad),n.unidad,parseFloat(costoUnitNivel.toFixed(4)),parseFloat((costoUnitNivel*rates.mercado).toFixed(2)),parseFloat((costoUnitNivel*rates.onat).toFixed(2)),''].forEach((v,i)=>{
        const cell=wsp.getCell(rp,i+1); styleD(cell,bg,TXT,ni===0,i===0?'left':'right'); cell.value=v; bord(cell);
      }); rp++;
    });

    rp++;
    // ONAT
    if(pvUSD>0){
      wsp.getRow(rp).height=6; for(let i=1;i<=7;i++) wsp.getCell(rp,i).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+BG}}; rp++;
      wsp.getRow(rp).height=16; wsp.mergeCells(`A${rp}:G${rp}`); styleH(wsp.getCell(`A${rp}`),SURF2,PUR+'bb',10); wsp.getCell(`A${rp}`).value='▌ ESTIMACIÓN FISCAL ONAT (por unidad base)'; rp++;
      const onatR=[['Precio de venta estimado',pvUSD],['Costo unitario',costoUnitBase],['Utilidad estimada',util],['Impuesto 11% sobre ventas',imp11],['Impuesto 35% sobre utilidad',imp35],['TOTAL IMPUESTOS',imp11+imp35]];
      onatR.forEach(([lbl,usd],fi)=>{
        const isT=fi===onatR.length-1; wsp.getRow(rp).height=isT?20:15;
        const bg=isT?SURF2:BG;
        [lbl,parseFloat(usd.toFixed(4)),parseFloat((usd*rates.onat).toFixed(2)),parseFloat((usd*rates.mercado).toFixed(2)),'','',''].forEach((v,i)=>{
          const cell=wsp.getCell(rp,i+1); styleD(cell,bg,isT?(i===0?TXT:PUR):(i===0?TXT2:TXT),isT,i===0?'left':'right'); cell.value=v; bord(cell);
        }); rp++;
      });
    }

    // Footer
    rp++; wsp.mergeCells(`A${rp}:G${rp}`);
    const fc=wsp.getCell(`A${rp}`); fc.value=`Generado: ${new Date().toLocaleString('es-ES')}  |  Mercado: ${rates.mercado} CUP/USD  |  ONAT: ${rates.onat} CUP/USD`;
    styleD(fc,BG,TXT2); fc.alignment={horizontal:'center'};
  });

  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`FichaCosto_${cont.codigo||cont.nombre||'lote'}_${cont.fecha}.xlsx`;
  a.click(); URL.revokeObjectURL(url);
}

// ── APP PRINCIPAL ─────────────────────────────────────────────────────────
function App(){
  const [pinHash,setPinHash]=useState(()=>sessionStorage.getItem('fc_pin')||'');
  const [storedHash,setStoredHash]=useState(()=>localStorage.getItem('fc_pin_hash')||'');
  const [unlocked,setUnlocked]=useState(false);
  const [gistToken,setGistToken]=useState(()=>localStorage.getItem('fc_gist_token')||'');
  const [gistId,setGistId]=useState(()=>localStorage.getItem('fc_gist_id')||'');
  const [rates,setRates]=useState(()=>{try{return JSON.parse(localStorage.getItem('fc_rates'))||{mercado:340,onat:24,eurUsd:1.08};}catch{return{mercado:340,onat:24,eurUsd:1.08};}});
  const [editRates,setEditRates]=useState(false);
  const [tmpR,setTmpR]=useState(rates);
  const [contenedores,setContenedores]=useState([]);
  const [loading,setLoading]=useState(false);
  const [saving,setSaving]=useState(false);
  const [saveMsg,setSaveMsg]=useState('');
  const [tab,setTab]=useState('lista');
  const [selected,setSelected]=useState(null);
  const [showModal,setShowModal]=useState(false);
  const [editCont,setEditCont]=useState(null);
  const [search,setSearch]=useState('');
  const [filterT,setFilterT]=useState('');

  useEffect(()=>{if(pinHash&&pinHash===storedHash)setUnlocked(true);},[]);
  useEffect(()=>{localStorage.setItem('fc_rates',JSON.stringify(rates));},[rates]);

  useEffect(()=>{
    if(!unlocked||!gistToken||!gistId)return;
    setLoading(true);
    loadGist(gistToken,gistId).then(d=>{if(d?.contenedores)setContenedores(d.contenedores);}).catch(e=>console.error(e)).finally(()=>setLoading(false));
  },[unlocked]);

  const persist=useCallback(async(next)=>{
    setContenedores(next);
    if(!gistToken||!gistId)return;
    setSaving(true);
    try{await saveGist(gistToken,gistId,{contenedores:next,updatedAt:new Date().toISOString()});setSaveMsg('Guardado ✓');}
    catch(e){setSaveMsg('Error guardando');}
    finally{setSaving(false);setTimeout(()=>setSaveMsg(''),3000);}
  },[gistToken,gistId]);

  const handleUnlock=(h,isNew)=>{
    if(isNew){localStorage.setItem('fc_pin_hash',h);setStoredHash(h);}
    sessionStorage.setItem('fc_pin',h); setPinHash(h); setUnlocked(true);
  };
  const saveCont=(c)=>{
    const idx=contenedores.findIndex(x=>x.id===c.id);
    const next=idx>=0?contenedores.map(x=>x.id===c.id?c:x):[...contenedores,c];
    persist(next); setShowModal(false); setSelected(c); setTab('detalle');
  };
  const deleteCont=(id)=>{
    if(!confirm('¿Eliminar este lote/contenedor y todos sus productos?'))return;
    persist(contenedores.filter(x=>x.id!==id));
    if(selected?.id===id){setSelected(null);setTab('lista');}
  };

  const filtered=contenedores.filter(c=>{
    const q=search.toLowerCase();
    const mq=!q||c.nombre.toLowerCase().includes(q)||c.codigo.toLowerCase().includes(q)||(c.proveedor||'').toLowerCase().includes(q)||(c.productos||[]).some(p=>p.nombre.toLowerCase().includes(q));
    return mq&&(!filterT||c.termino===filterT);
  });

  if(!unlocked) return <PinScreen onUnlock={handleUnlock} storedHash={storedHash}/>;

  return(
    <div>
      {/* HEADER */}
      <div className="app-header">
        <div><div className="header-logo">Almacén Mayorista</div><div className="header-title">Fichas de Costo</div></div>
        <div className="header-spacer"/>
        <div className="header-rates">
          {editRates?(
            <>
              <input className="form-input mono" style={{width:90,padding:'4px 8px',fontSize:12}} placeholder="Mercado" type="number" value={tmpR.mercado} onChange={e=>setTmpR(r=>({...r,mercado:e.target.value}))}/>
              <input className="form-input mono" style={{width:80,padding:'4px 8px',fontSize:12}} placeholder="ONAT" type="number" value={tmpR.onat} onChange={e=>setTmpR(r=>({...r,onat:e.target.value}))}/>
              <input className="form-input mono" style={{width:80,padding:'4px 8px',fontSize:12}} placeholder="EUR/USD" type="number" value={tmpR.eurUsd} onChange={e=>setTmpR(r=>({...r,eurUsd:e.target.value}))}/>
              <button className="btn btn-success btn-sm" onClick={()=>{setRates({mercado:num(tmpR.mercado),onat:num(tmpR.onat),eurUsd:num(tmpR.eurUsd)});setEditRates(false);}}>✓</button>
              <button className="btn btn-secondary btn-sm" onClick={()=>setEditRates(false)}>✕</button>
            </>
          ):(
            <>
              <div className="rate-pill"><div className="rate-dot" style={{background:'#a78bfa'}}/><span>Mercado</span><span className="rate-val">{rates.mercado}</span><button className="rate-edit" onClick={()=>{setTmpR(rates);setEditRates(true);}}>✎</button></div>
              <div className="rate-pill"><div className="rate-dot" style={{background:'#4f8ef7'}}/><span>ONAT</span><span className="rate-val">{rates.onat}</span></div>
              <div className="rate-pill"><div className="rate-dot" style={{background:'#38d9a9'}}/><span>EUR/USD</span><span className="rate-val">{rates.eurUsd}</span></div>
            </>
          )}
        </div>
        <div className="save-ind" style={{marginLeft:12}}>
          <div className={`save-dot${saving?' saving':''}`}/>
          <span>{saveMsg||(saving?'Guardando...':'Sincronizado')}</span>
        </div>
      </div>

      {/* NAV */}
      <div className="nav-tabs">
        {[
          {key:'lista',label:'📋 Lotes / Contenedores'},
          ...(selected?[{key:'detalle',label:`📄 ${selected.nombre}`}]:[]),
          {key:'config',label:'⚙️ Configuración'},
        ].map(t=>(
          <button key={t.key} className={`nav-tab${tab===t.key?' active':''}`} onClick={()=>setTab(t.key)}>{t.label}</button>
        ))}
        <button className="nav-tab" onClick={()=>{setEditCont(defaultContenedor());setShowModal(true);}}>➕ Nuevo Lote</button>
      </div>

      <div className="main">
        {loading&&<div className="alert a-info">⏳ Cargando desde Gist...</div>}

        {/* LISTA */}
        {tab==='lista'&&(
          <div>
            <div className="actions-bar">
              <input className="search-input" placeholder="🔍 Buscar por nombre, código, proveedor, producto..." value={search} onChange={e=>setSearch(e.target.value)}/>
              <select className="fsel" value={filterT} onChange={e=>setFilterT(e.target.value)}>
                <option value="">Todos los términos</option>
                {TERMINOS.map(t=><option key={t.k} value={t.k}>{t.k} — {t.label.split('—')[1]?.trim()||t.label}</option>)}
              </select>
              <div style={{flex:1}}/>
              <button className="btn btn-primary" onClick={()=>{setEditCont(defaultContenedor());setShowModal(true);}}>➕ Nuevo Lote</button>
            </div>
            {filtered.length===0?(
              <div className="empty"><div className="empty-icon">📦</div><div className="empty-title">{contenedores.length===0?'No hay lotes registrados':'Sin resultados'}</div><div className="empty-sub">{contenedores.length===0?'Crea tu primer lote con el botón "Nuevo Lote"':'Prueba con otro término de búsqueda'}</div></div>
            ):(
              <div className="card" style={{padding:0}}>
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>Código</th><th>Nombre del lote</th><th>Término</th><th>Proveedor</th><th>Fecha</th><th>Productos</th><th>Costo Total USD</th><th>Acciones</th></tr></thead>
                    <tbody>
                      {filtered.map(c=>{
                        const calc=calcContenedor(c,rates);
                        return(
                          <tr key={c.id} style={{cursor:'pointer'}} onClick={()=>{setSelected(c);setTab('detalle');}}>
                            <td><span className="tag">{c.codigo||'-'}</span></td>
                            <td style={{fontWeight:600}}>{c.nombre}</td>
                            <td><span className={`badge ${TERMINO_BADGE[c.termino]||'b-otra'}`}>{c.termino}</span></td>
                            <td style={{color:'var(--text2)'}}>{c.proveedor||'-'}</td>
                            <td className="td-m" style={{color:'var(--text2)'}}>{c.fecha}</td>
                            <td><span className="tag">{(c.productos||[]).length} productos</span></td>
                            <td className="td-usd">${fmt(calc.costoTotalUSD,2)}</td>
                            <td onClick={e=>e.stopPropagation()}>
                              <div style={{display:'flex',gap:4}}>
                                <button className="btn btn-secondary btn-sm" onClick={()=>{setEditCont({...c});setShowModal(true);}}>✎</button>
                                <button className="btn btn-sm" style={{background:'rgba(56,217,169,.1)',color:'var(--accent2)',border:'1px solid var(--accent2)'}} onClick={()=>exportExcel(c,rates)}>⬇ XLS</button>
                                <button className="btn btn-danger btn-sm" onClick={()=>deleteCont(c.id)}>🗑</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}

        {/* DETALLE */}
        {tab==='detalle'&&selected&&(()=>{
          const c=contenedores.find(x=>x.id===selected.id)||selected;
          const calc=calcContenedor(c,rates);
          return(
            <div>
              <div className="detail-header">
                <div className="detail-code">#{c.codigo||'SIN CÓDIGO'}</div>
                <div className="detail-name">{c.nombre}</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                  <span className={`badge ${TERMINO_BADGE[c.termino]||'b-otra'}`}>{c.termino}</span>
                  <span className="tag">{c.fecha}</span>
                  {c.proveedor&&<span className="tag">🏭 {c.proveedor}</span>}
                  {c.pais&&<span className="tag">🌐 {c.pais}</span>}
                  <span className="tag">📦 {(c.productos||[]).length} productos</span>
                </div>
              </div>
              <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
                <button className="btn btn-secondary" onClick={()=>{setEditCont({...c});setShowModal(true);}}>✎ Editar</button>
                <button className="btn btn-success" onClick={()=>exportExcel(c,rates)}>⬇ Exportar Excel</button>
                <button className="btn btn-danger" onClick={()=>deleteCont(c.id)}>🗑 Eliminar</button>
              </div>

              {/* Stats */}
              <div className="stats-row">
                <div className="stat-box"><div className="stat-label">Valor Mercancía</div><div className="stat-val" style={{color:'var(--usd)'}}>$ {fmt(calc.valorMercUSD,2)}</div><div className="stat-sub">precio factura</div></div>
                <div className="stat-box"><div className="stat-label">CIF Total</div><div className="stat-val" style={{color:'var(--accent2)'}}>$ {fmt(calc.cifUSD,2)}</div><div className="stat-sub">+flete+thcd+seguro</div></div>
                <div className="stat-box"><div className="stat-label">Gastos Adicionales</div><div className="stat-val" style={{color:'var(--accent3)'}}>$ {fmt(calc.gastosUSD,2)}</div><div className="stat-sub">transporte, estiba, etc.</div></div>
                <div className="stat-box"><div className="stat-label">Costo Total Lote</div><div className="stat-val">$ {fmt(calc.costoTotalUSD,2)}</div><div className="stat-sub">{fmt(calc.costoTotalUSD*rates.mercado,0)} CUP mercado</div></div>
              </div>

              {/* Desglose financiero */}
              <div className="card">
                <div className="card-title"><span>💰</span> Desglose Financiero del Lote</div>
                <div className="cost-box">
                  {[['Valor mercancía',calc.valorMercUSD],['Flete',calc.fleteUSD],['THCD',calc.thcdUSD],['Seguro',calc.seguroUSD]].map(([l,v])=>v>0&&(
                    <div key={l} className="cost-row sub"><span className="cost-label">{l}</span><div style={{display:'flex',gap:12}}><span className="cost-val" style={{color:'var(--usd)'}}>$ {fmt(v,2)}</span><span className="cost-val" style={{color:'var(--cup)',fontSize:11}}>{fmt(v*rates.mercado,0)} CUP</span></div></div>
                  ))}
                  {calc.gastosUSD>0&&<div className="cost-row sub"><span className="cost-label">Gastos adicionales</span><div style={{display:'flex',gap:12}}><span className="cost-val" style={{color:'var(--usd)'}}>$ {fmt(calc.gastosUSD,2)}</span><span className="cost-val" style={{color:'var(--cup)',fontSize:11}}>{fmt(calc.gastosUSD*rates.mercado,0)} CUP</span></div></div>}
                  <div className="cost-row total"><span>COSTO TOTAL DEL LOTE</span><div style={{display:'flex',gap:12}}><span className="cost-val" style={{color:'var(--usd)'}}>$ {fmt(calc.costoTotalUSD,2)}</span><span className="cost-val" style={{color:'var(--cup)'}}>{fmt(calc.costoTotalUSD*rates.mercado,0)} CUP</span></div></div>
                </div>
              </div>

              {/* Productos */}
              <div className="card">
                <div className="card-title"><span>🏷️</span> Fichas de Costo por Producto</div>
                {(c.productos||[]).map((p,pi)=>{
                  const pCalc=calcProducto(p,c,rates,calc);
                  const cantBase=calcCantidadBase(p);
                  const costoUnitBase=cantBase>0?pCalc.costoTotalProd/cantBase:0;
                  const pvUSD=num(p.precioVentaEst)>0?toUSD(p.precioVentaEst,p.monedaVenta,rates):0;
                  const imp11=pvUSD*0.11; const util=pvUSD-costoUnitBase; const imp35=util>0?util*0.35:0;
                  return(
                    <div key={p.id} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:12}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}}>
                        <span style={{fontWeight:700,fontSize:15}}>{p.nombre}</span>
                        {p.codigo&&<span className="tag">{p.codigo}</span>}
                        <span className="tag">Prop. {fmt(pCalc.proporcion*100,1)}% del lote</span>
                      </div>

                      {/* Stats producto */}
                      <div className="stats-row" style={{marginBottom:12}}>
                        <div className="stat-box"><div className="stat-label">Costo total producto</div><div className="stat-val" style={{color:'var(--usd)',fontSize:15}}>$ {fmt(pCalc.costoTotalProd,2)}</div></div>
                        <div className="stat-box"><div className="stat-label">Costo / {(p.niveles||[])[0]?.nombre||'unidad'}</div><div className="stat-val" style={{color:'var(--usd)',fontSize:15}}>$ {fmt(costoUnitBase,4)}</div><div className="stat-sub">{fmt(costoUnitBase*rates.mercado,2)} CUP merc.</div></div>
                        <div className="stat-box"><div className="stat-label">CUP ONAT / {(p.niveles||[])[0]?.nombre||'unidad'}</div><div className="stat-val" style={{color:'var(--cup)',fontSize:15}}>{fmt(costoUnitBase*rates.onat,4)}</div><div className="stat-sub">a {rates.onat} CUP/USD</div></div>
                        {pvUSD>0&&<div className="stat-box"><div className="stat-label">Margen estimado</div><div className="stat-val" style={{color:util>=0?'var(--accent2)':'#f76f4f',fontSize:15}}>{util>=0?'+':''}{fmt(util,4)} USD</div></div>}
                      </div>

                      {/* Tabla niveles */}
                      {(p.niveles||[]).length>0&&(
                        <>
                          <div style={{fontSize:11,color:'var(--text2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',marginBottom:6}}>Costo por nivel de empaque</div>
                          <div className="table-wrap" style={{marginBottom:12}}>
                            <table>
                              <thead><tr><th>Nivel</th><th>Cantidad total</th><th>Unidad</th><th>Costo por unidad (USD)</th><th>CUP Mercado</th><th>CUP ONAT</th></tr></thead>
                              <tbody>
                                {p.niveles.map((n,ni)=>{
                                  let costoUnitNivel;
                                  if(ni===0){costoUnitNivel=costoUnitBase;}
                                  else{costoUnitNivel=costoUnitBase*num(n.cantidadPorNivelAnterior||0);}
                                  return(
                                    <tr key={n.id}>
                                      <td><span style={{fontWeight:ni===0?700:400}}>{n.nombre||`Nivel ${ni+1}`}</span>{ni===0&&<span className="tag" style={{marginLeft:6,fontSize:10}}>BASE</span>}</td>
                                      <td className="td-m">{ni===0?cantBase:n.cantidad} {n.unidad}</td>
                                      <td className="td-m">{ni===0?'—':num(n.cantidadPorNivelAnterior)+' '+(p.niveles[ni-1]?.nombre||'u')}</td>
                                      <td className="td-usd">$ {fmt(costoUnitNivel,4)}</td>
                                      <td className="td-cup">{fmt(costoUnitNivel*rates.mercado,2)}</td>
                                      <td className="td-cup" style={{color:'var(--cup)'}}>{fmt(costoUnitNivel*rates.onat,4)}</td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                          </div>
                        </>
                      )}

                      <div className="cost-box" style={{marginBottom:pvUSD>0?12:0}}>
                        <div style={{fontSize:10,color:'var(--accent)',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Desglose de costos del producto</div>
                        {[['Valor mercancía',pCalc.precioMercUSD],['Flete (prop.)',pCalc.flete],['THCD (prop.)',pCalc.thcd],['Seguro (prop.)',pCalc.seguro],['Gastos (prop.)',pCalc.gastos]].map(([l,v])=>v>0&&(
                          <div key={l} className="cost-row sub"><span className="cost-label">{l}</span><span className="cost-val" style={{color:'var(--usd)'}}>$ {fmt(v,4)}</span></div>
                        ))}
                        <div className="cost-row total"><span>COSTO TOTAL PRODUCTO</span><span className="cost-val" style={{color:'var(--usd)'}}>$ {fmt(pCalc.costoTotalProd,2)}</span></div>
                      </div>

                      {pvUSD>0&&(
                        <div className="onat-box">
                          <div className="onat-title">🧾 Estimación ONAT por unidad</div>
                          {[['PVP estimado',pvUSD],['Costo unitario',costoUnitBase],['Utilidad estimada',util],['11% sobre ventas',imp11],['35% sobre utilidad',imp35]].map(([l,v])=>(
                            <div key={l} className="cost-row sub" style={{fontSize:12}}><span className="cost-label">{l}</span><div style={{display:'flex',gap:10}}><span className="cost-val" style={{color:'var(--cup)',fontSize:11}}>$ {fmt(v,4)}</span><span style={{color:'var(--text3)',fontSize:11,fontFamily:'monospace'}}>{fmt(v*rates.onat,2)} CUP</span></div></div>
                          ))}
                          <div className="cost-row total"><span>TOTAL IMPUESTOS</span><div style={{display:'flex',gap:10}}><span className="cost-val" style={{color:'var(--cup)'}}>$ {fmt(imp11+imp35,4)}</span><span className="cost-val" style={{color:'var(--cup)',fontSize:11}}>{fmt((imp11+imp35)*rates.onat,2)} CUP</span></div></div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {c.gastos&&c.gastos.length>0&&(
                <div className="card">
                  <div className="card-title"><span>💸</span> Gastos Adicionales del Lote</div>
                  <div className="table-wrap">
                    <table>
                      <thead><tr><th>Concepto</th><th>Monto</th><th>Moneda</th><th>Equiv. USD</th></tr></thead>
                      <tbody>{c.gastos.map(g=><tr key={g.id}><td>{g.concepto}</td><td className="td-m">{fmt(g.monto,2)}</td><td><span className={`cbadge cb-${g.moneda?.toLowerCase()}`} style={{position:'static'}}>{g.moneda}</span></td><td className="td-usd">$ {fmt(toUSD(g.monto,g.moneda,rates),2)}</td></tr>)}</tbody>
                    </table>
                  </div>
                </div>
              )}
              {c.notas&&<div className="card"><div className="card-title"><span>📝</span> Notas</div><p style={{color:'var(--text2)',fontSize:13,lineHeight:1.6}}>{c.notas}</p></div>}
            </div>
          );
        })()}

        {tab==='config'&&(
          <div style={{maxWidth:600}}>
            <div className="card">
              <div className="card-title"><span>🔗</span> Almacenamiento GitHub Gist</div>
              <div className="alert a-info" style={{marginBottom:12}}>Usa tu mismo PAT y Gist ID de la app de Estado de Resultados, o crea uno nuevo.</div>
              <div className="form-grid" style={{gap:12}}>
                <div className="form-group"><label className="form-label">Personal Access Token (PAT)</label><input className="form-input mono" type="password" value={gistToken} onChange={e=>{setGistToken(e.target.value);localStorage.setItem('fc_gist_token',e.target.value);}} placeholder="ghp_xxxxxxxxxxxx"/></div>
                <div className="form-group"><label className="form-label">Gist ID</label><input className="form-input mono" value={gistId} onChange={e=>{setGistId(e.target.value);localStorage.setItem('fc_gist_id',e.target.value);}} placeholder="ID del Gist"/></div>
                <button className="btn btn-primary" onClick={()=>{setLoading(true);loadGist(gistToken,gistId).then(d=>{if(d?.contenedores)setContenedores(d.contenedores);setSaveMsg('Cargado ✓');}).catch(e=>setSaveMsg('Error: '+e.message)).finally(()=>setLoading(false));}}>Conectar y Cargar</button>
              </div>
            </div>
            <div className="card">
              <div className="card-title"><span>💱</span> Tipos de Cambio</div>
              <div className="form-grid g3">
                <div className="form-group"><label className="form-label">Mercado Informal (CUP/USD)</label>
                  <div className="iw"><input className="form-input mono" type="number" step="0.01" min="0" value={rates.mercado} onChange={e=>setRates(r=>({...r,mercado:num(e.target.value)}))} placeholder="340"/><span className="cbadge cb-cup">CUP</span></div>
                </div>
                <div className="form-group"><label className="form-label">Oficial ONAT (CUP/USD)</label>
                  <div className="iw"><input className="form-input mono" type="number" step="0.01" min="0" value={rates.onat} onChange={e=>setRates(r=>({...r,onat:num(e.target.value)}))} placeholder="24"/><span className="cbadge cb-cup">CUP</span></div>
                </div>
                <div className="form-group"><label className="form-label">EUR / USD</label>
                  <div className="iw"><input className="form-input mono" type="number" step="0.0001" min="0" value={rates.eurUsd} onChange={e=>setRates(r=>({...r,eurUsd:num(e.target.value)}))} placeholder="1.08"/><span className="cbadge cb-usd">USD</span></div>
                </div>
              </div>
            </div>
            <div className="card">
              <div className="card-title"><span>🔐</span> PIN de Acceso</div>
              <button className="btn btn-secondary" onClick={()=>{localStorage.removeItem('fc_pin_hash');sessionStorage.removeItem('fc_pin');window.location.reload();}}>Cambiar PIN</button>
            </div>
          </div>
        )}
      </div>

      {showModal&&editCont&&<ContenedorModal inicial={editCont} rates={rates} onSave={saveCont} onClose={()=>setShowModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
