<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;

const fmt=(n,d=2)=>{if(n===null||n===undefined||isNaN(n))return '0.'+'0'.repeat(d);return Number(n).toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d});};
const num=v=>parseFloat(v)||0;
const uid=()=>Math.random().toString(36).slice(2,10);
const today=()=>new Date().toISOString().slice(0,10);

const TERMINOS=[{k:'CIF',l:'CIF — Costo, Seguro y Flete'},{k:'CFR',l:'CFR — Costo y Flete'},{k:'FOB',l:'FOB — Franco a Bordo'},{k:'NAC',l:'Compra Nacionalizada'},{k:'PROD',l:'Producción Propia'},{k:'OTRA',l:'Otra Vía'}];
const TBADGE={CIF:'b-cif',CFR:'b-cfr',FOB:'b-fob',NAC:'b-nac',PROD:'b-prod',OTRA:'b-otra'};
const MONEDAS=['USD','CUP','EUR'];
const emptyGasto=()=>({id:uid(),concepto:'',monto:'',moneda:'USD'});

// Nuevo modelo de niveles simplificado:
// niveles = [{id, nombre, unidad, total, porNivelAnterior}]
// nivel[0] = unidad base (total = cantidad total en el lote)
// nivel[1] = empaque intermedio (cartón): porNivelAnterior = cuántas unidades base por cartón
// nivel[2] = empaque mayor (caja): porNivelAnterior = cuántos cartones por caja
// etc.
const emptyNivel=(idx)=>({id:uid(),nombre:idx===0?'':'',unidad:idx===0?'u':'',total:'',porNivelAnterior:''});
const emptyProducto=()=>({id:uid(),nombre:'',codigo:'',precioFactura:'',monedaPrecio:'USD',tipoPrecio:'total',niveles:[],pvOnat:'',monedaPvOnat:'USD',pvReal:'',monedaPvReal:'USD',notas:''});
const defaultContenedor=()=>({id:uid(),codigo:'',nombre:'',termino:'CIF',proveedor:'',pais:'',fecha:today(),notas:'',flete:'',monedaFlete:'USD',thcd:'',monedaThcd:'USD',seguroTipo:'pct',seguroValor:'',monedaSeguro:'USD',gastos:[],productos:[]});

// ─── STORAGE ──────────────────────────────────────────────────────────────
async function loadGist(token,gistId){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json'}});
  if(!r.ok)throw new Error('Error '+r.status);
  const d=await r.json();
  const c=d.files['fichas-costo.json']?.content;
  return c?JSON.parse(c):null;
}
async function saveGist(token,gistId,payload){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{method:'PATCH',headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({files:{'fichas-costo.json':{content:JSON.stringify(payload,null,2)}}})});
  if(!r.ok)throw new Error('Error '+r.status);
}

// ─── CÁLCULOS ─────────────────────────────────────────────────────────────
const toUSD=(m,mon,rates)=>{if(mon==='USD')return num(m);if(mon==='EUR')return num(m)*rates.eurUsd;return num(m)/rates.mercado;};

function calcContenedor(c,rates){
  // Valor mercancía = suma de precios de todos los productos
  const prods=c.productos||[];
  let valorMercUSD=0;
  prods.forEach(p=>{
    let pu=toUSD(p.precioFactura,p.monedaPrecio,rates);
    if(p.tipoPrecio==='unit'){
      const cantBase=num((p.niveles||[])[0]?.total||0);
      pu=pu*cantBase;
    }
    valorMercUSD+=pu;
  });
  // Si no hay productos con precio, usar campo manual
  if(valorMercUSD===0) valorMercUSD=toUSD(c.valorMercancia||0,c.monedaValor||'USD',rates);

  const fleteUSD=toUSD(c.flete,c.monedaFlete,rates);
  const thcdUSD=toUSD(c.thcd,c.monedaThcd,rates);
  let seguroUSD=0;
  if(c.seguroTipo==='pct') seguroUSD=valorMercUSD*(num(c.seguroValor)/100);
  else seguroUSD=toUSD(c.seguroValor,c.monedaSeguro,rates);
  const cifUSD=valorMercUSD+fleteUSD+thcdUSD+seguroUSD;
  const gastosUSD=(c.gastos||[]).reduce((s,g)=>s+toUSD(g.monto,g.moneda,rates),0);
  const costoTotalUSD=cifUSD+gastosUSD;
  return {valorMercUSD,fleteUSD,thcdUSD,seguroUSD,cifUSD,gastosUSD,costoTotalUSD};
}

function calcProducto(p,c,rates,calc){
  let precioMercUSD=toUSD(p.precioFactura,p.monedaPrecio,rates);
  const cantBase=num((p.niveles||[])[0]?.total||0);
  if(p.tipoPrecio==='unit') precioMercUSD=precioMercUSD*cantBase;
  const prop=calc.valorMercUSD>0?precioMercUSD/calc.valorMercUSD:0;
  const flete=calc.fleteUSD*prop;
  const thcd=calc.thcdUSD*prop;
  const seguro=calc.seguroUSD*prop;
  const gastos=calc.gastosUSD*prop;
  const costoTotalProd=precioMercUSD+flete+thcd+seguro+gastos;
  const costoUnitBase=cantBase>0?costoTotalProd/cantBase:0;
  return {precioMercUSD,prop,flete,thcd,seguro,gastos,costoTotalProd,costoUnitBase,cantBase};
}

// Calcula cuántas unidades base hay en cada nivel y el costo por unidad de ese nivel
function calcNivelesCostos(niveles,costoUnitBase){
  if(!niveles||!niveles.length)return[];
  // nivel[0]: 1 unidad base = costoUnitBase
  // nivel[1]: 1 unidad = porNivelAnterior * costoUnitBase (ej: 1 cartón = 12 huevos)
  // nivel[2]: 1 unidad = porNivelAnterior[1] * porNivelAnterior[0] * costoUnitBase (ej: 1 caja = 30 cartones = 360 huevos)
  const result=[];
  let acumUnidadesBase=1;
  for(let i=0;i<niveles.length;i++){
    if(i===0){
      acumUnidadesBase=1;
    } else {
      acumUnidadesBase*=num(niveles[i].porNivelAnterior||0);
    }
    result.push({...niveles[i],unidadesBase:acumUnidadesBase,costoUSD:costoUnitBase*acumUnidadesBase});
  }
  return result;
}

// ONAT por nivel
function calcOnatNiveles(nivelesCalc,pvOnatUSD,pvRealUSD,rates){
  return nivelesCalc.map(n=>{
    const costo=n.costoUSD;
    const pvOnat=pvOnatUSD*n.unidadesBase;
    const pvReal=pvRealUSD*n.unidadesBase;
    const imp11=pvOnat*0.11;
    const utilNeta=pvOnat-costo;
    const imp35=utilNeta>0?utilNeta*0.35:0;
    const totalImp=imp11+imp35;
    const margenReal=pvReal-costo;
    return {...n,pvOnat,pvReal,imp11,utilNeta,imp35,totalImp,margenReal};
  });
}

// ─── PIN ──────────────────────────────────────────────────────────────────
function PinScreen({onUnlock,storedHash}){
  const [digits,setDigits]=useState('');
  const [error,setError]=useState('');
  const [setup,setSetup]=useState(!storedHash);
  const [confirm,setConfirm]=useState('');
  const [step,setStep]=useState(1);
  const hashPin=async p=>{const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');};
  const press=async d=>{
    if(digits.length>=6)return;
    const next=digits+d;setDigits(next);setError('');
    if(next.length===6){
      if(setup){
        if(step===1){setConfirm(next);setDigits('');setStep(2);}
        else{if(next===confirm){const h=await hashPin(next);onUnlock(h,true);}else{setError('Los PINs no coinciden');setDigits('');setStep(1);setConfirm('');}}
      }else{const h=await hashPin(next);if(h===storedHash)onUnlock(h,false);else{setError('PIN incorrecto');setDigits('');}}
    }
  };
  const del=()=>{setDigits(d=>d.slice(0,-1));setError('');};
  return(
    <div className="pin-overlay">
      <div className="pin-card">
        <div className="pin-logo">Almacén Mayorista</div>
        <div className="pin-title">📦 Fichas de Costo</div>
        <div className="pin-sub">{setup?(step===1?'Crea tu PIN de acceso (6 dígitos)':'Confirma tu PIN'):'Ingresa tu PIN'}</div>
        <div className="pin-dots">{[...Array(6)].map((_,i)=><div key={i} className={`pin-dot${i<digits.length?' filled':''}`}/>)}</div>
        <div className="pin-grid">{[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((d,i)=><button key={i} className="pin-btn" onClick={()=>d===''?null:d==='⌫'?del():press(String(d))} style={d===''?{visibility:'hidden'}:{}}>{d}</button>)}</div>
        <div className="pin-error">{error}</div>
      </div>
    </div>
  );

// ─── MODAL CONTENEDOR ─────────────────────────────────────────────────────
function ContenedorModal({inicial,rates,onSave,onClose}){
  const [c,setC]=useState(inicial);
  const upd=(k,v)=>setC(p=>({...p,[k]:v}));
  const addG=()=>upd('gastos',[...(c.gastos||[]),emptyGasto()]);
  const updG=(id,k,v)=>upd('gastos',c.gastos.map(g=>g.id===id?{...g,[k]:v}:g));
  const delG=id=>upd('gastos',c.gastos.filter(g=>g.id!==id));
  const addP=()=>upd('productos',[...(c.productos||[]),emptyProducto()]);
  const delP=id=>upd('productos',c.productos.filter(p=>p.id!==id));
  const updP=(id,k,v)=>upd('productos',c.productos.map(p=>p.id===id?{...p,[k]:v}:p));
  const addNivel=pid=>upd('productos',c.productos.map(p=>{
    if(p.id!==pid)return p;
    const idx=(p.niveles||[]).length;
    return {...p,niveles:[...(p.niveles||[]),emptyNivel(idx)]};
  }));
  const delNivel=(pid,nid)=>upd('productos',c.productos.map(p=>p.id===pid?{...p,niveles:p.niveles.filter(n=>n.id!==nid)}:p));
  const updN=(pid,nid,k,v)=>upd('productos',c.productos.map(p=>p.id===pid?{...p,niveles:p.niveles.map(n=>n.id===nid?{...n,[k]:v}:n)}:p));

  const calc=calcContenedor(c,rates);
  const esCIF=['CIF','CFR','FOB'].includes(c.termino);
  const isValid=c.nombre&&(c.productos||[]).length>0&&(c.productos||[]).every(p=>p.nombre);

  const previewProd=(p)=>{
    if(!(p.niveles||[]).length)return null;

// Helper para calcular cantidad de nivel i basado en niveles anteriores
function calcMultiplicador(niveles,upToIdx){
  let m=1;
  for(let i=1;i<=upToIdx;i++) m*=num(niveles[i]?.porNivelAnterior||0);
  return m||1;
}

// ─── EXCEL EXPORT ─────────────────────────────────────────────────────────
async function exportExcel(cont,rates){
  const wb=new ExcelJS.Workbook();
  wb.creator='Almacén Mayorista';wb.created=new Date();
  const calc=calcContenedor(cont,rates);
  const BG='0F1117',SF='1E2333',SF2='252B3D',AC='4F8EF7',AC2='38D9A9',AC3='F7C948',PUR='A78BFA',TX='E8ECF4',TX2='9AA3BC',BRD='2A3050',RED='F76F4F';
  const sH=(c,bg,fg,sz=10)=>{c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+bg}};c.font={bold:true,color:{argb:'FF'+fg},size:sz,name:'Calibri'};c.alignment={horizontal:'center',vertical:'middle',wrapText:true};};
  const sD=(c,bg,fg,bold=false,align='left')=>{c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+bg}};c.font={bold,color:{argb:'FF'+fg},size:10,name:'Calibri'};c.alignment={horizontal:align,vertical:'middle'};};
  const br=(c)=>{c.border={top:{style:'thin',color:{argb:'FF'+BRD}},left:{style:'thin',color:{argb:'FF'+BRD}},bottom:{style:'thin',color:{argb:'FF'+BRD}},right:{style:'thin',color:{argb:'FF'+BRD}}};};

  // ── HOJA RESUMEN ──
  const ws=wb.addWorksheet('Resumen Lote');
  ws.views=[{showGridLines:false}];
  [30,16,16,16,16,16,16].forEach((w,i)=>ws.getColumn(i+1).width=w);
  ws.mergeCells('A1:G1');ws.getRow(1).height=36;
  const h1=ws.getCell('A1');h1.value='📦 FICHA DE COSTO — '+cont.nombre.toUpperCase();sH(h1,BG,AC,13);
  ws.mergeCells('A2:G2');ws.getRow(2).height=18;
  const h2=ws.getCell('A2');h2.value=`Término: ${cont.termino}  |  Proveedor: ${cont.proveedor||'-'}  |  País: ${cont.pais||'-'}  |  Fecha: ${cont.fecha}`;sH(h2,SF,TX2,9);
  ws.getRow(3).height=6;for(let i=1;i<=7;i++)ws.getCell(3,i).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+BG}};

  let row=4;
  ws.mergeCells(`A${row}:G${row}`);ws.getRow(row).height=16;sH(ws.getCell(`A${row}`),SF2,AC,10);ws.getCell(`A${row}`).value='▌ RESUMEN FINANCIERO';row++;
  const hdrs=['','USD','CUP Mercado','CUP ONAT'];
  hdrs.forEach((h,i)=>{if(i>0){const c=ws.getCell(row,i+1);sH(c,AC+'22',AC,9);c.value=h;br(c);}});
  ws.getRow(row).height=14;row++;
  [['Valor mercancía',calc.valorMercUSD],['Flete',calc.fleteUSD],['THCD',calc.thcdUSD],['Seguro',calc.seguroUSD],['Gastos adicionales',calc.gastosUSD],['COSTO TOTAL',calc.costoTotalUSD]].forEach(([l,v],fi)=>{
    if(v===0&&fi<5)return;
    const isT=fi===5;ws.getRow(row).height=isT?20:15;
    const bg=isT?SF2:BG;const fg=isT?TX:TX2;
    [l,v,v*rates.mercado,v*rates.onat,'','',''].forEach((val,i)=>{
      const cell=ws.getCell(row,i+1);sD(cell,bg,fg,isT,i===0?'left':'right');
      cell.value=typeof val==='number'?parseFloat(val.toFixed(2)):val;br(cell);
    });row++;
  });

  // ── HOJA POR PRODUCTO ──
  (cont.productos||[]).forEach((p,pi)=>{
    const pCalc=calcProducto(p,cont,rates,calc);
    const nivelesCalc=calcNivelesCostos(p.niveles||[],pCalc.costoUnitBase);
    const pvOnatUSD=toUSD(p.pvOnat||0,p.monedaPvOnat,rates);
    const pvRealUSD=toUSD(p.pvReal||0,p.monedaPvReal,rates);
    const onatNivs=pvOnatUSD>0?calcOnatNiveles(nivelesCalc,pvOnatUSD,pvRealUSD,rates):[];

    const wsp=wb.addWorksheet(`${pi+1}. ${p.nombre.slice(0,22)}`);
    wsp.views=[{showGridLines:false}];
    [28,16,16,16,16,16,14].forEach((w,i)=>wsp.getColumn(i+1).width=w);

    wsp.mergeCells('A1:G1');wsp.getRow(1).height=32;
    const ph=wsp.getCell('A1');ph.value=`📦 ${p.nombre.toUpperCase()}`;sH(ph,BG,PUR,13);
    wsp.mergeCells('A2:G2');wsp.getRow(2).height=16;
    const ph2=wsp.getCell('A2');ph2.value=`Lote: ${cont.nombre}  |  Código: ${p.codigo||'-'}  |  Prop. del lote: ${(pCalc.prop*100).toFixed(2)}%`;sH(ph2,SF,TX2,9);
    wsp.getRow(3).height=6;for(let i=1;i<=7;i++)wsp.getCell(3,i).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF'+BG}};

    let rp=4;
    // COSTO POR NIVEL
    wsp.mergeCells(`A${rp}:G${rp}`);wsp.getRow(rp).height=16;sH(wsp.getCell(`A${rp}`),SF2,AC2,10);wsp.getCell(`A${rp}`).value='▌ COSTO POR NIVEL DE EMPAQUE';rp++;
    const nHdrs=['Nivel','Unid. base equiv.','Cantidad en lote','Costo / unidad USD','CUP Mercado','CUP ONAT',''];

// ─── APP PRINCIPAL ─────────────────────────────────────────────────────────
function App(){

  const [unlocked,setUL]=useState(false);

  const [gistId,setGI]=useState(()=>localStorage.getItem('fc_gist_id')||'');
  const [rates,setRates]=useState(()=>{try{return JSON.parse(localStorage.getItem('fc_rates'))||{mercado:340,onat:24,eurUsd:1.08};}catch{return{mercado:340,onat:24,eurUsd:1.08};}});
  const [editRates,setER]=useState(false);
  const [tmpR,setTR]=useState(rates);
  const [conts,setConts]=useState([]);
  const [loading,setLoading]=useState(false);
  const [saving,setSaving]=useState(false);
  const [saveMsg,setSM]=useState('');
  const [tab,setTab]=useState('lista');
  const [sel,setSel]=useState(null);
  const [showMo,setShowMo]=useState(false);

  useEffect(()=>{if(pinHash&&pinHash===storedHash)setUL(true);},[]);
  useEffect(()=>{localStorage.setItem('fc_rates',JSON.stringify(rates));},[rates]);
  useEffect(()=>{
    if(!unlocked||!gistToken||!gistId)return;
    setLoading(true);
    loadGist(gistToken,gistId).then(d=>{if(d?.contenedores)setConts(d.contenedores);}).catch(e=>console.error(e)).finally(()=>setLoading(false));
  },[unlocked]);

  const persist=useCallback(async(next)=>{
    setConts(next);
    if(!gistToken||!gistId)return;
    setSaving(true);
    try{await saveGist(gistToken,gistId,{contenedores:next,updatedAt:new Date().toISOString()});setSM('Guardado ✓');}
    catch(e){setSM('Error guardando');}
    finally{setSaving(false);setTimeout(()=>setSM(''),3000);}
  },[gistToken,gistId]);

  const handleUnlock=(h,isNew)=>{if(isNew){localStorage.setItem('fc_pin_hash',h);setSH(h);}sessionStorage.setItem('fc_pin',h);setPH(h);setUL(true);};
  const saveCont=(c)=>{const idx=conts.findIndex(x=>x.id===c.id);const next=idx>=0?conts.map(x=>x.id===c.id?c:x):[...conts,c];persist(next);setShowMo(false);setSel(c);setTab('detalle');};
  const delCont=(id)=>{if(!confirm('¿Eliminar este lote y todos sus productos?'))return;persist(conts.filter(x=>x.id!==id));if(sel?.id===id){setSel(null);setTab('lista');}};

  const filtered=conts.filter(c=>{
    const q=search.toLowerCase();
    const mq=!q||c.nombre.toLowerCase().includes(q)||((c.codigo||'').toLowerCase().includes(q))||((c.proveedor||'').toLowerCase().includes(q))||(c.productos||[]).some(p=>p.nombre.toLowerCase().includes(q));

        <div className="hspace"/>
        <div className="hrates">
          {editRates?(
            <>
              <input className="finp mono" style={{width:90,padding:'4px 8px',fontSize:12}} placeholder="Mercado" type="number" value={tmpR.mercado} onChange={e=>setTR(r=>({...r,mercado:e.target.value}))}/>
              <input className="finp mono" style={{width:80,padding:'4px 8px',fontSize:12}} placeholder="ONAT" type="number" value={tmpR.onat} onChange={e=>setTR(r=>({...r,onat:e.target.value}))}/>
              <input className="finp mono" style={{width:80,padding:'4px 8px',fontSize:12}} placeholder="EUR" type="number" value={tmpR.eurUsd} onChange={e=>setTR(r=>({...r,eurUsd:e.target.value}))}/>
              <button className="btn bsu bsm" onClick={()=>{setRates({mercado:num(tmpR.mercado),onat:num(tmpR.onat),eurUsd:num(tmpR.eurUsd)});setER(false);}}>✓</button>
              <button className="btn bs bsm" onClick={()=>setER(false)}>✕</button>
            </>

              <div className="rpill"><div className="rdot" style={{background:'#a78bfa'}}/><span>Mercado</span><span className="rval">{rates.mercado}</span><button className="redit" onClick={()=>{setTR(rates);setER(true);}}>✎</button></div>

                                <td>$ {fmt(pvRealUSD*pCalc.cantBase,2)}</td>
                                <td>$ {fmt(pvOnatUSD*pCalc.cantBase*0.11,2)}</td>
                                <td>{(()=>{const u=pvOnatUSD*pCalc.cantBase-pCalc.costoTotalProd;return(u>=0?'+':'')+fmt(u,2);})()}</td>
                                <td>$ {fmt(Math.max(0,pvOnatUSD*pCalc.cantBase-pCalc.costoTotalProd)*0.35,2)}</td>
                                <td>$ {fmt(totImp,2)}</td>
                                <td>{(()=>{const mr=pvRealUSD*pCalc.cantBase-pCalc.costoTotalProd;return(mr>=0?'+':'')+fmt(mr,2);})()}</td>
                              </tr>
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}
                    {!pvOnatUSD&&<div className="alert ai" style={{marginTop:12}}>Agrega el precio de venta ONAT para ver el cálculo de impuestos.</div>}

                    {/* Desglose costo */}
                    <div className="cbox" style={{marginTop:12}}>
                      <div style={{fontSize:10,color:'var(--ac)',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Desglose costo del producto</div>
                      {[['Valor mercancía',pCalc.precioMercUSD],['Flete prop.',pCalc.flete],['THCD prop.',pCalc.thcd],['Seguro prop.',pCalc.seguro],['Gastos prop.',pCalc.gastos]].filter(([,v])=>v>0).map(([l,v])=>(
                        <div key={l} className="crow sub"><span className="clbl">{l}</span><span className="cval" style={{color:'var(--usd)'}}>$ {fmt(v,4)}</span></div>
                      ))}
                      <div className="crow tot"><span>COSTO TOTAL PRODUCTO</span><span className="cval" style={{color:'var(--usd)'}}>$ {fmt(pCalc.costoTotalProd,2)}</span></div>
                    </div>
                  </div>
                );
              })}

              {c.gastos&&c.gastos.length>0&&(
                <div className="card">
                  <div className="ctitle"><span>💸</span> Gastos Adicionales del Lote</div>
                  <div className="tw"><table><thead><tr><th>Concepto</th><th>Monto</th><th>Moneda</th><th>Equiv. USD</th></tr></thead>
                    <tbody>{c.gastos.map(g=><tr key={g.id}><td>{g.concepto}</td><td className="tm">{fmt(g.monto,2)}</td><td><span className={`cb cb-${(g.moneda||'usd').toLowerCase()}`} style={{position:'static'}}>{g.moneda}</span></td><td className="tusd">$ {fmt(toUSD(g.monto,g.moneda,rates),2)}</td></tr>)}</tbody>
                  </table></div>
                </div>
              )}
              {c.notas&&<div className="card"><div className="ctitle"><span>📝</span> Notas</div><p style={{color:'var(--tx2)',fontSize:13,lineHeight:1.6}}>{c.notas}</p></div>}
            </div>
          );
        })()}

        {tab==='config'&&(
          <div style={{maxWidth:600}}>
            <div className="card">
              <div className="ctitle"><span>🔗</span> GitHub Gist</div>
              <div className="alert ai" style={{marginBottom:12}}>Usa el mismo PAT y Gist ID de la app de Estado de Resultados, o uno nuevo.</div>
              <div className="fg" style={{gap:12}}>
                <div className="fgrp"><label className="flbl">Personal Access Token</label><input className="finp mono" type="password" value={gistToken} onChange={e=>{setGT(e.target.value);localStorage.setItem('fc_gist_token',e.target.value);}} placeholder="ghp_xxxxxxxxxxxx"/></div>
                <div className="fgrp"><label className="flbl">Gist ID</label><input className="finp mono" value={gistId} onChange={e=>{setGI(e.target.value);localStorage.setItem('fc_gist_id',e.target.value);}} placeholder="ID del Gist"/></div>
                <button className="btn bp" onClick={()=>{setLoading(true);loadGist(gistToken,gistId).then(d=>{if(d?.contenedores)setConts(d.contenedores);setSM('Cargado ✓');}).catch(e=>setSM('Error: '+e.message)).finally(()=>setLoading(false));}}>Conectar y Cargar</button>
              </div>
            </div>
            <div className="card">
              <div className="ctitle"><span>💱</span> Tipos de Cambio</div>
              <div className="fg g3">
                <div className="fgrp"><label className="flbl">Mercado (CUP/USD)</label><div className="iw"><input className="finp mono" type="number" step="0.01" value={rates.mercado} onChange={e=>setRates(r=>({...r,mercado:num(e.target.value)}))} placeholder="340"/><span className="cb cb-cup">CUP</span></div></div>
                <div className="fgrp"><label className="flbl">ONAT (CUP/USD)</label><div className="iw"><input className="finp mono" type="number" step="0.01" value={rates.onat} onChange={e=>setRates(r=>({...r,onat:num(e.target.value)}))} placeholder="24"/><span className="cb cb-cup">CUP</span></div></div>
                <div className="fgrp"><label className="flbl">EUR / USD</label><div className="iw"><input className="finp mono" type="number" step="0.0001" value={rates.eurUsd} onChange={e=>setRates(r=>({...r,eurUsd:num(e.target.value)}))} placeholder="1.08"/><span className="cb cb-usd">USD</span></div></div>
              </div>
            </div>
            <div className="card"><div className="ctitle"><span>🔐</span> PIN</div><button className="btn bs" onClick={()=>{localStorage.removeItem('fc_pin_hash');sessionStorage.removeItem('fc_pin');window.location.reload();}}>Cambiar PIN</button></div>
          </div>
        )}
      </div>

      {showMo&&editC&&<ContenedorModal inicial={editC} rates={rates} onSave={saveCont} onClose={()=>setShowMo(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
