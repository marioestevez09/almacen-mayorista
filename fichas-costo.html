<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;
const fmt=(n,d=2)=>{if(n===null||n===undefined||isNaN(n))return "0."+"0".repeat(d);return Number(n).toLocaleString("es-ES",{minimumFractionDigits:d,maximumFractionDigits:d});};
const num=v=>parseFloat(v)||0;
const uid=()=>Math.random().toString(36).slice(2,10);
const today=()=>new Date().toISOString().slice(0,10);
const TERMINOS=[{k:"CIF",l:"CIF — Costo, Seguro y Flete"},{k:"CFR",l:"CFR — Costo y Flete"},{k:"FOB",l:"FOB — Franco a Bordo"},{k:"NAC",l:"Compra Nacionalizada"},{k:"PROD",l:"Producción Propia"},{k:"OTRA",l:"Otra Vía"}];
const TBADGE={CIF:"b-cif",CFR:"b-cfr",FOB:"b-fob",NAC:"b-nac",PROD:"b-prod",OTRA:"b-otra"};
const MONEDAS=["USD","CUP","EUR"];
const emptyGasto=()=>({id:uid(),concepto:"",monto:"",moneda:"USD"});
const emptyProd=()=>({id:uid(),nombre:"",codigo:"",precioFactura:"",monedaPrecio:"USD",tipoPrecio:"total",niveles:[],
  gastosOnat:[],pvOnat:"",monedaPvOnat:"CUP",pvReal:"",monedaPvReal:"USD",notas:""});
const defCont=()=>({id:uid(),codigo:"",nombre:"",termino:"CIF",proveedor:"",pais:"",fecha:today(),notas:"",
  flete:"",monedaFlete:"USD",thcd:"",monedaThcd:"USD",seguroTipo:"pct",seguroValor:"",monedaSeguro:"USD",
  gastos:[],productos:[]});

// ── STORAGE ──
async function loadGist(token,gistId){
  const r=await fetch("https://api.github.com/gists/"+gistId,{headers:{Authorization:"token "+token,Accept:"application/vnd.github.v3+json"}});
  if(!r.ok)throw new Error("Error "+r.status);
  const d=await r.json();
  const c=d.files["fichas-costo.json"]?.content;
  return c?JSON.parse(c):null;
}
async function saveGist(token,gistId,payload){
  const r=await fetch("https://api.github.com/gists/"+gistId,{method:"PATCH",
    headers:{Authorization:"token "+token,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},
    body:JSON.stringify({files:{"fichas-costo.json":{content:JSON.stringify(payload,null,2)}}})});
  if(!r.ok)throw new Error("Error "+r.status);
}

// ── CÁLCULOS ──
// Convierte a USD usando tasa mercado
const toUSD=(m,mon,rates)=>{
  if(mon==="USD")return num(m);
  if(mon==="EUR")return num(m)*rates.eurUsd;
  return num(m)/rates.mercado;
};
// Convierte a CUP usando tasa ONAT
const toCUPonat=(m,mon,rates)=>{
  if(mon==="CUP")return num(m);
  if(mon==="USD")return num(m)*rates.onat;
  if(mon==="EUR")return num(m)*rates.eurUsd*rates.onat;
  return num(m);
};
// Convierte a USD usando tasa mercado desde CUP resultado ONAT
const cupOnatToUSD=(cup,rates)=>cup/rates.mercado;

function calcContenedor(c,rates){
  const prods=c.productos||[];
  let valorMercUSD=0;
  prods.forEach(p=>{
    let pu=toUSD(p.precioFactura,p.monedaPrecio,rates);
    if(p.tipoPrecio==="unit"){const cb=num((p.niveles||[])[0]?.total||0);pu*=cb;}
    valorMercUSD+=pu;
  });
  const fleteUSD=toUSD(c.flete,c.monedaFlete,rates);
  const thcdUSD=toUSD(c.thcd,c.monedaThcd,rates);
  let seguroUSD=0;
  if(c.seguroTipo==="pct")seguroUSD=valorMercUSD*(num(c.seguroValor)/100);
  else seguroUSD=toUSD(c.seguroValor,c.monedaSeguro,rates);
  const cifUSD=valorMercUSD+fleteUSD+thcdUSD+seguroUSD;
  const gastosUSD=(c.gastos||[]).reduce((s,g)=>s+toUSD(g.monto,g.moneda,rates),0);
  const costoTotalUSD=cifUSD+gastosUSD;
  // CUP ONAT equivalentes
  const cifCUPonat=(valorMercUSD+fleteUSD+thcdUSD+seguroUSD)*rates.onat;
  const gastosCUPonat=gastosUSD*rates.onat;
  return {valorMercUSD,fleteUSD,thcdUSD,seguroUSD,cifUSD,gastosUSD,costoTotalUSD,cifCUPonat,gastosCUPonat};
}

function calcProducto(p,c,rates,calcCont){
  const cantBase=num((p.niveles||[])[0]?.total||0);
  let precioMercUSD=toUSD(p.precioFactura,p.monedaPrecio,rates);
  if(p.tipoPrecio==="unit")precioMercUSD*=cantBase;
  const prop=calcCont.valorMercUSD>0?precioMercUSD/calcCont.valorMercUSD:0;

  // CIF proporcional (compartido)
  const cifPropUSD=(calcCont.fleteUSD+calcCont.thcdUSD+calcCont.seguroUSD)*prop;
  const fleteR=calcCont.fleteUSD*prop;
  const thcdR=calcCont.thcdUSD*prop;
  const seguroR=calcCont.seguroUSD*prop;

  // Importadora: entra en AMBAS fichas (USD a tasa mercado)
  const importadoraUSD=(p.gastos||[])
    .filter(g=>g.concepto&&(g.concepto.toLowerCase().includes("importadora")))
    .reduce((s,g)=>s+toUSD(g.monto,g.moneda,rates),0);

  // Gastos adicionales filtrados por ficha
  const gastosRealUSD=(p.gastos||[]).filter(g=>g.enReal).reduce((s,g)=>s+toUSD(g.monto,g.moneda,rates),0);
  const gastosOnatUSD=(p.gastos||[]).filter(g=>g.enOnat).reduce((s,g)=>s+toUSD(g.monto,g.moneda,rates),0);
  // Gastos lote real (distribuidos)
  const gastosLoteR=calcCont.gastosUSD*prop;

  // ── BASE COMPARTIDA: CIF + importadora ──
  // Importadora ya está en gastos del producto filtrada arriba como enOnat+enReal
  // Base = mercancía + CIF proporcional
  const baseUSD=precioMercUSD+cifPropUSD;

  // ── FICHA REAL: base + gastos marcados enReal + gastos lote ──
  const costoRealTotalUSD=baseUSD+gastosRealUSD+gastosLoteR;
  const costoRealUnitUSD=cantBase>0?costoRealTotalUSD/cantBase:0;

  // ── FICHA ONAT: base + gastos marcados enOnat → en USD → × tasa ONAT = CUP ──
  const costoOnatTotalUSD=baseUSD+gastosOnatUSD;
  const costoOnatUnitUSD=cantBase>0?costoOnatTotalUSD/cantBase:0;
  const costoOnatUnitCUP=costoOnatUnitUSD*rates.onat;
  const costoOnatTotalCUP=costoOnatTotalUSD*rates.onat;

  return {cantBase,prop,precioMercUSD,fleteR,thcdR,seguroR,
    baseUSD,gastosRealUSD,gastosOnatUSD,gastosLoteR,
    costoRealTotalUSD,costoRealUnitUSD,
    costoOnatTotalUSD,costoOnatUnitUSD,costoOnatUnitCUP,costoOnatTotalCUP};
}

function calcNiveles(niveles,costoUnitBase){
  if(!niveles||!niveles.length)return[];
  return niveles.map((n,i)=>{
    let ub=1;
    if(i>0){for(let j=1;j<=i;j++)ub*=num(niveles[j].porNivelAnterior||0);}
    return {...n,unidadesBase:ub,costoUSD:costoUnitBase*ub};
  });
}

function calcOnat(nivelesCalc,pvOnatCUP,costoOnatUnitCUP,costoRealUnitUSD,pvRealUSD,cantBase,rates){
  return nivelesCalc.map(n=>{
    const pvoN=pvOnatCUP*n.unidadesBase;
    const costoN=costoOnatUnitCUP*n.unidadesBase;
    const imp11=pvoN*0.11;
    const utilN=pvoN-costoN;
    const imp35=utilN>0?utilN*0.35:0;
    const totalImpCUP=imp11+imp35;
    const totalImpUSD=cupOnatToUSD(totalImpCUP,rates);
    const costoRealN=costoRealUnitUSD*n.unidadesBase;
    const pvRN=pvRealUSD*n.unidadesBase;
    const margenRealUSD=pvRN-costoRealN-totalImpUSD;
    return {...n,pvoN,costoN,imp11,utilN,imp35,totalImpCUP,totalImpUSD,costoRealN,pvRN,margenRealUSD};
  });
}

// ── PIN ──
function PinScreen({onUnlock,storedHash}){
  const [digits,setDigits]=useState("");const [error,setError]=useState("");
  const [setup,setSetup]=useState(!storedHash);const [confirm,setConfirm]=useState("");const [step,setStep]=useState(1);
  const hashPin=async p=>{const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(p));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");};
  const press=async d=>{
    if(digits.length>=6)return;const next=digits+d;setDigits(next);setError("");
    if(next.length===6){
      if(setup){if(step===1){setConfirm(next);setDigits("");setStep(2);}
        else{if(next===confirm){const h=await hashPin(next);onUnlock(h,true);}else{setError("Los PINs no coinciden");setDigits("");setStep(1);setConfirm("");}}}
      else{const h=await hashPin(next);if(h===storedHash)onUnlock(h,false);else{setError("PIN incorrecto");setDigits("");}}
    }
  };
  const del=()=>{setDigits(d=>d.slice(0,-1));setError("");};
  return(<div className="pin-overlay"><div className="pin-card">
    <div className="pin-logo">Almacén Mayorista</div><div className="pin-title">Fichas de Costo</div>
    <div className="pin-sub">{setup?(step===1?"Crea tu PIN (6 dígitos)":"Confirma tu PIN"):"Ingresa tu PIN"}</div>
    <div className="pin-dots">{[...Array(6)].map((_,i)=><div key={i} className={"pin-dot"+(i<digits.length?" filled":"")}/>)}</div>
    <div className="pin-grid">{[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i)=><button key={i} className="pin-btn" onClick={()=>d===""?null:d==="⌫"?del():press(String(d))} style={d===""?{visibility:"hidden"}:{}}>{d}</button>)}</div>
    <div className="pin-error">{error}</div>
  </div></div>);
}

// ── FICHAS PARALELAS por producto ──
function FichasProducto({p,c,rates,calcCont}){
  const pCalc=calcProducto(p,c,rates,calcCont);
  const nivelesCalc=calcNiveles(p.niveles||[],pCalc.costoRealUnitUSD);
  const nivelesOnat=calcNiveles(p.niveles||[],pCalc.costoOnatUnitCUP);
  const pvOnatCUP=toCUPonat(p.pvOnat||0,p.monedaPvOnat,rates);
  const pvRealUSD=toUSD(p.pvReal||0,p.monedaPvReal,rates);
  // impuestos por unidad base
  const imp11unit=pvOnatCUP>0?pvOnatCUP*0.11:0;
  const utilOnatUnit=pvOnatCUP>0?pvOnatCUP-pCalc.costoOnatUnitCUP:0;
  const imp35unit=utilOnatUnit>0?utilOnatUnit*0.35:0;
  const totImpCUP=imp11unit+imp35unit;
  const totImpUSD=totImpCUP/rates.mercado;

  return(
    <div className="card">
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <span style={{fontWeight:700,fontSize:16}}>{p.nombre}</span>
        {p.codigo&&<span className="tag">{p.codigo}</span>}
        <span className="tag">Prop. {fmt(pCalc.prop*100,1)}% del lote</span>
        <span className="tag">{fmt(pCalc.cantBase,0)} {(p.niveles||[])[0]?.nombre||"u"} totales</span>
        {totImpUSD>0&&<span className="tag" style={{background:"rgba(247,111,79,.1)",borderColor:"rgba(247,111,79,.3)",color:"var(--ac4)"}}>Imp. tot: $ {fmt(totImpUSD,2)} / {fmt(totImpCUP,2)} CUP</span>}
      </div>

      {/* TABLA NIVELES - COSTOS */}
      {nivelesCalc.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--tx2)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:8}}>Costo por nivel de empaque</div>
          <div className="tw">
            <table className="niv-table">
              <thead><tr>
                <th>Nivel</th>
                <th>= Unid. base</th>
                <th>Cant. en lote</th>
                <th style={{color:"var(--usd)"}}>Costo REAL / u (USD)</th>
                <th style={{color:"var(--tx3)"}}>CUP merc.</th>
                <th style={{color:"var(--cup)"}}>Costo ONAT / u (CUP)</th>
                <th style={{color:"var(--tx3)"}}>≈ USD</th>
              </tr></thead>
              <tbody>
                {nivelesCalc.map((n,ni)=>{
                  const no=nivelesOnat[ni];
                  const cantTot=ni===0?pCalc.cantBase:Math.round(pCalc.cantBase/n.unidadesBase);
                  return(<tr key={n.id} className={ni===0?"niv-tot":""}>
                    <td><b>{n.nombre||"Nivel "+(ni+1)}</b>{ni===0&&<span className="tag" style={{marginLeft:6,fontSize:9}}>BASE</span>}</td>
                    <td className="tm">{ni===0?"1":fmt(n.unidadesBase,0)}</td>
                    <td className="tm">{fmt(cantTot,0)} {n.unidad}</td>
                    <td className="tusd">$ {fmt(n.costoUSD,4)}</td>
                    <td className="tm" style={{color:"var(--tx3)",fontSize:11}}>{fmt(n.costoUSD*rates.mercado,2)}</td>
                    <td className="tcup">{no?fmt(no.costoUSD,2):"-"} CUP</td>
                    <td className="tm" style={{color:"var(--tx3)",fontSize:11}}>{no?"≈ $"+fmt(no.costoUSD/rates.mercado,4):"-"}</td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* FICHAS PARALELAS */}
      <div className="fichas-grid">

        {/* FICHA ONAT */}
        <div className="ficha-onat">
          <div className="ficha-title ft-onat">🧾 Ficha ONAT</div>
          <div className="frow sub"><span className="flbl2">CIF proporcional</span><ValCUP v={pCalc.cifOnatCUP} rates={rates}/></div>
          {(p.gastos||[]).filter(g=>g.enOnat).map(g=>{
            const cv=toUSD(g.monto,g.moneda,rates)*rates.onat;
            return(<div key={g.id} className="frow sub"><span className="flbl2">{g.concepto||"Gasto ONAT"}</span><ValCUP v={cv} rates={rates}/></div>);
          })}
          <div className="frow ftot"><span style={{color:"var(--cup)"}}>Costo Total ONAT</span><ValCUP v={pCalc.costoOnatTotalCUP} rates={rates}/></div>
          <div className="frow sub"><span className="flbl2">Costo unit. ONAT</span><ValCUP v={pCalc.costoOnatUnitCUP} rates={rates}/></div>

          {pvOnatCUP>0?(
            <>
              <div style={{height:1,background:"var(--bd)",margin:"10px 0"}}/>
              <div className="frow sub"><span className="flbl2">PV ONAT / unidad</span><ValCUP v={pvOnatCUP} rates={rates}/></div>
              <div className="frow sub"><span className="flbl2">Utilidad ONAT / unidad</span>
                <span className="fval-main" style={{color:pvOnatCUP-pCalc.costoOnatUnitCUP>=0?"var(--ac2)":"var(--ac4)",fontSize:14}}>
                  {pvOnatCUP-pCalc.costoOnatUnitCUP>=0?"+":""}{fmt(pvOnatCUP-pCalc.costoOnatUnitCUP,2)} CUP
                </span>
              </div>
              <div style={{height:1,background:"var(--bd)",margin:"10px 0"}}/>
              <div style={{fontSize:11,fontWeight:700,color:"var(--ac4)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Impuestos ONAT / unidad</div>
              <div className="frow sub"><span className="flbl2">11% sobre ventas ONAT</span><span className="fval-main" style={{color:"var(--ac4)",fontSize:13}}>{fmt(imp11unit,2)} CUP</span></div>
              <div className="frow sub"><span className="flbl2">Utilidad ONAT</span><span className="fval-main" style={{color:utilOnatUnit>=0?"var(--ac2)":"var(--ac4)",fontSize:13}}>{utilOnatUnit>=0?"+":""}{fmt(utilOnatUnit,2)} CUP</span></div>
              <div className="frow sub"><span className="flbl2">35% sobre utilidad ONAT</span><span className="fval-main" style={{color:"var(--ac4)",fontSize:13}}>{fmt(imp35unit,2)} CUP</span></div>
              <div className="frow ftot" style={{borderTopColor:"var(--ac4)"}}><span style={{color:"var(--ac4)"}}>Total impuestos / unidad</span>
                <span>
                  <span className="fval-main" style={{color:"var(--ac4)"}}>{fmt(totImpCUP,2)} CUP</span>
                  <span className="fval-sec">≈ $ {fmt(totImpUSD,4)}</span>
                </span>
              </div>
              {/* Totales del lote */}
              <div style={{height:1,background:"var(--bd)",margin:"10px 0"}}/>
              <div style={{fontSize:10,color:"var(--tx3)",marginBottom:4}}>TOTAL LOTE ({fmt(pCalc.cantBase,0)} {(p.niveles||[])[0]?.nombre||"u"})</div>
              {(()=>{
                const totVta=pvOnatCUP*pCalc.cantBase;
                const totCosto=pCalc.costoOnatTotalCUP;
                const totUtil=totVta-totCosto;
                const tot11=totVta*0.11;
                const tot35=totUtil>0?totUtil*0.35:0;
                const totImpCUPLote=tot11+tot35;
                return(<>
                  <div className="frow sub"><span className="flbl2">Total ventas ONAT</span><span className="fval-main" style={{color:"var(--cup)",fontSize:12}}>{fmt(totVta,2)} CUP</span></div>
                  <div className="frow sub"><span className="flbl2">Impuesto 11%</span><span className="fval-main" style={{color:"var(--ac4)",fontSize:12}}>{fmt(tot11,2)} CUP</span></div>
                  <div className="frow sub"><span className="flbl2">Impuesto 35%</span><span className="fval-main" style={{color:"var(--ac4)",fontSize:12}}>{fmt(tot35,2)} CUP</span></div>
                  <div className="frow ftot" style={{borderTopColor:"var(--ac4)"}}><span style={{color:"var(--ac4)"}}>TOTAL IMPUESTOS LOTE</span>
                    <span><span className="fval-main" style={{color:"var(--ac4)"}}>{fmt(totImpCUPLote,2)} CUP</span><span className="fval-sec">≈ $ {fmt(totImpCUPLote/rates.mercado,2)}</span></span>
                  </div>
                </>);
              })()}
            </>
          ):(
            <div className="alert ai" style={{marginTop:10,fontSize:12}}>Agrega el PV ONAT para ver el cálculo de impuestos.</div>
          )}
        </div>

        {/* FICHA REAL */}
        <div className="ficha-real">
          <div className="ficha-title ft-real">💰 Ficha Real</div>
          <div className="frow sub"><span className="flbl2">Valor mercancía</span><ValUSD v={pCalc.precioMercUSD}/></div>
          {pCalc.fleteR>0&&<div className="frow sub"><span className="flbl2">Flete prop.</span><ValUSD v={pCalc.fleteR}/></div>}
          {pCalc.thcdR>0&&<div className="frow sub"><span className="flbl2">THCD prop.</span><ValUSD v={pCalc.thcdR}/></div>}
          {pCalc.seguroR>0&&<div className="frow sub"><span className="flbl2">Seguro prop.</span><ValUSD v={pCalc.seguroR}/></div>}
          {(p.gastos||[]).filter(g=>g.enReal).map(g=><div key={g.id} className="frow sub"><span className="flbl2">{g.concepto||"Gasto"}</span><ValUSD v={toUSD(g.monto,g.moneda,rates)}/></div>)}
          {pCalc.gastosLoteR>0&&<div className="frow sub"><span className="flbl2">Gastos lote prop.</span><ValUSD v={pCalc.gastosLoteR}/></div>}
          <div className="frow ftot"><span style={{color:"var(--ac)"}}>Costo Total Real</span>
            <span><span className="fval-main" style={{color:"var(--usd)"}}>$ {fmt(pCalc.costoRealTotalUSD,2)}</span><span className="fval-sec">{fmt(pCalc.costoRealTotalUSD*rates.mercado,0)} CUP</span></span>
          </div>
          <div className="frow sub"><span className="flbl2">Costo unit. real</span>
            <span><span className="fval-main" style={{color:"var(--usd)",fontSize:13}}>$ {fmt(pCalc.costoRealUnitUSD,4)}</span><span className="fval-sec">{fmt(pCalc.costoRealUnitUSD*rates.mercado,2)} CUP</span></span>
          </div>

          {totImpUSD>0&&(
            <>
              <div style={{height:1,background:"var(--bd)",margin:"10px 0"}}/>
              <div className="frow fimp"><span className="flbl2">− Impuestos ONAT / unidad</span>
                <span><span className="fval-main" style={{color:"var(--ac4)",fontSize:13}}>$ {fmt(totImpUSD,4)}</span><span className="fval-sec">{fmt(totImpCUP,2)} CUP</span></span>
              </div>
              <div className="frow sub"><span className="flbl2">Costo unit. + impuestos</span>
                <span><span className="fval-main" style={{color:"var(--ac3)",fontSize:13}}>$ {fmt(pCalc.costoRealUnitUSD+totImpUSD,4)}</span></span>
              </div>
            </>
          )}

          {pvRealUSD>0&&(
            <>
              <div style={{height:1,background:"var(--bd)",margin:"10px 0"}}/>
              <div className="frow sub"><span className="flbl2">PV Real / unidad</span>
                <span><span className="fval-main" style={{color:"var(--ac2)",fontSize:13}}>$ {fmt(pvRealUSD,4)}</span><span className="fval-sec">{fmt(pvRealUSD*rates.mercado,2)} CUP</span></span>
              </div>
              {(()=>{
                const margenBrutoUSD=pvRealUSD-pCalc.costoRealUnitUSD;
                const margenNetoUSD=margenBrutoUSD-totImpUSD;
                const pctNeto=pvRealUSD>0?(margenNetoUSD/pvRealUSD)*100:0;
                return(<>
                  {totImpUSD>0&&<div className="frow sub"><span className="flbl2">Margen bruto / unidad</span><span className="fval-main" style={{color:margenBrutoUSD>=0?"var(--ac2)":"var(--ac4)",fontSize:13}}>{margenBrutoUSD>=0?"+":""}$ {fmt(margenBrutoUSD,4)}</span></div>}
                  <div className="frow ftot" style={{borderTopColor:"var(--ac2)"}}><span style={{color:"var(--ac2)"}}>Margen neto / unidad</span>
                    <span>
                      <span className="fval-main" style={{color:margenNetoUSD>=0?"var(--ac2)":"var(--ac4)"}}>{margenNetoUSD>=0?"+":""}$ {fmt(margenNetoUSD,4)}</span>
                      <span className="fval-sec">{fmt(pctNeto,1)}%</span>
                    </span>
                  </div>
                </>);
              })()}
              {/* Totales lote */}
              <div style={{height:1,background:"var(--bd)",margin:"10px 0"}}/>
              <div style={{fontSize:10,color:"var(--tx3)",marginBottom:4}}>TOTAL LOTE ({fmt(pCalc.cantBase,0)} {(p.niveles||[])[0]?.nombre||"u"})</div>
              {(()=>{
                const totVtaR=pvRealUSD*pCalc.cantBase;
                const totCostoR=pCalc.costoRealTotalUSD;
                const totImpU=totImpUSD*pCalc.cantBase;
                const totMN=totVtaR-totCostoR-totImpU;
                return(<>
                  <div className="frow sub"><span className="flbl2">Total ventas reales</span><span className="fval-main" style={{color:"var(--ac2)",fontSize:12}}>$ {fmt(totVtaR,2)}</span></div>
                  <div className="frow sub"><span className="flbl2">Total impuestos (real)</span><span className="fval-main" style={{color:"var(--ac4)",fontSize:12}}>$ {fmt(totImpU,2)}</span></div>
                  <div className="frow ftot" style={{borderTopColor:"var(--ac2)"}}><span style={{color:"var(--ac2)"}}>GANANCIA NETA LOTE</span>
                    <span><span className="fval-main" style={{color:totMN>=0?"var(--ac2)":"var(--ac4)"}}>{totMN>=0?"+":""}$ {fmt(totMN,2)}</span><span className="fval-sec">{fmt(totMN*rates.mercado,0)} CUP</span></span>
                  </div>
                </>);
              })()}
            </>
          )}
          {!pvRealUSD&&<div className="alert ai" style={{marginTop:10,fontSize:12}}>Agrega el PV Real para ver el margen.</div>}
        </div>
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ──
function App(){
  const [pinHash,setPH]=useState(()=>sessionStorage.getItem("fc_pin")||"");
  const [storedHash,setSH]=useState(()=>localStorage.getItem("fc_pin_hash")||"");
  const [unlocked,setUL]=useState(false);
  const [gistToken,setGT]=useState(()=>localStorage.getItem("fc_gist_token")||"");
  const [gistId,setGI]=useState(()=>localStorage.getItem("fc_gist_id")||"");
  const [rates,setRates]=useState(()=>{try{return JSON.parse(localStorage.getItem("fc_rates"))||{mercado:340,onat:24,eurUsd:1.08};}catch{return{mercado:340,onat:24,eurUsd:1.08};}});
  const [editR,setER]=useState(false);const [tmpR,setTR]=useState(rates);
  const [conts,setConts]=useState([]);
  const [loading,setLoading]=useState(false);const [saving,setSaving]=useState(false);const [saveMsg,setSM]=useState("");
  const [tab,setTab]=useState("lista");const [sel,setSel]=useState(null);
  const [showMo,setShowMo]=useState(false);const [editC,setEditC]=useState(null);
  const [search,setSearch]=useState("");const [filterT,setFilterT]=useState("");

  useEffect(()=>{if(pinHash&&pinHash===storedHash)setUL(true);},[]);
  useEffect(()=>{localStorage.setItem("fc_rates",JSON.stringify(rates));},[rates]);
  useEffect(()=>{
    if(!unlocked||!gistToken||!gistId)return;
    setLoading(true);
    loadGist(gistToken,gistId).then(d=>{if(d?.contenedores)setConts(d.contenedores);}).catch(e=>console.error(e)).finally(()=>setLoading(false));
  },[unlocked]);

  const persist=useCallback(async(next)=>{
    setConts(next);
    if(!gistToken||!gistId)return;
    setSaving(true);
    try{await saveGist(gistToken,gistId,{contenedores:next,updatedAt:new Date().toISOString()});setSM("Guardado ✓");}
    catch(e){setSM("Error guardando");}
    finally{setSaving(false);setTimeout(()=>setSM(""),3000);}
  },[gistToken,gistId]);

  const handleUnlock=(h,isNew)=>{if(isNew){localStorage.setItem("fc_pin_hash",h);setSH(h);}sessionStorage.setItem("fc_pin",h);setPH(h);setUL(true);};
  const saveCont=(c)=>{const idx=conts.findIndex(x=>x.id===c.id);const next=idx>=0?conts.map(x=>x.id===c.id?c:x):[...conts,c];persist(next);setShowMo(false);setSel(c);setTab("detalle");};
  const delCont=(id)=>{if(!confirm("¿Eliminar este lote y todos sus productos?"))return;persist(conts.filter(x=>x.id!==id));if(sel?.id===id){setSel(null);setTab("lista");}};

  const filtered=conts.filter(c=>{
    const q=search.toLowerCase();
    const mq=!q||c.nombre.toLowerCase().includes(q)||((c.codigo||"").toLowerCase().includes(q))||((c.proveedor||"").toLowerCase().includes(q))||(c.productos||[]).some(p=>p.nombre.toLowerCase().includes(q));
    return mq&&(!filterT||c.termino===filterT);
  });

  if(!unlocked)return <PinScreen onUnlock={handleUnlock} storedHash={storedHash}/>;

  return(<div>
    <div className="app-header">
      <div><div className="hlogo">Almacén Mayorista</div><div className="htitle">Fichas de Costo</div></div>
      <div style={{flex:1}}/>
      <div style={{display:"flex",gap:10,alignItems:"center"}}>
        {editR?(
          <>
            <input className="finp mono" style={{width:88,padding:"4px 8px",fontSize:12}} placeholder="Mercado" type="number" value={tmpR.mercado} onChange={e=>setTR(r=>({...r,mercado:e.target.value}))}/>
            <input className="finp mono" style={{width:78,padding:"4px 8px",fontSize:12}} placeholder="ONAT" type="number" value={tmpR.onat} onChange={e=>setTR(r=>({...r,onat:e.target.value}))}/>
            <input className="finp mono" style={{width:78,padding:"4px 8px",fontSize:12}} placeholder="EUR" type="number" value={tmpR.eurUsd} onChange={e=>setTR(r=>({...r,eurUsd:e.target.value}))}/>
            <button className="btn bsu bsm" onClick={()=>{setRates({mercado:num(tmpR.mercado),onat:num(tmpR.onat),eurUsd:num(tmpR.eurUsd)});setER(false);}}>✓</button>
            <button className="btn bs bsm" onClick={()=>setER(false)}>✕</button>
          </>
        ):(
          <>
            <div className="rpill"><div className="rdot" style={{background:"#a78bfa"}}/><span>Mercado</span><span className="rval">{rates.mercado}</span><button className="redit" onClick={()=>{setTR(rates);setER(true);}}>✎</button></div>
            <div className="rpill"><div className="rdot" style={{background:"#4f8ef7"}}/><span>ONAT</span><span className="rval">{rates.onat}</span></div>
            <div className="rpill"><div className="rdot" style={{background:"#38d9a9"}}/><span>EUR</span><span className="rval">{rates.eurUsd}</span></div>
          </>
        )}
      </div>
      <div className="sind" style={{marginLeft:12}}>
        <div className={"sdot"+(saving?" saving":"")}/>
        <span>{saveMsg||(saving?"Guardando...":"Sync")}</span>
      </div>
    </div>

    <div className="nav-tabs">
      {[{key:"lista",label:"📋 Lotes"},...(sel?[{key:"detalle",label:"📄 "+sel.nombre}]:[]),{key:"config",label:"⚙️ Config"}].map(t=>(
        <button key={t.key} className={"ntab"+(tab===t.key?" active":"")} onClick={()=>setTab(t.key)}>{t.label}</button>
      ))}
      <button className="ntab" onClick={()=>{setEditC(defCont());setShowMo(true);}}>➕ Nuevo Lote</button>
    </div>

    <div className="main">
      {loading&&<div className="alert ai">⏳ Cargando...</div>}

      {tab==="lista"&&(
        <div>
          <div className="abar">
            <input className="sinp" placeholder="🔍 Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/>
            <select className="fsl" value={filterT} onChange={e=>setFilterT(e.target.value)}>
              <option value="">Todos</option>{TERMINOS.map(t=><option key={t.k} value={t.k}>{t.k}</option>)}
            </select>
            <div style={{flex:1}}/><button className="btn bp" onClick={()=>{setEditC(defCont());setShowMo(true);}}>➕ Nuevo Lote</button>
          </div>
          {filtered.length===0?(
            <div className="empty"><div style={{fontSize:48,marginBottom:12}}>📦</div><div style={{fontSize:16,fontWeight:600,color:"var(--tx2)",marginBottom:6}}>{conts.length===0?"No hay lotes registrados":"Sin resultados"}</div></div>
          ):(
            <div className="card" style={{padding:0}}>
              <div className="tw"><table>
                <thead><tr><th>Código</th><th>Lote</th><th>Término</th><th>Proveedor</th><th>Fecha</th><th>Prods.</th><th>Costo Total USD</th><th>Acciones</th></tr></thead>
                <tbody>{filtered.map(c=>{
                  const cc=calcContenedor(c,rates);
                  return(<tr key={c.id} style={{cursor:"pointer"}} onClick={()=>{setSel(c);setTab("detalle");}}>
                    <td><span className="tag">{c.codigo||"-"}</span></td>
                    <td style={{fontWeight:600}}>{c.nombre}</td>
                    <td><span className={"badge "+(TBADGE[c.termino]||"b-otra")}>{c.termino}</span></td>
                    <td style={{color:"var(--tx2)"}}>{c.proveedor||"-"}</td>
                    <td className="tm" style={{color:"var(--tx2)"}}>{c.fecha}</td>
                    <td><span className="tag">{(c.productos||[]).length}</span></td>
                    <td className="tusd">$ {fmt(cc.costoTotalUSD,2)}</td>
                    <td onClick={e=>e.stopPropagation()}>
                      <div style={{display:"flex",gap:4}}>
                        <button className="btn bs bsm" onClick={()=>{setEditC({...c});setShowMo(true);}}>✎</button>
                        <button className="btn bd2 bsm" onClick={()=>delCont(c.id)}>🗑</button>
                      </div>
                    </td>
                  </tr>);
                })}</tbody>
              </table></div>
            </div>
          )}
        </div>
      )}

      {tab==="detalle"&&sel&&(()=>{
        const c=conts.find(x=>x.id===sel.id)||sel;
        const cc=calcContenedor(c,rates);
        return(<div>
          <div className="dh">
            <div className="dc">#{c.codigo||"SIN CÓDIGO"}</div>
            <div className="dn">{c.nombre}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <span className={"badge "+(TBADGE[c.termino]||"b-otra")}>{c.termino}</span>
              <span className="tag">{c.fecha}</span>
              {c.proveedor&&<span className="tag">🏭 {c.proveedor}</span>}
              {c.pais&&<span className="tag">🌐 {c.pais}</span>}
              <span className="tag">📦 {(c.productos||[]).length} productos</span>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            <button className="btn bs" onClick={()=>{setEditC({...c});setShowMo(true);}}>✎ Editar</button>
            <button className="btn bd2" onClick={()=>delCont(c.id)}>🗑 Eliminar</button>
          </div>

          <div className="srow">
            <div className="sbox"><div className="slbl">Valor Mercancía</div><div className="sval" style={{color:"var(--usd)"}}>$ {fmt(cc.valorMercUSD,2)}</div><div className="ssub">precio factura</div></div>
            <div className="sbox"><div className="slbl">CIF Total</div><div className="sval" style={{color:"var(--ac2)"}}>$ {fmt(cc.cifUSD,2)}</div><div className="ssub">+flete+thcd+seguro</div></div>
            <div className="sbox"><div className="slbl">Gastos Reales</div><div className="sval" style={{color:"var(--ac3)"}}>$ {fmt(cc.gastosUSD,2)}</div><div className="ssub">tasa mercado</div></div>
            <div className="sbox"><div className="slbl">Costo Total Real</div><div className="sval">$ {fmt(cc.costoTotalUSD,2)}</div><div className="ssub">{fmt(cc.costoTotalUSD*rates.mercado,0)} CUP</div></div>
          </div>

          {/* Productos con fichas paralelas */}
          {(c.productos||[]).map(p=><FichasProducto key={p.id} p={p} c={c} rates={rates} calcCont={cc}/>)}

          {c.notas&&<div className="card"><div className="ctitle"><span>📝</span> Notas</div><p style={{color:"var(--tx2)",fontSize:13,lineHeight:1.6}}>{c.notas}</p></div>}
        </div>);
      })()}

      {tab==="config"&&(
        <div style={{maxWidth:600}}>
          <div className="card">
            <div className="ctitle"><span>🔗</span> GitHub Gist</div>
            <div className="alert ai" style={{marginBottom:12}}>Usa el mismo PAT y Gist ID de la app Estado de Resultados, o crea uno nuevo.</div>
            <div className="fg" style={{gap:12}}>
              <div className="fgrp"><label className="flbl">Personal Access Token</label><input className="finp mono" type="password" value={gistToken} onChange={e=>{setGT(e.target.value);localStorage.setItem("fc_gist_token",e.target.value);}} placeholder="ghp_xxxxxxxxxxxx"/></div>
              <div className="fgrp"><label className="flbl">Gist ID</label><input className="finp mono" value={gistId} onChange={e=>{setGI(e.target.value);localStorage.setItem("fc_gist_id",e.target.value);}} placeholder="ID del Gist"/></div>
              <button className="btn bp" onClick={()=>{setLoading(true);loadGist(gistToken,gistId).then(d=>{if(d?.contenedores)setConts(d.contenedores);setSM("Cargado ✓");}).catch(e=>setSM("Error: "+e.message)).finally(()=>setLoading(false));}}>Conectar y Cargar</button>
            </div>
          </div>
          <div className="card">
            <div className="ctitle"><span>💱</span> Tipos de Cambio</div>
            <div className="fg g3">
              <div className="fgrp"><label className="flbl">Mercado informal (CUP/USD)</label><div className="iw"><input className="finp mono" type="number" step="0.01" value={rates.mercado} onChange={e=>setRates(r=>({...r,mercado:num(e.target.value)}))} placeholder="340"/><span className="cb cb-cup">CUP</span></div></div>
              <div className="fgrp"><label className="flbl">Oficial ONAT (CUP/USD)</label><div className="iw"><input className="finp mono" type="number" step="0.01" value={rates.onat} onChange={e=>setRates(r=>({...r,onat:num(e.target.value)}))} placeholder="24"/><span className="cb cb-cup">CUP</span></div></div>
              <div className="fgrp"><label className="flbl">EUR / USD</label><div className="iw"><input className="finp mono" type="number" step="0.0001" value={rates.eurUsd} onChange={e=>setRates(r=>({...r,eurUsd:num(e.target.value)}))} placeholder="1.08"/><span className="cb cb-usd">USD</span></div></div>
            </div>
          </div>
          <div className="card"><div className="ctitle"><span>🔐</span> PIN</div><button className="btn bs" onClick={()=>{localStorage.removeItem("fc_pin_hash");sessionStorage.removeItem("fc_pin");window.location.reload();}}>Cambiar PIN</button></div>
        </div>
      )}
    </div>
    {showMo&&editC&&<ContenedorModal inicial={editC} rates={rates} onSave={saveCont} onClose={()=>setShowMo(false)}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
